<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0D1B2A">
    <title>Sign In — EchoStack</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ... same styles as before, plus .pw-wrap, .pw-toggle, .forgot-row ... */
        .pw-wrap{position:relative}
        .pw-wrap input{padding-right:46px}
        .pw-toggle{
            position:absolute;right:14px;top:50%;transform:translateY(-50%);
            background:none;border:none;color:var(--muted);cursor:pointer;
            font-size:.85rem;padding:4px;transition:color .15s
        }
        .pw-toggle:hover{color:#fff}
        .forgot-row{text-align:right;margin-top:-8px;margin-bottom:10px;font-size:.8rem}
        .forgot-row a{color:var(--muted);text-decoration:none}
        .forgot-row a:hover{color:var(--gold2)}
    </style>
</head>
<body>
<!-- LEFT PANEL (same) -->
...

<!-- RIGHT PANEL -->
<div class="right-panel">
    <div class="form-box">
        <!-- Already logged in card (same) -->
        ...

        <h2 class="form-title">Sign In</h2>
        <p class="form-sub">Continue your heritage journey</p>

        <div class="field">
            <label>Username or Email <span style="color:var(--danger)">*</span></label>
            <input type="text" id="username" placeholder="Enter your username or email"
                   autocomplete="username" onkeydown="if(event.key==='Enter')submitLogin()">
        </div>

        <div class="field">
            <label>Password <span style="color:var(--danger)">*</span></label>
            <div class="pw-wrap">
                <input type="password" id="password" placeholder="Enter your password"
                       autocomplete="current-password" onkeydown="if(event.key==='Enter')submitLogin()">
                <button class="pw-toggle" type="button" onclick="togglePw()" id="pw-eye" title="Show/hide password">👁</button>
            </div>
        </div>

        <!-- Forgot password link -->
        <div class="forgot-row">
            <a href="#" onclick="alert('Please check your email for a reset link, or contact support at support@echostack.com.')">Forgot password?</a>
        </div>

        <button class="btn-primary" id="login-btn" onclick="submitLogin()">
            Sign In →
        </button>

        <div class="divider"><span>New to EchoStack?</span></div>
        <div class="bottom-row">
            Don't have an account? <a href="/signup">Join Free</a>
        </div>
        <div class="bottom-row" style="margin-top:10px">
            <a href="/" style="color:var(--muted);font-size:.78rem">← Back to Home</a>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Check if already logged in (same)
...

function togglePw() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('pw-eye');
    if (inp.type === 'password') {
        inp.type = 'text'; btn.textContent = '🙈';
    } else {
        inp.type = 'password'; btn.textContent = '👁';
    }
}

async function submitLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username) { showToast('Please enter your username or email', 'er'); document.getElementById('username').focus(); return; }
    if (!password)  { showToast('Please enter your password', 'er'); document.getElementById('password').focus(); return; }

    const btn = document.getElementById('login-btn');
    btn.innerHTML = '<div class="spin"></div> Signing in…';
    btn.disabled = true;

    const fd = new FormData();
    fd.append('username', username);
    fd.append('password', password);

    try {
        const r = await fetch('/api/users/login', { method: 'POST', body: fd });
        const d = await r.json();

        if (r.ok && d.success) {
            localStorage.setItem('es_user', JSON.stringify({
                loggedIn:   true,
                user_id:    d.user_id,
                username:   d.username,
                role:       d.role || 'user',
                is_premium: d.is_premium || 0
            }));

            showToast('✅ Welcome back, ' + d.username + '!', 'ok');

            setTimeout(() => {
                const role = d.role || 'user';
                if (role === 'admin' || role === 'superuser') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/dashboard';
                }
            }, 1200);
        } else {
            // Handle specific errors like unverified email
            if (r.status === 403 && d.detail.includes('verify your email')) {
                showToast('📧 Please verify your email before logging in.', 'er');
            } else {
                throw new Error(d.detail || 'Incorrect username or password');
            }
            btn.innerHTML = 'Sign In →';
            btn.disabled = false;
        }
    } catch(err) {
        showToast('❌ ' + err.message, 'er');
        btn.innerHTML = 'Sign In →';
        btn.disabled = false;
    }
}

let _t;
function showToast(msg, type) { ... }
</script>
</body>
</html>
