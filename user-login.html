<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - EchoStack</title>
    <meta name="theme-color" content="#1a1e29">
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --brand-dark: #1a1e29; --brand-blue: #0077b6; --gold: #C8962E; }
        body {
            font-family: Georgia, serif;
            background: linear-gradient(135deg, #f5f0e8 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(26,30,41,0.12);
            max-width: 420px;
            width: 100%;
        }
        .btn-primary {
            background-color: var(--brand-dark) !important;
            color: white !important;
            transition: background .2s;
        }
        .btn-primary:hover { background-color: var(--brand-blue) !important; }
        input { border: 1.5px solid #e2e8f0; transition: border-color .2s; }
        input:focus { outline: none; border-color: var(--brand-blue); }
        .logo-bar { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 6px; }
        .logo-bar img { width: 40px; height: 40px; object-fit: contain; }
        .logo-bar span { font-size: 1.4rem; font-weight: bold; color: var(--brand-dark); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-8">
            <div class="logo-bar">
                <img src="/echostack-logo.png" alt="EchoStack" onerror="this.style.display='none'">
                <span>EchoStack</span>
            </div>
            <h1 class="text-2xl font-bold mb-1" style="color:#1a1e29">Welcome Back</h1>
            <p class="text-gray-500 text-sm">Sign in to continue exploring Ghana's heritage</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider mb-2 text-gray-600">Email or Username</label>
                <input type="text" id="username" required
                    class="w-full p-3 rounded-lg text-sm"
                    placeholder="Enter your email or username"
                    autocomplete="username">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider mb-2 text-gray-600">Password</label>
                <input type="password" id="pw" required
                    class="w-full p-3 rounded-lg text-sm"
                    placeholder="Your password"
                    autocomplete="current-password">
            </div>
            <button type="submit" id="submit-btn"
                class="w-full btn-primary py-3 rounded-lg font-bold text-sm mt-2">
                Sign In →
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Don't have an account?
            <a href="/signup" class="font-semibold hover:underline" style="color:#0077b6">Create Account</a>
        </p>
        <p class="text-center text-sm text-gray-400 mt-3">
            <a href="/" class="hover:underline">← Back to Home</a>
        </p>
        <!-- NO admin link here — admin access is via direct URL only -->
    </div>

    <div id="notification" class="fixed bottom-6 right-6 hidden px-5 py-3 rounded-lg shadow-lg z-50 text-white text-sm font-semibold"></div>

    <script>
        // If already logged in, skip straight to app
        try {
            var stored = localStorage.getItem('es_user');
            if (stored) {
                var u = JSON.parse(stored);
                if (u && u.loggedIn) window.location.href = '/app';
            }
        } catch(e) {}

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Signing in…';

            var formData = new FormData();
            formData.append('username', document.getElementById('username').value.trim());
            formData.append('password', document.getElementById('pw').value);

            try {
                var response = await fetch('/api/users/login', { method: 'POST', body: formData });
                var data = await response.json();

                if (response.ok && data.success) {
                    // Save user to localStorage
                    localStorage.setItem('es_user', JSON.stringify({
                        loggedIn: true,
                        user_id: data.user_id,
                        username: data.username,
                        email: data.email,
                        role: data.role || 'user',
                        plan: data.is_premium ? 'premium' : 'free',
                        is_premium: data.is_premium || 0
                    }));
                    showNotification('✅ Welcome back, ' + data.username + '!', 'success');
                    setTimeout(function() { window.location.href = '/app'; }, 800);
                } else {
                    throw new Error(data.detail || 'Invalid username or password');
                }
            } catch(error) {
                showNotification('❌ ' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Sign In →';
            }
        });

        function showNotification(message, type) {
            var n = document.getElementById('notification');
            n.className = 'fixed bottom-6 right-6 px-5 py-3 rounded-lg shadow-lg z-50 text-white text-sm font-semibold ' +
                (type === 'success' ? 'bg-green-600' : 'bg-red-600');
            n.textContent = message;
            n.classList.remove('hidden');
            setTimeout(function() { n.classList.add('hidden'); }, 3500);
        }
    </script>
</body>
</html>
