<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0D1B2A">
    <title>Sign In - EchoStack</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{--ink:#0D1B2A;--gold:#C8962E;--gold2:#E8B84B;--muted:#94A3B8;--success:#16A34A;--danger:#DC2626}
        html,body{min-height:100vh}
        body{font-family:'DM Sans',sans-serif;background:var(--ink);color:#fff;display:flex;min-height:100svh}
        .left-panel{width:380px;flex-shrink:0;background:linear-gradient(160deg,#0a1520 0%,#0D1B2A 60%,rgba(200,150,46,.08) 100%);border-right:1px solid rgba(255,255,255,.06);padding:40px 36px;display:flex;flex-direction:column;position:relative;overflow:hidden}
        .left-panel::before{content:'✦';position:absolute;bottom:-20px;right:-20px;font-size:200px;opacity:.03;line-height:1;pointer-events:none}
        .left-logo{display:flex;align-items:center;gap:10px;margin-bottom:48px}
        .left-logo img{width:36px;height:36px;border-radius:8px}
        .left-logo span{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--gold)}
        .left-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:30px;background:rgba(200,150,46,.12);border:1px solid rgba(200,150,46,.3);font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold2);margin-bottom:20px}
        .left-headline{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;line-height:1.15;color:#fff;margin-bottom:16px}
        .left-headline em{font-style:italic;color:var(--gold2)}
        .left-sub{font-size:.88rem;color:rgba(255,255,255,.5);line-height:1.7}
        .right-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;overflow-y:auto;min-height:100svh}
        .form-box{width:100%;max-width:400px}
        .form-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;margin-bottom:8px}
        .form-sub{color:var(--muted);font-size:.9rem;margin-bottom:32px}
        .field{margin-bottom:20px}
        .field label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
        .field input{width:100%;padding:14px 16px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;-webkit-appearance:none}
        .field input:focus{border-color:var(--gold);background:rgba(200,150,46,.05)}
        .field input::placeholder{color:rgba(255,255,255,.25)}
        .btn-primary{width:100%;padding:14px;border-radius:50px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(200,150,46,.3)}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(200,150,46,.45)}
        .signup-row{text-align:center;margin-top:24px;font-size:.88rem;color:var(--muted)}
        .signup-row a{color:var(--gold);text-decoration:none;font-weight:600}
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(13,27,42,.95);color:#fff;padding:11px 20px;border-radius:10px;font-size:.83rem;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:all .25s;z-index:500;opacity:0;pointer-events:none;border:1px solid rgba(255,255,255,.1)}
        .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
        .toast.er{background:rgba(220,38,38,.9)}
        .spin{width:18px;height:18px;border:2.5px solid rgba(13,27,42,.3);border-top-color:var(--ink);border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
        @keyframes sp{to{transform:rotate(360deg)}}
        @media(max-width:767px){.left-panel{display:none}.right-panel{padding:28px 20px}}
    </style>
</head>
<body>
<div class="left-panel">
    <div class="left-logo">
        <img src="/echostack-logo.png" onerror="this.style.display='none'" alt="">
        <span>EchoStack</span>
    </div>
    <div class="left-badge">🇬🇭 Welcome Back</div>
    <h1 class="left-headline">Continue your <em>journey.</em></h1>
    <p class="left-sub">Sign in to access your personalized feed, bookmarks, and saved stories from Ghana's heritage.</p>
</div>
<div class="right-panel">
    <div class="form-box">
        <h2 class="form-title">Welcome Back</h2>
        <p class="form-sub">Sign in to your EchoStack account</p>
        <div class="field">
            <label>Username or Email</label>
            <input type="text" id="loginId" placeholder="Enter your username or email" autocomplete="username">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="loginPw" placeholder="Enter your password" autocomplete="current-password" onkeypress="if(event.key==='Enter')login()">
        </div>
        <button class="btn-primary" id="loginBtn" onclick="login()">Sign In</button>
        <div class="signup-row">Don't have an account? <a href="/signup">Create one</a></div>
        <div class="signup-row" style="margin-top:12px"><a href="/" style="color:var(--muted);font-size:.82rem">← Back to Home</a></div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
async function login() {
    const id = document.getElementById('loginId').value.trim();
    const pw = document.getElementById('loginPw').value.trim();
    if (!id || !pw) return showToast('Please fill all fields', 'er');
    
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Signing in...';
    
    try {
        const formData = new FormData();
        formData.append('username', id);
        formData.append('password', pw);
        
        const res = await fetch('/api/users/login', { method: 'POST', body: formData });
        const data = await res.json();
        
        if (data.success) {
            showToast('Welcome back!', 'ok');
            setTimeout(() => window.location.href = '/dashboard', 1000);
        } else {
            showToast(data.detail || 'Invalid credentials', 'er');
            btn.disabled = false;
            btn.innerHTML = 'Sign In';
        }
    } catch(e) {
        showToast('Network error', 'er');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
    }
}

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast on ' + (type || '');
    setTimeout(() => t.classList.remove('on'), 3000);
}
</script>
</body>
</html>
