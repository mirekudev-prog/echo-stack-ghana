<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EchoStack</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --brand-dark: #1a1e29;
            --brand-blue: #0077b6;
        }
        
        body {
            font-family: Georgia, serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(26, 30, 41, 0.1);
            max-width: 450px;
            width: 100%;
        }
        
        .btn-primary {
            background-color: var(--brand-blue) !important;
            color: white !important;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-8">
            <img src="/echostack-logo.png" alt="EchoStack" class="w-16 h-16 mx-auto mb-4">
            <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
            <p class="text-gray-600">Sign in to continue exploring</p>
        </div>
        
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2">Email or Username</label>
                <input type="text" id="username" required class="w-full p-3 border rounded-lg" placeholder="Enter your email or username">
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" id="password" required class="w-full p-3 border rounded-lg" placeholder="Enter your password">
            </div>
            
            <button type="submit" class="w-full btn-primary py-3 rounded-lg font-bold">Sign In</button>
        </form>
        
        <p class="text-center text-sm text-gray-600 mt-6">
            Don't have an account? <a href="/signup" class="text-[#0077b6] hover:underline">Join EchoStack</a>
        </p>
        
        <p class="text-center text-sm text-gray-600 mt-4">
            <a href="/" class="text-[#0077b6] hover:underline">← Back to Home</a>
        </p>
        
        <p class="text-center text-xs text-gray-400 mt-6 pt-4 border-t">
            Admin? <a href="/login" class="text-[#0077b6] hover:underline">Admin Login</a>
        </p>
    </div>

    <div id="notification" class="fixed bottom-6 right-6 hidden px-6 py-3 rounded-lg shadow-lg z-50"></div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);
            
            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showNotification('✅ Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/app';
                    }, 1000);
                } else {
                    throw new Error(data.detail || 'Login failed');
                }
            } catch (error) {
                showNotification('❌ ' + error.message, 'error');
            }
        });
        
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.className = 'fixed bottom-6 right-6 px-6 py-3 rounded-lg shadow-lg z-50 text-white ' + 
                (type === 'success' ? 'bg-green-600' : 'bg-red-600');
            notification.innerText = message;
            notification.classList.remove('hidden');
            setTimeout(() => notification.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
