<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B2A">
    <title>Settings - EchoStack</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <style>
        .settings-content { max-width:600px; margin:0 auto; padding:24px; }
        .settings-section { background:var(--main-card); border:1px solid var(--main-border); border-radius:var(--radius-lg); padding:24px; margin-bottom:20px; }
        .settings-section h3 { font-family:'Playfair Display',serif; font-size:1.2rem; margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid var(--main-border); }
        .setting-item { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--main-border); }
        .setting-item:last-child { border-bottom:none; }
        .setting-label { font-weight:500; }
        .setting-desc { font-size:0.8rem; color:var(--main-text-secondary); }
        .toggle { width:48px; height:26px; border-radius:13px; background:var(--main-border); position:relative; cursor:pointer; transition:all 0.2s; }
        .toggle.active { background:var(--gold); }
        .toggle::after { content:''; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:white; transition:all 0.2s; }
        .toggle.active::after { left:25px; }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    
    <div class="main-wrapper">
        <header class="topbar">
            <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="topbar-title">Settings</div>
            <a href="/dashboard" class="topbar-btn"><i class="fas fa-home"></i></a>
        </header>
        
        <main class="main-content">
            <div class="settings-content">
                <div class="settings-section">
                    <h3>Notifications</h3>
                    <div class="setting-item">
                        <div>
                            <div class="setting-label">Email Notifications</div>
                            <div class="setting-desc">Receive updates via email</div>
                        </div>
                        <div class="toggle active" onclick="this.classList.toggle('active')"></div>
                    </div>
                    <div class="setting-item">
                        <div>
                            <div class="setting-label">Push Notifications</div>
                            <div class="setting-desc">Get notified about new content</div>
                        </div>
                        <div class="toggle active" onclick="this.classList.toggle('active')"></div>
                    </div>
                </div>
                
                <div class="settings-section">
                    <h3>Privacy</h3>
                    <div class="setting-item">
                        <div>
                            <div class="setting-label">Show Follower Count</div>
                            <div class="setting-desc">Display your follower count on profile</div>
                        </div>
                        <div class="toggle active" onclick="this.classList.toggle('active')"></div>
                    </div>
                    <div class="setting-item">
                        <div>
                            <div class="setting-label">Show Post Stats</div>
                            <div class="setting-desc">Display likes and comments counts</div>
                        </div>
                        <div class="toggle active" onclick="this.classList.toggle('active')"></div>
                    </div>
                </div>
                
                <div class="settings-section">
                    <h3>Account</h3>
                    <a href="/user-profile" class="btn btn-secondary" style="width:100%;margin-bottom:12px">
                        <i class="fas fa-user"></i> Edit Profile
                    </a>
                    <a href="/premium" class="btn btn-secondary" style="width:100%;margin-bottom:12px">
                        <i class="fas fa-crown"></i> Manage Subscription
                    </a>
                    <button class="btn btn-danger" style="width:100%" onclick="confirmDelete()">
                        <i class="fas fa-trash"></i> Delete Account
                    </button>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

function confirmDelete() {
    if (confirm('Are you sure you want to delete your account? This action cannot be undone.')) {
        alert('Account deletion requested. This will be processed within 24 hours.');
    }
}
</script>
</body>
</html>
