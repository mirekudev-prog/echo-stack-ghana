<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D1B2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Following — EchoStack</title>
<link rel="icon" type="image/png" href="/echostack-logo.png">
<style>
:root{--ink:#1a1e29;--blue:#0077b6;--gold:#C8962E;--cream:#f5f5f5;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
.sidebar{width:240px;background:var(--ink);color:white;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;padding:20px;}
.main{margin-left:240px;padding:40px;max-width:800px;}
.page-title{font-size:1.6rem;font-weight:700;margin-bottom:16px;color:var(--ink);}
.card{background:white;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.user-info{display:flex;align-items:center;gap:12px;}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#E8B84B);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink);font-size:1rem;}
.name{font-weight:600;}
.meta{font-size:0.8rem;color:#666;}
.btn{padding:6px 14px;background:var(--blue);color:white;border:none;border-radius:6px;cursor:pointer;font-size:0.8rem;}
.empty{text-align:center;padding:60px;color:#888;}
.loading{display:inline-block;width:20px;height:20px;border:2px solid #ccc;border-top:2px solid var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="sidebar">
  <div style="margin-bottom:24px;"><strong>EchoStack</strong></div>
  <a href="/app" style="display:block;padding:10px;color:#aaa;text-decoration:none;">🏠 Home</a>
  <a href="/explore" style="display:block;padding:10px;color:#aaa;text-decoration:none;">🔍 Explore</a>
  <a href="/chat" style="display:block;padding:10px;color:#aaa;text-decoration:none;">💬 Chat</a>
  <a href="/dashboard" style="display:block;padding:10px;color:#aaa;text-decoration:none;">📊 Dashboard</a>
  <a href="/subscriptions" style="display:block;padding:10px;color:#aaa;text-decoration:none;">🔔 Subscriptions</a>
  <a href="/following" style="display:block;padding:10px;color:white;font-weight:600;">👥 Following</a>
  <a href="/activity" style="display:block;padding:10px;color:#aaa;text-decoration:none;">📈 Activity</a>
</div>

<div class="main">
  <h1 class="page-title">Following</h1>
  <p style="color:#666;margin-bottom:24px;">Creators and heritage keepers you follow on EchoStack.</p>

  <div id="following-container" class="empty">
    <div class="loading"></div>
    <p>Loading your following list...</p>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const user = localStorage.getItem('es_user');
  if (!user) {
    window.location.href = '/user-login';
    return;
  }

  try {
    const res = await fetch('/api/following');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const container = document.getElementById('following-container');
    if (!data || data.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <div style="font-size:2.5rem;color:#ccc;">🔍</div>
          <h3>You're not following anyone yet</h3>
          <p>Discover Ghana heritage creators and follow them to stay updated.</p>
          <a href="/explore" class="btn" style="margin-top:12px;">Find Creators</a>
        </div>`;
      return;
    }

    let html = '';
    data.forEach(u => {
      html += `
        <div class="card">
          <div class="user-info">
            <div class="avatar">${u.username?.charAt(0)?.toUpperCase() || '?'}</div>
            <div>
              <div class="name">@${u.username}</div>
              <div class="meta">${u.role} • ${u.post_count || 0} posts</div>
            </div>
          </div>
          <button onclick="toggleFollow('${u.id}')" class="btn" style="margin-top:12px;">
            Unfollow
          </button>
        </div>
      `;
    });
    container.innerHTML = html;

  } catch (err) {
    console.error('Following load error:', err);
    document.getElementById('following-container').innerHTML = `
      <div class="empty">
        <div style="font-size:2.5rem;color:#f87171;">⚠️</div>
        <h3>Couldn't load following list</h3>
        <p>${err.message}</p>
        <button onclick="location.reload()" class="btn">Retry</button>
      </div>`;
  }
});

async function toggleFollow(id) {
  try {
    const res = await fetch(`/api/follow/${id}`, { method: 'POST' });
    const data = await res.json();
    if (data.success && data.action === 'unfollowed') {
      alert('You unfollowed this creator.');
      location.reload();
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}
</script>
</body>
</html>
