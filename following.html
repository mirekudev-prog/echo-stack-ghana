<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B2A">
    <title>Following - EchoStack</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <style>
        .following-wrap { padding: 16px; }
        .creator-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: var(--main-card);
            border: 1px solid var(--main-border);
            border-radius: var(--radius-lg);
            margin-bottom: 10px;
            transition: all .2s;
        }
        .creator-card:hover { border-color: var(--gold); box-shadow: 0 2px 8px rgba(200,150,46,.08); }
        .creator-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            background: linear-gradient(135deg,var(--gold),var(--gold2));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 700; color: var(--ink); flex-shrink: 0;
        }
        .creator-info { flex: 1; min-width: 0; }
        .creator-name { font-weight: 600; font-size: .95rem; color: var(--main-text); }
        .creator-handle { font-size: .8rem; color: var(--main-muted); }
        .creator-posts { font-size: .75rem; color: var(--main-muted); margin-top: 2px; }
        .btn-follow {
            padding: 8px 18px; border-radius: 50px;
            background: linear-gradient(135deg,var(--gold),var(--gold2));
            color: var(--ink); font-weight: 600; font-size: .8rem;
            border: none; cursor: pointer; transition: all .2s; min-height: 36px;
        }
        .btn-follow.following {
            background: var(--main-bg); color: var(--main-muted); border: 1px solid var(--main-border);
        }
    </style>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
</head>
<body>
<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/" class="sidebar-logo">
                <img src="/echostack-logo.png" alt="EchoStack" onerror="this.style.display='none'">
                <span>EchoStack</span>
            </a>
        </div>
        <div class="sidebar-user" id="sidebarUser">
            <div class="sidebar-avatar" id="sidebarAvatar">U</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sidebarName">User</div>
                <div class="sidebar-user-badge badge-free" id="sidebarBadge">Free</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section">
                <a href="/dashboard" class="sidebar-link"><i class="fas fa-home"></i><span>Feed</span></a>
                <a href="/reels" class="sidebar-link"><i class="fas fa-film"></i><span>Reels</span></a>
                <a href="/explore" class="sidebar-link"><i class="fas fa-compass"></i><span>Explore</span></a>
                <a href="/archive" class="sidebar-link"><i class="fas fa-archive"></i><span>Archive</span></a>
                <a href="/app" class="sidebar-link"><i class="fas fa-map-marked-alt"></i><span>Map</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Social</div>
                <a href="/following" class="sidebar-link active"><i class="fas fa-user-friends"></i><span>Following</span></a>
                <a href="/messages" class="sidebar-link"><i class="fas fa-envelope"></i><span>Messages</span></a>
                <a href="/notifications" class="sidebar-link"><i class="fas fa-bell"></i><span>Notifications</span></a>
                <a href="/chat" class="sidebar-link"><i class="fas fa-users"></i><span>Community Chat</span></a>
                <a href="/chatbot" class="sidebar-link"><i class="fas fa-robot"></i><span>EchoBot AI</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Create</div>
                <a href="/creator" class="sidebar-link"><i class="fas fa-plus-circle"></i><span>Create Post</span></a>
                <a href="/premium" class="sidebar-link"><i class="fas fa-crown"></i><span>Premium</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Account</div>
                <a href="/user-profile" class="sidebar-link"><i class="fas fa-user"></i><span>My Profile</span></a>
                <a href="/settings" class="sidebar-link"><i class="fas fa-cog"></i><span>Settings</span></a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <button class="sidebar-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Sign Out</span></button>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="main-wrapper">
        <header class="topbar">
            <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="topbar-title">Following</div>
            <div class="topbar-actions">
                <a href="/notifications" class="topbar-btn"><i class="fas fa-bell"></i></a>
                <a href="/chatbot" class="topbar-btn"><i class="fas fa-robot"></i></a>
            </div>
        </header>

        <main class="main-content">
            <div class="following-wrap" id="followingList">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </main>
    </div>
</div>

<script src="/js/common.js"></script>
<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
}

async function logout() {
    await fetch('/api/users/logout', { method: 'POST', credentials: 'include' });
    localStorage.removeItem('es_user');
    location.href = '/';
}

async function checkAuth() {
    try {
        const res = await fetch('/api/users/me', { credentials: 'include' });
        if (res.ok) {
            const user = await res.json();
            const initial = (user.username || 'U').charAt(0).toUpperCase();
            if (document.getElementById('sidebarAvatar')) document.getElementById('sidebarAvatar').textContent = initial;
            if (document.getElementById('sidebarName')) document.getElementById('sidebarName').textContent = user.full_name || user.username;
            const badge = document.getElementById('sidebarBadge');
            if (badge) {
                if (user.role === 'admin' || user.role === 'superuser') { badge.className = 'sidebar-user-badge badge-admin'; badge.textContent = 'Admin'; }
                else if (user.role === 'creator') { badge.className = 'sidebar-user-badge badge-creator'; badge.textContent = 'Creator'; }
                else if (user.is_premium) { badge.className = 'sidebar-user-badge badge-premium'; badge.textContent = 'Premium'; }
            }
            loadFollowing(user.id);
        } else {
            location.href = '/user-login';
        }
    } catch(e) {
        location.href = '/user-login';
    }
}

async function loadFollowing(userId) {
    const container = document.getElementById('followingList');
    try {
        const res = await fetch(`/api/users/${userId}/following`, { credentials: 'include' });
        if (!res.ok) throw new Error();
        const users = await res.json();

        if (!users.length) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-user-friends"></i><h3>Not following anyone yet</h3><p>Discover creators from the Explore page!</p></div>';
            return;
        }

        container.innerHTML = users.map(u => {
            const initial = (u.username || 'U').charAt(0).toUpperCase();
            return '<div class="creator-card">' +
                '<div class="creator-avatar">' + initial + '</div>' +
                '<div class="creator-info">' +
                    '<div class="creator-name">' + escapeHtml(u.full_name || u.username) + '</div>' +
                    '<div class="creator-handle">@' + escapeHtml(u.username) + '</div>' +
                    '<div class="creator-posts">' + (u.post_count || 0) + ' posts</div>' +
                '</div>' +
                '<button class="btn-follow following" onclick="unfollow(\'' + (u.id || '') + '\', this)">Following</button>' +
            '</div>';
        }).join('');
    } catch(e) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-wifi"></i><h3>Connection error</h3></div>';
    }
}

async function unfollow(userId, btn) {
    try {
        await fetch('/api/follow/' + userId, { method: 'DELETE', credentials: 'include' });
        btn.closest('.creator-card').remove();
    } catch(e) {}
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

checkAuth();

// Service Worker Registration
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
}
</script>
</body>
</html>
