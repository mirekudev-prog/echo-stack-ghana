<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B2A">
    <title>Profile - EchoStack</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <style>
        .profile-header{padding:24px 16px;text-align:center;border-bottom:1px solid var(--border)}
        .profile-avatar{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:700;color:var(--ink);margin:0 auto 16px;overflow:hidden}
        .profile-avatar img{width:100%;height:100%;object-fit:cover}
        .profile-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;margin-bottom:4px}
        .profile-username{color:var(--text-muted);font-size:.9rem;margin-bottom:16px}
        .profile-stats{display:flex;justify-content:center;gap:32px;margin-bottom:20px}
        .stat{text-align:center}
        .stat-value{font-size:1.2rem;font-weight:700;color:var(--gold)}
        .stat-label{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
        .profile-actions{display:flex;gap:12px;justify-content:center}
        .profile-actions .btn{padding:10px 24px;font-size:.85rem}
        .profile-bio{padding:16px;font-size:.9rem;color:var(--text-secondary);line-height:1.6;border-bottom:1px solid var(--border)}
        .profile-section{padding:16px}
        .profile-section-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:12px}
    </style>
</head>
<body>
<div class="app">
    <nav class="top-nav">
        <div class="top-nav-inner">
            <a href="/dashboard" class="nav-logo">
                <img src="/echostack-logo.png" alt="EchoStack" onerror="this.style.display='none'">
                <span>EchoStack</span>
            </a>
            <div class="nav-title">Profile</div>
            <a href="/settings" class="nav-icon-btn"><i class="fas fa-cog"></i></a>
        </div>
    </nav>
    
    <main class="main-content">
        <div id="profileContent">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </main>
    
    <nav class="bottom-nav">
        <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="/explore" class="nav-item"><i class="fas fa-compass"></i><span>Explore</span></a>
        <a href="/creator" class="nav-item"><i class="fas fa-plus-square"></i><span>Post</span></a>
        <a href="/messages" class="nav-item"><i class="fas fa-envelope"></i><span>Chat</span></a>
        <a href="/user-profile" class="nav-item active"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>
</div>

<div class="toast" id="toast"></div>

<script>
let currentUser = null;

function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 2500);
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function timeAgo(dateStr) {
    if (!dateStr) return '';
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 60) return Math.floor(diff) + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
}

async function loadProfile() {
    try {
        const res = await fetch('/api/users/me', { credentials: 'include' });
        if (!res.ok) throw new Error('Not logged in');
        currentUser = await res.json();
        renderProfile();
    } catch(e) {
        location.href = '/user-login';
    }
}

async function renderProfile() {
    const container = document.getElementById('profileContent');
    const initial = (currentUser.username || 'U').charAt(0).toUpperCase();
    const avatarUrl = currentUser.avatar_url || '';
    
    container.innerHTML = `
        <div class="profile-header">
            <div class="profile-avatar">
                ${avatarUrl ? `<img src="${escapeHtml(avatarUrl)}" alt="">` : initial}
            </div>
            <div class="profile-name">${escapeHtml(currentUser.full_name || currentUser.username)}</div>
            <div class="profile-username">@${escapeHtml(currentUser.username)}</div>
            <div class="profile-stats">
                <div class="stat"><div class="stat-value" id="postCount">-</div><div class="stat-label">Posts</div></div>
                <div class="stat"><div class="stat-value" id="followerCount">-</div><div class="stat-label">Followers</div></div>
                <div class="stat"><div class="stat-value" id="followingCount">-</div><div class="stat-label">Following</div></div>
            </div>
            <div class="profile-actions">
                <a href="/settings" class="btn btn-secondary"><i class="fas fa-edit"></i> Edit Profile</a>
            </div>
        </div>
        ${currentUser.bio ? `<div class="profile-bio">${escapeHtml(currentUser.bio)}</div>` : ''}
        <div class="profile-section">
            <div class="profile-section-title">Your Posts</div>
            <div id="userPosts"><div class="loading"><div class="spinner"></div></div></div>
        </div>
        <div class="footer">
            <div class="nav-logo" style="justify-content:center;margin-bottom:8px"><img src="/echostack-logo.png" alt="EchoStack" onerror="this.style.display='none'"><span>EchoStack Ghana</span></div>
            <p class="footer-dev">Built by Mireku Development</p>
        </div>
    `;
    
    loadUserPosts();
    loadStats();
}

async function loadStats() {
    try {
        const [postsRes, followersRes, followingRes] = await Promise.all([
            fetch(`/api/posts?user_id=${currentUser.id}&limit=0`),
            fetch(`/api/users/${currentUser.id}/followers`),
            fetch(`/api/users/${currentUser.id}/following`)
        ]);
        
        const posts = await postsRes.json();
        const followers = await followersRes.json();
        const following = await followingRes.json();
        
        document.getElementById('postCount').textContent = posts.length || 0;
        document.getElementById('followerCount').textContent = followers.length || 0;
        document.getElementById('followingCount').textContent = following.length || 0;
    } catch(e) {}
}

async function loadUserPosts() {
    try {
        const res = await fetch(`/api/posts?user_id=${currentUser.id}&limit=20`);
        const posts = await res.json();
        const container = document.getElementById('userPosts');
        
        if (!posts.length) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-pen-fancy"></i><h3>No posts yet</h3><p>Share your first story!</p></div>';
            return;
        }
        
        container.innerHTML = posts.map(post => `
            <div class="post-card" onclick="location.href='/post/${post.id}'">
                <h3 class="post-title">${escapeHtml(post.title)}</h3>
                <p class="post-excerpt">${escapeHtml(post.excerpt || '')}</p>
                <div class="post-time">${timeAgo(post.created_at)}</div>
            </div>
        `).join('');
    } catch(e) {
        document.getElementById('userPosts').innerHTML = '<div class="empty-state"><i class="fas fa-wifi"></i><h3>Connection error</h3></div>';
    }
}

loadProfile();
</script>
</body>
</html>
