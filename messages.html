<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B2A">
    <title>Messages - EchoStack</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/font-awesome.css">
    <link rel="stylesheet" href="/css/base.css">
    <style>
        .msg-list{padding:0}
        .msg-item{display:flex;gap:12px;padding:16px;border-bottom:1px solid var(--main-border);cursor:pointer;transition:.2s}
        .msg-item:hover{background:var(--main-hover)}
        .msg-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:var(--ink);flex-shrink:0;overflow:hidden}
        .msg-avatar img{width:100%;height:100%;object-fit:cover}
        .msg-content{flex:1;min-width:0}
        .msg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
        .msg-name{font-weight:600;font-size:.95rem;color:var(--main-text)}
        .msg-time{font-size:.75rem;color:var(--main-muted)}
        .msg-preview{font-size:.85rem;color:var(--main-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .msg-unread{width:10px;height:10px;border-radius:50%;background:var(--gold);flex-shrink:0;align-self:center}
        .chat-view-wrap{background:var(--main-card);border:1px solid var(--main-border);border-radius:var(--radius-lg);overflow:hidden;margin:16px}
        .chat-view{display:none;flex-direction:column;height:calc(100vh - 88px)}
        .chat-view.active{display:flex}
        .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--main-bg)}
        .chat-msg{max-width:80%;padding:12px 16px;border-radius:16px;font-size:.9rem;line-height:1.5}
        .chat-msg.received{background:var(--main-card);border:1px solid var(--main-border);align-self:flex-start;border-bottom-left-radius:4px;color:var(--main-text)}
        .chat-msg.sent{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);align-self:flex-end;border-bottom-right-radius:4px}
        .chat-input-area{padding:12px 16px;border-top:1px solid var(--main-border);display:flex;gap:12px;background:var(--main-card)}
        .chat-input{flex:1;padding:12px 16px;background:var(--main-bg);border:1px solid var(--main-border);border-radius:24px;color:var(--main-text);font-family:inherit;font-size:.95rem;outline:none}
        .chat-input:focus{border-color:var(--gold)}
        .chat-send{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;cursor:pointer;border:none}
        .back-to-list{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--main-border);cursor:pointer;color:var(--main-muted);font-size:.9rem}
        .back-to-list:hover{color:var(--main-text)}
        .list-view-wrap{background:var(--main-card);border:1px solid var(--main-border);border-radius:var(--radius-lg);overflow:hidden;margin:16px}
    </style>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
</head>
<body>
<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/" class="sidebar-logo">
                <img src="/echostack-logo.png" alt="EchoStack" onerror="this.style.display='none'">
                <span>EchoStack</span>
            </a>
        </div>
        <div class="sidebar-user" id="sidebarUser">
            <div class="sidebar-avatar" id="sidebarAvatar">U</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sidebarName">User</div>
                <div class="sidebar-user-badge badge-free" id="sidebarBadge">Free</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section">
                <a href="/dashboard" class="sidebar-link"><i class="fas fa-home"></i><span>Feed</span></a>
                <a href="/reels" class="sidebar-link"><i class="fas fa-film"></i><span>Reels</span></a>
                <a href="/explore" class="sidebar-link"><i class="fas fa-compass"></i><span>Explore</span></a>
                <a href="/archive" class="sidebar-link"><i class="fas fa-archive"></i><span>Archive</span></a>
                <a href="/app" class="sidebar-link"><i class="fas fa-map-marked-alt"></i><span>Map</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Social</div>
                <a href="/following" class="sidebar-link"><i class="fas fa-user-friends"></i><span>Following</span></a>
                <a href="/messages" class="sidebar-link active"><i class="fas fa-envelope"></i><span>Messages</span></a>
                <a href="/notifications" class="sidebar-link"><i class="fas fa-bell"></i><span>Notifications</span></a>
                <a href="/chat" class="sidebar-link"><i class="fas fa-users"></i><span>Community Chat</span></a>
                <a href="/chatbot" class="sidebar-link"><i class="fas fa-robot"></i><span>EchoBot AI</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Create</div>
                <a href="/creator" class="sidebar-link"><i class="fas fa-plus-circle"></i><span>Create Post</span></a>
                <a href="/premium" class="sidebar-link"><i class="fas fa-crown"></i><span>Premium</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Account</div>
                <a href="/user-profile" class="sidebar-link"><i class="fas fa-user"></i><span>My Profile</span></a>
                <a href="/settings" class="sidebar-link"><i class="fas fa-cog"></i><span>Settings</span></a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <button class="sidebar-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Sign Out</span></button>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="main-wrapper">
        <header class="topbar">
            <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="topbar-title" id="viewTitle">Messages</div>
            <div class="topbar-actions">
                <a href="/notifications" class="topbar-btn"><i class="fas fa-bell"></i></a>
                <a href="/chatbot" class="topbar-btn"><i class="fas fa-robot"></i></a>
            </div>
        </header>

        <main class="main-content">
        <div class="list-view-wrap">
        <div id="listView">
            <div id="msgList">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
        </div>
        <div class="chat-view-wrap">
        <div class="chat-view" id="chatView">
            <div class="back-to-list" onclick="showList()">
                <i class="fas fa-arrow-left"></i> Back to messages
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMsg()">
                <button class="chat-send" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        </div>
    </main>
    </div>
</div>

<script src="/js/common.js"></script>
<script>
let user = null;
let activeChat = null;

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
}

async function logout() {
    await fetch('/api/users/logout', { method: 'POST', credentials: 'include' });
    localStorage.removeItem('es_user');
    location.href = '/';
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function timeAgo(dateStr) {
    if (!dateStr) return '';
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 60) return Math.floor(diff) + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
}

function formatTime(dateStr) {
    if (!dateStr) return '';
    const time = new Date(dateStr);
    return time.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

async function loadUser() {
    try {
        const res = await fetch('/api/users/me', { credentials: 'include' });
        if (res.ok) {
            user = await res.json();
            loadConversations();
        } else {
            location.href = '/user-login';
        }
    } catch(e) {
        location.href = '/user-login';
    }
}

async function loadConversations() {
    try {
        const res = await fetch('/api/messages');
        const convos = await res.json();
        const container = document.getElementById('msgList');
        
        if (!convos.length) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-envelope-open"></i><h3>No messages yet</h3><p>Start a conversation with someone!</p></div>';
            return;
        }
        
        container.innerHTML = convos.map(c => {
            const initial = (c.username || 'U').charAt(0).toUpperCase();
            return `
                <div class="msg-item" onclick="openChat('${c.user_id}', '${escapeHtml(c.username)}')">
                    <div class="msg-avatar">${initial}</div>
                    <div class="msg-content">
                        <div class="msg-header">
                            <div class="msg-name">${escapeHtml(c.username)}</div>
                            <div class="msg-time">${timeAgo(c.last_message_at)}</div>
                        </div>
                        <div class="msg-preview">${escapeHtml(c.last_message || 'Start chatting...')}</div>
                    </div>
                    ${c.unread ? '<div class="msg-unread"></div>' : ''}
                </div>
            `;
        }).join('');
    } catch(e) {
        document.getElementById('msgList').innerHTML = '<div class="empty-state"><i class="fas fa-wifi"></i><h3>Connection error</h3></div>';
    }
}

function showList() {
    document.getElementById('listView').style.display = 'block';
    document.getElementById('chatView').classList.remove('active');
    document.getElementById('viewTitle').textContent = 'Messages';
    activeChat = null;
}

async function openChat(userId, username) {
    activeChat = userId;
    document.getElementById('listView').style.display = 'none';
    document.getElementById('chatView').classList.add('active');
    document.getElementById('viewTitle').textContent = username;
    loadChatMessages();
}

async function loadChatMessages() {
    if (!activeChat) return;
    try {
        const res = await fetch(`/api/messages/${activeChat}`);
        const msgs = await res.json();
        const container = document.getElementById('chatMessages');
        
        if (!msgs.length) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-comments"></i><h3>No messages yet</h3><p>Say hello!</p></div>';
            return;
        }
        
        container.innerHTML = msgs.map(m => `
            <div class="chat-msg ${m.sender_id === user.id ? 'sent' : 'received'}">
                ${escapeHtml(m.content)}
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    } catch(e) {}
}

async function sendMsg() {
    if (!activeChat) return;
    const input = document.getElementById('chatInput');
    const content = input.value.trim();
    if (!content) return;
    input.value = '';
    
    try {
        await fetch(`/api/messages/${activeChat}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `content=${encodeURIComponent(content)}`
        });
        loadChatMessages();
    } catch(e) {}
}

loadUser();

// Service Worker Registration
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
}
</script>
</body>
</html>
