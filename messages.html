<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B2A">
    <title>Messages - EchoStack</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <style>
        .msg-list{padding:0}
        .msg-item{display:flex;gap:12px;padding:16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.2s}
        .msg-item:hover{background:var(--card)}
        .msg-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:var(--ink);flex-shrink:0;overflow:hidden}
        .msg-avatar img{width:100%;height:100%;object-fit:cover}
        .msg-content{flex:1;min-width:0}
        .msg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
        .msg-name{font-weight:600;font-size:.95rem}
        .msg-time{font-size:.75rem;color:var(--text-muted)}
        .msg-preview{font-size:.85rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .msg-unread{width:10px;height:10px;border-radius:50%;background:var(--gold);flex-shrink:0;align-self:center}
        .chat-view{display:none;flex-direction:column;height:calc(100vh - 130px)}
        .chat-view.active{display:flex}
        .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
        .chat-msg{max-width:80%;padding:12px 16px;border-radius:16px;font-size:.9rem;line-height:1.5}
        .chat-msg.received{background:var(--card);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
        .chat-msg.sent{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);align-self:flex-end;border-bottom-right-radius:4px}
        .chat-input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:12px}
        .chat-input{flex:1;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:24px;color:var(--text);font-family:inherit;font-size:.95rem;outline:none}
        .chat-input:focus{border-color:var(--gold)}
        .chat-send{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0}
        .back-to-list{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;color:var(--text-secondary);font-size:.9rem}
        .back-to-list:hover{color:var(--text)}
    </style>
</head>
<body>
<div class="app">
    <nav class="top-nav">
        <div class="top-nav-inner">
            <a href="/dashboard" class="nav-logo">
                <img src="/echostack-logo.png" alt="EchoStack" onerror="this.style.display='none'">
                <span>EchoStack</span>
            </a>
            <div class="nav-title" id="viewTitle">Messages</div>
        </div>
    </nav>
    
    <main class="main-content">
        <div id="listView">
            <div id="msgList">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
        <div class="chat-view" id="chatView">
            <div class="back-to-list" onclick="showList()">
                <i class="fas fa-arrow-left"></i> Back to messages
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMsg()">
                <button class="chat-send" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
    
    <nav class="bottom-nav">
        <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="/explore" class="nav-item"><i class="fas fa-compass"></i><span>Explore</span></a>
        <a href="/creator" class="nav-item"><i class="fas fa-plus-square"></i><span>Post</span></a>
        <a href="/messages" class="nav-item active"><i class="fas fa-envelope"></i><span>Chat</span></a>
        <a href="/user-profile" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>
</div>

<script>
let user = null;
let activeChat = null;

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function timeAgo(dateStr) {
    if (!dateStr) return '';
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 60) return Math.floor(diff) + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
}

function formatTime(dateStr) {
    if (!dateStr) return '';
    const time = new Date(dateStr);
    return time.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

async function loadUser() {
    try {
        const res = await fetch('/api/users/me', { credentials: 'include' });
        if (res.ok) {
            user = await res.json();
            loadConversations();
        } else {
            location.href = '/user-login';
        }
    } catch(e) {
        location.href = '/user-login';
    }
}

async function loadConversations() {
    try {
        const res = await fetch('/api/messages');
        const convos = await res.json();
        const container = document.getElementById('msgList');
        
        if (!convos.length) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-envelope-open"></i><h3>No messages yet</h3><p>Start a conversation with someone!</p></div>';
            return;
        }
        
        container.innerHTML = convos.map(c => {
            const initial = (c.username || 'U').charAt(0).toUpperCase();
            return `
                <div class="msg-item" onclick="openChat('${c.user_id}', '${escapeHtml(c.username)}')">
                    <div class="msg-avatar">${initial}</div>
                    <div class="msg-content">
                        <div class="msg-header">
                            <div class="msg-name">${escapeHtml(c.username)}</div>
                            <div class="msg-time">${timeAgo(c.last_message_at)}</div>
                        </div>
                        <div class="msg-preview">${escapeHtml(c.last_message || 'Start chatting...')}</div>
                    </div>
                    ${c.unread ? '<div class="msg-unread"></div>' : ''}
                </div>
            `;
        }).join('');
    } catch(e) {
        document.getElementById('msgList').innerHTML = '<div class="empty-state"><i class="fas fa-wifi"></i><h3>Connection error</h3></div>';
    }
}

function showList() {
    document.getElementById('listView').style.display = 'block';
    document.getElementById('chatView').classList.remove('active');
    document.getElementById('viewTitle').textContent = 'Messages';
    activeChat = null;
}

async function openChat(userId, username) {
    activeChat = userId;
    document.getElementById('listView').style.display = 'none';
    document.getElementById('chatView').classList.add('active');
    document.getElementById('viewTitle').textContent = username;
    loadChatMessages();
}

async function loadChatMessages() {
    if (!activeChat) return;
    try {
        const res = await fetch(`/api/messages/${activeChat}`);
        const msgs = await res.json();
        const container = document.getElementById('chatMessages');
        
        if (!msgs.length) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-comments"></i><h3>No messages yet</h3><p>Say hello!</p></div>';
            return;
        }
        
        container.innerHTML = msgs.map(m => `
            <div class="chat-msg ${m.sender_id === user.id ? 'sent' : 'received'}">
                ${escapeHtml(m.content)}
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    } catch(e) {}
}

async function sendMsg() {
    if (!activeChat) return;
    const input = document.getElementById('chatInput');
    const content = input.value.trim();
    if (!content) return;
    input.value = '';
    
    try {
        await fetch(`/api/messages/${activeChat}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `content=${encodeURIComponent(content)}`
        });
        loadChatMessages();
    } catch(e) {}
}

loadUser();
</script>
</body>
</html>
