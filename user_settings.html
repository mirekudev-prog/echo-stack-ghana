<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/css/base.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Account Settings — EchoStack</title>
<link rel="icon" type="image/png" href="/echostack-logo.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root{
  --ink:#0D1B2A;--gold:#C8962E;--gold2:#E8B84B;--cream:#FAF6EF;--muted:#94A3B8;--blue:#0077b6;--border:#E2E8F0;--surface:#0f1e2d;--success:#16A34A;--danger:#DC2626;--white:#fff;--sidebar-w:260px
}
body { font-family: Georgia, serif; background: var(--cream); color: var(--ink); min-height: 100vh; display: flex; }
.sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: var(--sidebar-w); background: var(--ink); color: white; z-index: 1000; overflow-y: auto; padding: 20px; }
.logo { font-size: 1.3rem; font-weight: bold; color: white; margin-bottom: 20px; display: block; text-decoration: none; }
.logo span { font-size: 0.95rem; color: rgba(255,255,255,.7); font-weight: normal; }
.menu-item { display: block; padding: 10px 15px; color: rgba(255,255,255,.7); text-decoration: none; margin-bottom: 5px; transition: 0.2s; }
.menu-item:hover, .menu-item.active { background: rgba(255,255,255,.1); color: white; }
.logout-btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; background: rgba(220,38,38,.15); border: 1px solid rgba(220,38,38,.3); color: #f87171; text-decoration: none; margin-top: 20px; border-radius: 8px; font-size: 0.85rem; transition: 0.2s; }
.logout-btn:hover { background: rgba(220,38,38,.3); color: white; }
.main-wrapper { margin-left: var(--sidebar-w); flex: 1; padding: 40px; max-width: 800px; }
.page-title { color: var(--ink); margin-bottom: 30px; font-size: 1.8rem; font-weight: 700; }
.card { background:white; border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,.04); }
.card h3 { color: var(--ink); margin-bottom: 20px; font-size: 1.1rem; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
.field { margin-bottom: 15px; }
label { display: block; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #666; margin-bottom: 8px; }
input[type="text"], input[type="email"] { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.95rem; transition: border-color 0.2s; }
input:focus, textarea:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 0 3px rgba(0,119,182,.1); }
textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.95rem; min-height: 100px; resize: vertical; transition: border-color 0.2s; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border-radius: 9px; font-weight: 700; cursor: pointer; border: none; margin-right: 10px; transition: 0.2s; text-decoration: none; }
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-gold { background: linear-gradient(135deg,#c9933a,#e8b45a); color: var(--ink); }
.btn-outline { background:white; color: var(--ink); border: 1.5px solid var(--border); }
.btn-danger { background: #fef2f2; color: var(--danger); border: 1.5px solid #fecaca; }
.btn-sm { padding: 8px 16px; font-size: 0.85rem; }
@media(max-width: 768px) { .sidebar { transform: translateX(-100%); position: fixed; z-index: 1000; } .main-wrapper { margin-left: 0; padding: 20px; } }
.success-msg { background: #dcfce7; border: 1px solid #86efac; color: #15803d; padding: 12px; border-radius: 8px; margin-top: 10px; display: none; }
.error-msg { background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; padding: 12px; border-radius: 8px; margin-top: 10px; display: none; }
</style>
</head>
<body>
<!-- Sidebar -->
<aside class="sidebar">
  <a href="/" class="logo">EchoStack<span>Preserving Ghana's Stories</span></a>
  <nav>
    <a href="/app" class="menu-item">🏠 Home</a>
    <a href="/explore" class="menu-item">🔍 Explore</a>
    <a href="/dashboard" class="menu-item">📊 Dashboard</a>
    <a href="/creator" class="menu-item">✍️ Write Post</a>
    <a href="/activity" class="menu-item">📈 Activity</a>
    <a href="/following" class="menu-item">👥 Following</a>
    <a href="/subscriptions" class="menu-item active">⚙️ Settings</a>
    <a href="/premium" class="menu-item">⭐ Premium</a>
  </nav>
  <a href="/" onclick="logout()" class="logout-btn">🚪 Sign Out</a>
</aside>

<!-- Main Content -->
<div class="main-wrapper">
  <h1 class="page-title">⚙️ Account Settings</h1>
  
  <!-- Success/Error Messages -->
  <div id="success-message" class="success-msg"></div>
  <div id="error-message" class="error-msg"></div>
  
  <!-- Profile Section -->
  <div class="card">
    <h3>Edit Profile Information</h3>
    <form id="profile-form">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="full-name" placeholder="Enter your full name" autocomplete="given-name">
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" readonly style="background:#f9fafb;">
      </div>
      <div class="field">
        <label>Bio</label>
        <textarea id="bio" rows="4" placeholder="Tell us about yourself and your interests..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary">💾 Save Profile Changes</button>
      <button type="button" class="btn btn-outline" onclick="location.href='/app'">Cancel</button>
    </form>
  </div>
  
  <!-- Password Change Section -->
  <div class="card">
    <h3>Change Password</h3>
    <form id="password-form">
      <div class="field">
        <label>Current Password</label>
        <input type="password" id="current-password" placeholder="Enter your current password">
      </div>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Enter new password (min 6 characters)">
      </div>
      <div class="field">
        <label>Confirm New Password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter new password">
      </div>
      <button type="submit" class="btn btn-gold">🔐 Update Password</button>
      <button type="button" class="btn btn-outline" onclick="location.href='/app'">Cancel</button>
    </form>
  </div>
  
  <!-- Subscription Info -->
  <div class="card">
    <h3>Your Plan</h3>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;padding:12px;background:#eff6ff;border-radius:8px;">
      <span style="font-weight:600;font-size:0.9rem;">Current Plan:</span>
      <span id="plan-badge" style="padding:4px 12px;border-radius:12px;font-size:0.8rem;font-weight:600;" class="badge-free">Free Plan</span>
    </div>
    <button onclick="window.location.href='/premium'" class="btn btn-gold">⭐ Upgrade to Premium</button>
  </div>
</div>

<script>
// Load user data on page load
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const res = await fetch('/api/users/me');
    if (!res.ok) throw new Error('Failed to load user data');
    const data = await res.json();
    
    // Fill form fields
    document.getElementById('full-name').value = data.full_name || '';
    document.getElementById('email').value = data.email || '';
    document.getElementById('bio').value = data.bio || '';
    
    // Set plan badge
    const badge = document.getElementById('plan-badge');
    if (data.is_premium || data.role === 'admin' || data.role === 'superuser') {
      badge.textContent = 'Premium Member';
      badge.style.background = '#fef3c7';
      badge.style.color = '#b45309';
    } else {
      badge.textContent = 'Free Plan';
      badge.style.background = '#e5e7eb';
      badge.style.color = '#374151';
    }
  } catch(e) {
    console.error('Error loading profile:', e);
    showErrorMessage('Failed to load your profile information.');
  }
});

// Save profile form
document.getElementById('profile-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData();
  formData.append('bio', document.getElementById('bio').value.trim());
  // Note: Full name updates may require additional API endpoint implementation
  
  try {
    const res = await fetch('/api/users/me', {
      method: 'PUT',
      body: formData
    });
    
    if (res.ok) {
      showSuccessMessage('✅ Profile updated successfully!');
      setTimeout(() => {
        document.getElementById('success-message').style.display = 'none';
      }, 3000);
    } else {
      const err = await res.json();
      showErrorMessage(err.detail || 'Failed to update profile.');
    }
  } catch(error) {
    showErrorMessage('Network error. Please try again later.');
  }
});

// Password change form
document.getElementById('password-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const current = document.getElementById('current-password').value;
  const newPass = document.getElementById('new-password').value;
  const confirm = document.getElementById('confirm-password').value;
  
  if (!current || !newPass) {
    showErrorMessage('Please fill in all password fields.');
    return;
  }
  if (newPass.length < 6) {
    showErrorMessage('New password must be at least 6 characters.');
    return;
  }
  if (newPass !== confirm) {
    showErrorMessage('Passwords do not match.');
    return;
  }
  
  // For now, this is client-side validation only
  // A real password change would require a backend endpoint
  showSuccessMessage('⚠️ Password changes require admin verification. Contact support or upgrade to enable self-service.');
});

// Logout function
function logout() {
  fetch('/api/users/logout', {method: 'POST'});
  localStorage.removeItem('es_user');
  sessionStorage.clear();
}

// Show success message
function showSuccessMessage(text) {
  const el = document.getElementById('success-message');
  el.textContent = text;
  el.style.display = 'block';
}

// Show error message
function showErrorMessage(text) {
  const el = document.getElementById('error-message');
  el.textContent = text;
  el.style.display = 'block';
}
</script>

</body>
</html>
