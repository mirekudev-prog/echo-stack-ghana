<!-- Add this ABOVE the dashboard stats, right after the header -->
<div class="mb-6 flex justify-end">
    <button onclick="showNewRegionForm()" 
            style="background-color: #0077b6 !important; color: white !important;"
            class="px-6 py-3 rounded-lg font-bold transition hover:opacity-80">
        ➕ Create New Region
    </button>
</div>

<!-- Add this BELOW the empty-state section (the part with the map icon) -->
<div id="new-region-form" class="bg-white p-8 rounded-lg border border-gray-200 shadow-sm hidden" style="border-color: #e0e0e0 !important;">
    <div class="flex justify-between items-start mb-6">
        <h2 class="text-2xl font-bold" style="color: #1a1e29 !important;">Create New Region</h2>
        <button onclick="hideNewRegionForm()" class="text-gray-500 hover:text-black text-2xl">×</button>
    </div>
    
    <input type="hidden" id="region-id-new">
    
    <!-- (Copy all the same form fields from below into here) -->
    <!-- Same structure as edit-form but for new regions -->
    
    <!-- ACTION BUTTONS -->
    <div class="flex gap-4 mt-8 pt-6 border-t border-gray-200" style="border-color: #e0e0e0 !important;">
        <button onclick="saveNewRegion()" 
                style="background-color: #1a1e29 !important; color: white !important;"
                class="flex-1 py-3 rounded-lg font-bold transition hover:opacity-80">
            💾 Save New Region
        </button>
        <button onclick="hideNewRegionForm()" 
                style="border-color: #1a1e29 !important; color: #1a1e29 !important;"
                class="py-3 px-6 rounded-lg font-bold transition hover:bg-gray-50 border">
            Cancel
        </button>
    </div>
</div>
