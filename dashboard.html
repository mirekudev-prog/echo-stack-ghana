<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#0D1B2A">
<title>EchoStack – Ghana's Living Heritage</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0D1B2A;--gold:#C8962E;--gold2:#E8B84B;--surface:#f8fafc;--card:#ffffff;
  --border:#e2e8f0;--text:#1e293b;--muted:#64748b;--danger:#ef4444;--success:#22c55e;
  --hover:#f1f5f9;--shadow:0 2px 8px rgba(0,0,0,.06);--radius:16px;
}
html,body{height:100%;scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);
  padding-bottom:env(safe-area-inset-bottom);line-height:1.5;
}
.container{max-width:800px;margin:0 auto;padding:0 12px 90px;width:100%}

/* ===== STORIES BAR ===== */
.stories-bar{
  background:white;border-bottom:1px solid var(--border);padding:12px 0;
  overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;
  display:flex;gap:14px;scrollbar-width:thin;margin-bottom:16px;border-radius:0 0 var(--radius) var(--radius);
}
.story-item{display:inline-flex;flex-direction:column;align-items:center;width:72px;cursor:pointer}
.story-avatar{
  width:58px;height:58px;border-radius:50%;border:2.5px solid var(--gold);
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:white;
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;
  flex-shrink:0;box-shadow:0 2px 6px rgba(200,150,46,.2);
}
.story-name{font-size:.7rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72px;margin-top:6px;color:var(--text)}

/* ===== CREATE PROMPT ===== */
.create-prompt{
  background:white;border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow);
}
.create-prompt i{color:var(--gold);font-size:1.3rem;flex-shrink:0}
.create-prompt input{
  flex:1;border:none;outline:none;font-size:1rem;background:transparent;
  padding:10px 0;color:var(--text);min-height:44px;
}
.create-prompt input::placeholder{color:var(--muted)}
.create-prompt button{
  background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;
  border-radius:30px;padding:10px 20px;font-weight:700;color:var(--ink);
  cursor:pointer;min-height:44px;min-width:80px;transition:all .15s;
  font-size:.9rem;flex-shrink:0;
}
.create-prompt button:active{transform:scale(.98);opacity:.95}

/* ===== FILTER TABS ===== */
.filter-tabs{
  display:flex;gap:8px;overflow-x:auto;padding:8px 0 12px;margin-bottom:16px;
  scrollbar-width:thin;-webkit-overflow-scrolling:touch;
}
.filter-tab{
  background:white;border:1.5px solid var(--border);border-radius:30px;
  padding:8px 16px;font-size:.85rem;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:all .15s;color:var(--muted);
  min-height:40px;display:flex;align-items:center;
}
.filter-tab:active{transform:scale(.98)}
.filter-tab.active{
  background:var(--gold);border-color:var(--gold);color:white;
  box-shadow:0 2px 8px rgba(200,150,46,.3);
}

/* ===== POST CARD - MOBILE FIRST ===== */
.post-card{
  background:white;border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:16px;overflow:hidden;transition:all .2s;box-shadow:var(--shadow);
}
.post-card:active{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.1)}

/* Header */
.post-header{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.post-avatar{
  width:42px;height:42px;border-radius:50%;background:var(--hover);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;
}
.post-author-info{flex:1;min-width:0}
.post-author{font-weight:700;font-size:.95rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-time{font-size:.75rem;color:var(--muted);margin-top:2px}
.post-delete{color:var(--danger);background:none;border:none;font-size:.8rem;cursor:pointer;padding:6px 10px;border-radius:6px;min-height:36px}
.post-delete:active{background:rgba(239,68,68,.1)}

/* Media Container - CRITICAL FIX FOR OVERLAP */
.post-media{
  width:100%;position:relative;background:#000;
  display:flex;align-items:center;justify-content:center;
}
.post-media img,.post-media video{
  width:100%;display:block;max-height:500px;object-fit:cover;
}
.post-media video{background:#000}

/* Audio Card - SEPARATE CONTAINER, NO OVERLAP */
.card-audio{
  background:var(--hover);border-radius:12px;padding:14px 16px;
  margin:0 16px 16px;border:1px solid var(--border);
  display:block;clear:both;
}
.card-audio .audio-title{
  font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.card-audio audio{
  width:100%;height:40px;border-radius:30px;outline:none;
}
.card-audio audio::-webkit-media-controls-panel{background:var(--card)}
.card-audio audio::-webkit-media-controls-play-button{filter:sepia(1) hue-rotate(10deg)}

/* Content - CLEAR SEPARATION */
.post-content{
  padding:0 16px 16px;border-bottom:1px solid var(--border);
}
.post-title{
  font-size:1.15rem;font-weight:800;margin:12px 0 8px;color:var(--text);
  line-height:1.3;
}
.post-excerpt{
  color:var(--muted);font-size:.95rem;line-height:1.5;
  word-wrap:break-word;white-space:pre-wrap;
}

/* Actions */
.post-actions{
  display:flex;gap:4px;padding:10px 12px;flex-wrap:wrap;
}
.action-btn{
  background:none;border:none;font-size:.85rem;font-weight:600;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:30px;transition:all .15s;
  min-height:40px;flex:1;justify-content:center;
}
.action-btn:active{background:var(--hover);transform:scale(.98)}
.action-btn.liked{color:var(--danger);font-weight:700}
.action-btn .count{font-size:.8rem;font-weight:700}

/* ===== REEL WATERMARK ===== */
.reel-container{position:relative}
.watermark{
  position:absolute;bottom:12px;right:12px;
  background:rgba(13,27,42,.85);color:white;padding:6px 12px;
  border-radius:30px;font-size:.75rem;font-weight:700;
  backdrop-filter:blur(4px);z-index:10;display:flex;align-items:center;gap:4px;
  border:1px solid rgba(255,255,255,.2);
}

/* ===== REGION PANEL - MOBILE RESPONSIVE ===== */
.region-panel{
  background:white;border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow);
}
.region-panel h4{
  font-size:1rem;font-weight:800;margin-bottom:12px;color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.region-list{display:flex;flex-wrap:wrap;gap:8px}
.region-chip{
  background:var(--hover);border-radius:30px;padding:8px 14px;
  font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;
  color:var(--text);min-height:36px;display:flex;align-items:center;
}
.region-chip:active{background:var(--gold);color:white;transform:scale(.98)}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:16px;left:16px;right:16px;max-width:400px;margin:0 auto;
  padding:12px 20px;border-radius:30px;font-size:.9rem;font-weight:700;
  z-index:9999;transition:all .3s;opacity:0;transform:translateY(20px) scale(.95);
  pointer-events:none;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);
  text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.2);
}
.toast.show{opacity:1;transform:translateY(0) scale(1)}
.toast.ok{background:rgba(22,197,94,.95);color:#fff}
.toast.er{background:rgba(239,68,68,.95);color:#fff}
.toast.info{background:rgba(200,150,46,.95);color:var(--ink)}

/* ===== LOADING SKELETON ===== */
.skeleton{
  background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
  background-size:200% 100%;animation:loading 1.5s infinite;border-radius:8px;
}
@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-post{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.skeleton-header{display:flex;gap:12px;margin-bottom:12px}
.skeleton-avatar{width:42px;height:42px;border-radius:50%}
.skeleton-text{height:16px;margin-bottom:8px;border-radius:4px}
.skeleton-text.short{width:40%}.skeleton-text.medium{width:70%}.skeleton-text.long{width:100%}
.skeleton-media{height:200px;border-radius:12px;margin-bottom:12px}

/* ===== MOBILE OPTIMIZATIONS ===== */
@media(max-width:600px){
  .container{padding:0 10px 85px}
  .post-title{font-size:1.1rem}
  .post-excerpt{font-size:.9rem}
  .action-btn{padding:8px 10px;font-size:.8rem}
  .region-panel{margin:0 0 16px}
  .filter-tab{padding:8px 14px;font-size:.8rem}
  .create-prompt{padding:10px 14px}
  .card-audio{margin:0 12px 12px;padding:12px 14px}
}

@media(max-width:400px){
  .post-header{padding:12px 14px;gap:10px}
  .post-avatar{width:38px;height:38px;font-size:1.2rem}
  .post-author{font-size:.9rem}
  .post-title{font-size:1.05rem}
  .action-btn{padding:7px 10px;font-size:.75rem;min-height:38px}
}

/* ===== DESKTOP ENHANCEMENTS ===== */
@media(min-width:1024px){
  .container{padding:0 20px 100px}
  .post-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.1);border-color:var(--gold)}
  .action-btn:hover{background:var(--hover);color:var(--gold)}
  .region-chip:hover{background:var(--gold);color:white}
}
</style>
</head>
<body>
<div class="container">

  <!-- Stories Bar -->
  <div class="stories-bar" id="stories-bar">
    <div class="skeleton" style="width:72px;height:80px;border-radius:12px"></div>
    <div class="skeleton" style="width:72px;height:80px;border-radius:12px"></div>
    <div class="skeleton" style="width:72px;height:80px;border-radius:12px"></div>
  </div>

  <!-- Create Prompt -->
  <div class="create-prompt">
    <i class="fas fa-feather-alt"></i>
    <input type="text" id="create-prompt-input" placeholder="What's on your mind? Share a story...">
    <button onclick="openCreatePost()">Create</button>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs" id="filter-tabs">
    <div class="filter-tab active" data-filter="all">✨ For You</div>
    <div class="filter-tab" data-filter="following">👥 Following</div>
    <div class="filter-tab" data-filter="audio">🎵 Audio</div>
    <div class="filter-tab" data-filter="video">🎬 Video</div>
    <div class="filter-tab" data-filter="reel">📱 Reels</div>
  </div>

  <!-- Region Panel -->
  <div class="region-panel">
    <h4><i class="fas fa-map-marked-alt" style="color:var(--gold)"></i> Explore Regions</h4>
    <div class="region-list" id="region-list">
      <div class="skeleton" style="width:80px;height:36px;border-radius:30px"></div>
      <div class="skeleton" style="width:90px;height:36px;border-radius:30px"></div>
      <div class="skeleton" style="width:70px;height:36px;border-radius:30px"></div>
    </div>
  </div>

  <!-- Posts Feed -->
  <div id="posts-feed">
    <!-- Skeleton loading -->
    <div class="skeleton-post">
      <div class="skeleton-header">
        <div class="skeleton skeleton-avatar"></div>
        <div style="flex:1">
          <div class="skeleton skeleton-text short"></div>
          <div class="skeleton skeleton-text short" style="width:30%"></div>
        </div>
      </div>
      <div class="skeleton skeleton-media"></div>
      <div class="skeleton skeleton-text long" style="margin-bottom:8px"></div>
      <div class="skeleton skeleton-text medium"></div>
    </div>
    <div class="skeleton-post">
      <div class="skeleton-header">
        <div class="skeleton skeleton-avatar"></div>
        <div style="flex:1">
          <div class="skeleton skeleton-text short"></div>
          <div class="skeleton skeleton-text short" style="width:30%"></div>
        </div>
      </div>
      <div class="skeleton skeleton-media"></div>
      <div class="skeleton skeleton-text long" style="margin-bottom:8px"></div>
      <div class="skeleton skeleton-text medium"></div>
    </div>
  </div>

</div>

<!-- Toast Container -->
<div class="toast" id="toast"></div>

<script>
// ===== UTILS =====
function escapeHtml(str){if(!str)return'';return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function timeAgo(dateStr){
  if(!dateStr)return'—';
  const date=new Date(dateStr),now=new Date(),diff=Math.floor((now-date)/1000);
  if(diff<60)return`${diff}s ago`;if(diff<3600)return`${Math.floor(diff/60)}m ago`;
  if(diff<86400)return`${Math.floor(diff/3600)}h ago`;return`${Math.floor(diff/86400)}d ago`
}
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`toast show ${type}`;
  setTimeout(()=>el.classList.remove('show'),3000)
}

// ===== STATE =====
let currentFilter='all',posts=[],regions=[];

// ===== API HELPER =====
async function apiFetch(endpoint,options={}){
  const config={credentials:'include',headers:{'Content-Type':'application/json',...options.headers},...options};
  try{
    const res=await fetch(endpoint,config);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }catch(e){console.error(`API Error: ${endpoint}`,e);toast('Failed to load data','er');throw e}
}

// ===== LOAD DATA =====
async function loadPosts(){
  const feed=document.getElementById('posts-feed');
  // Show skeleton while loading
  feed.innerHTML=`<div class="skeleton-post"><div class="skeleton-header"><div class="skeleton skeleton-avatar"></div><div style="flex:1"><div class="skeleton skeleton-text short"></div><div class="skeleton skeleton-text short" style="width:30%"></div></div></div><div class="skeleton skeleton-media"></div><div class="skeleton skeleton-text long"></div><div class="skeleton skeleton-text medium"></div></div><div class="skeleton-post"><div class="skeleton-header"><div class="skeleton skeleton-avatar"></div><div style="flex:1"><div class="skeleton skeleton-text short"></div><div class="skeleton skeleton-text short" style="width:30%"></div></div></div><div class="skeleton skeleton-media"></div><div class="skeleton skeleton-text long"></div><div class="skeleton skeleton-text medium"></div></div>`;
  
  try{
    const url=currentFilter==='following'?'/api/posts/following':'/api/posts';
    posts=await apiFetch(url);
    renderPosts();
  }catch(e){
    feed.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">⚠️ Failed to load posts. Pull to refresh.</div>';
  }
}

async function loadRegions(){
  try{
    regions=await apiFetch('/api/regions');
    const list=document.getElementById('region-list');
    if(!regions.length){list.innerHTML='<div class="region-chip">No regions</div>';return}
    list.innerHTML=regions.map(r=>`<div class="region-chip" onclick="filterByRegion(${r.id})">${escapeHtml(r.name)}</div>`).join('');
  }catch(e){console.warn('Regions load failed')}
}

async function loadStories(){
  // Mock stories - replace with API call when ready
  const bar=document.getElementById('stories-bar');
  const stories=[
    {avatar:'👤',name:'You'},
    {avatar:'👑',name:'Ashanti'},
    {avatar:'🌊',name:'Volta'},
    {avatar:'🦁',name:'Northern'},
    {avatar:'🏔️',name:'Eastern'},
    {avatar:'🌴',name:'Western'}
  ];
  bar.innerHTML=stories.map(s=>`
    <div class="story-item" onclick="viewStory('${s.name}')">
      <div class="story-avatar">${s.avatar}</div>
      <div class="story-name">${s.name}</div>
    </div>
  `).join('');
}

// ===== RENDER POSTS - CRITICAL: AUDIO CARD FIX =====
function renderPosts(){
  const container=document.getElementById('posts-feed');
  if(!posts.length){
    container.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No posts yet. Follow creators or check back later! 🌱</div>';
    return;
  }
  
  container.innerHTML=posts.map(post=>{
    const isReel=post.content_type==='reel';
    const isAudio=post.content_type==='audio';
    const isVideo=post.content_type==='video';
    const mediaUrl=post.media_url||post.video_url||post.audio_url||post.cover_image;
    const likeCount=post.likes_count||0;
    const commentCount=post.comments_count||0;
    
    // ===== MEDIA RENDERING - SEPARATE CONTAINERS TO PREVENT OVERLAP =====
    let mediaHtml='';
    
    if(isReel&&mediaUrl){
      mediaHtml=`
        <div class="post-media reel-container">
          <video src="${mediaUrl}" controls playsinline style="width:100%;max-height:500px;object-fit:contain"></video>
          <div class="watermark"><i class="fas fa-water"></i> EchoStack</div>
        </div>
      `;
    }else if(isVideo&&mediaUrl){
      mediaHtml=`<div class="post-media"><video src="${mediaUrl}" controls style="width:100%;max-height:500px;object-fit:cover"></video></div>`;
    }else if(isAudio&&mediaUrl){
      // ===== AUDIO CARD: SEPARATE CONTAINER, CLEAR SEPARATION FROM TEXT =====
      mediaHtml=`
        <div class="card-audio">
          <div class="audio-title"><i class="fas fa-music" style="color:var(--gold)"></i> ${escapeHtml(post.title||'Audio Post')}</div>
          <audio controls src="${mediaUrl}" style="width:100%"></audio>
        </div>
      `;
    }else if(post.cover_image){
      mediaHtml=`<div class="post-media"><img src="${post.cover_image}" alt="${escapeHtml(post.title)}" loading="lazy" style="width:100%;max-height:500px;object-fit:cover"></div>`;
    }
    
    // ===== POST CARD STRUCTURE: HEADER → MEDIA → CONTENT → ACTIONS =====
    return`
      <article class="post-card" data-post-id="${post.id}">
        <!-- Header -->
        <header class="post-header">
          <div class="post-avatar"><i class="fas fa-user-circle"></i></div>
          <div class="post-author-info">
            <div class="post-author">${escapeHtml(post.author_username||'Unknown')}</div>
            <div class="post-time">${timeAgo(post.created_at)}</div>
          </div>
          ${post.can_delete?`<button class="post-delete" onclick="deletePost(${post.id})">🗑</button>`:''}
        </header>
        
        <!-- Media (image/video/audio/reel) - each in own container -->
        ${mediaHtml}
        
        <!-- Content - CLEARLY SEPARATED FROM MEDIA -->
        <div class="post-content">
          <h3 class="post-title">${escapeHtml(post.title||'Untitled')}</h3>
          <p class="post-excerpt">${escapeHtml(post.excerpt||post.content?.substring(0,180)||'')}</p>
        </div>
        
        <!-- Actions -->
        <footer class="post-actions">
          <button class="action-btn like-btn ${post.is_liked?'liked':''}" data-id="${post.id}" onclick="toggleLike(${post.id},this)">
            <i class="fas fa-heart"></i><span class="count">${likeCount}</span>
          </button>
          <button class="action-btn" onclick="openComments(${post.id})">
            <i class="fas fa-comment"></i><span class="count">${commentCount}</span>
          </button>
          <button class="action-btn" onclick="sharePost(${post.id})">
            <i class="fas fa-share-nodes"></i><span>Share</span>
          </button>
          <button class="action-btn" onclick="followUser(${post.author_id})">
            <i class="fas fa-user-plus"></i><span>Follow</span>
          </button>
        </footer>
      </article>
    `;
  }).join('');
}

// ===== ACTIONS =====
async function toggleLike(postId,btn){
  try{
    const res=await fetch(`/api/posts/${postId}/like`,{method:'POST',credentials:'include'});
    if(res.ok){
      btn.classList.toggle('liked');
      const countEl=btn.querySelector('.count');
      countEl.textContent=parseInt(countEl.textContent)+(btn.classList.contains('liked')?1:-1);
      toast(btn.classList.contains('liked')?'❤️ Liked!':'🤍 Unliked','info');
    }else toast('Failed to like','er');
  }catch(e){toast('Error','er')}
}

async function deletePost(postId){
  if(!confirm('Delete this post?'))return;
  try{
    const res=await fetch(`/api/posts/${postId}`,{method:'DELETE',credentials:'include'});
    if(res.ok){toast('Post deleted','ok');loadPosts()}
    else toast('Delete failed','er');
  }catch(e){toast('Error','er')}
}

function openComments(postId){window.location.href=`/post.html?id=${postId}`}

function sharePost(postId){
  const url=`${window.location.origin}/post.html?id=${postId}`;
  if(navigator.share){navigator.share({url,title:'EchoStack Post'})}
  else{navigator.clipboard.writeText(url);toast('Link copied! 📋','info')}
}

async function followUser(userId){
  try{
    const res=await fetch(`/api/follow/${userId}`,{method:'POST',credentials:'include'});
    toast(res.ok?'Following! 👥':'Already following','ok');
  }catch(e){toast('Error','er')}
}

function filterByRegion(regionId){toast(`Filtering by region #${regionId}`,'info')}
function viewStory(name){toast(`📖 ${name}'s story`,'info')}
function openCreatePost(){
  const val=document.getElementById('create-prompt-input').value.trim();
  if(!val){toast('Write something first ✍️','er');return}
  window.location.href='/creator.html';
}

// ===== FILTER TABS =====
function setupFilters(){
  document.querySelectorAll('.filter-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter=tab.dataset.filter;
      loadPosts();
    });
  });
}

// ===== PULL TO REFRESH (Mobile) =====
function setupPullToRefresh(){
  let startY=0,currentY=0;
  document.addEventListener('touchstart',e=>{if(window.scrollY===0)startY=e.touches[0].clientY},{passive:true});
  document.addEventListener('touchmove',e=>{
    if(window.scrollY===0){
      currentY=e.touches[0].clientY;
      const diff=currentY-startY;
      if(diff>80){loadPosts();toast('Refreshing...','info');startY=0}
    }
  },{passive:true});
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{
  loadRegions();loadStories();loadPosts();setupFilters();setupPullToRefresh();
  
  // Hide skeletons after first load
  setTimeout(()=>{
    const skeletons=document.querySelectorAll('.skeleton');
    skeletons.forEach(s=>s.style.opacity='.5');
  },2000);
});
</script>
</body>
