<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#0D1B2A">
<title>EchoStack – Ghana’s Living Heritage</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0D1B2A;
  --gold:#C8962E;
  --gold2:#E8B84B;
  --surface:#f8fafc;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#1e293b;
  --muted:#64748b;
  --danger:#ef4444;
  --success:#22c55e;
  --hover:#f1f5f9;
}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);padding-bottom:env(safe-area-inset-bottom);}
.container{max-width:800px;margin:0 auto;padding:0 12px 80px;width:100%;}
/* Stories bar */
.stories-bar{
  background:white;border-bottom:1px solid var(--border);
  padding:12px 0;overflow-x:auto;white-space:nowrap;
  -webkit-overflow-scrolling:touch;display:flex;gap:12px;
  scrollbar-width:thin;margin-bottom:16px;
}
.story-item{
  display:inline-flex;flex-direction:column;align-items:center;
  width:70px;cursor:pointer;
}
.story-avatar{
  width:56px;height:56px;border-radius:50%;border:2px solid var(--gold);
  background:var(--hover);display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;margin-bottom:6px;
}
.story-name{font-size:.7rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;}

/* Create prompt */
.create-prompt{
  background:white;border:1px solid var(--border);border-radius:16px;
  padding:12px;margin-bottom:20px;display:flex;align-items:center;gap:12px;
}
.create-prompt input{
  flex:1;border:none;outline:none;font-size:.95rem;
  background:transparent;padding:12px 0;
}
.create-prompt input::placeholder{color:var(--muted);}
.create-prompt button{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;border-radius:30px;padding:8px 18px;
  font-weight:600;color:var(--ink);cursor:pointer;
  min-height:44px;transition:all .2s;
}
.create-prompt button:hover{opacity:.9;transform:scale(1.02);}

/* Filter tabs */
.filter-tabs{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;
  margin-bottom:20px;scrollbar-width:thin;
}
.filter-tab{
  background:white;border:1px solid var(--border);border-radius:30px;
  padding:8px 18px;font-size:.85rem;font-weight:500;cursor:pointer;
  white-space:nowrap;transition:all .15s;
}
.filter-tab.active{
  background:var(--gold);border-color:var(--gold);color:white;
}

/* Post card */
.post-card{
  background:white;border:1px solid var(--border);border-radius:20px;
  margin-bottom:20px;overflow:hidden;transition:all .2s;
}
.post-header{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  border-bottom:1px solid var(--border);
}
.post-avatar{
  width:40px;height:40px;border-radius:50%;background:var(--hover);
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;
}
.post-author{font-weight:700;font-size:.9rem;}
.post-time{font-size:.7rem;color:var(--muted);}
.post-cover{
  width:100%;max-height:400px;object-fit:cover;
}
.post-content{padding:16px;}
.post-title{font-size:1.2rem;font-weight:700;margin-bottom:8px;}
.post-excerpt{color:var(--muted);font-size:.9rem;margin-bottom:12px;line-height:1.4;}
/* Audio card separate container */
.card-audio{
  background:var(--hover);border-radius:12px;padding:12px;
  margin-top:10px;
}
.card-audio audio{width:100%;border-radius:30px;}
.card-audio .audio-desc{font-size:.85rem;color:var(--text);margin-bottom:6px;font-weight:500;}
.post-actions{
  display:flex;gap:12px;border-top:1px solid var(--border);
  padding:12px 16px;
}
.action-btn{
  background:none;border:none;font-size:.85rem;font-weight:500;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;
  padding:8px 12px;border-radius:30px;transition:all .15s;
}
.action-btn:hover{background:var(--hover);color:var(--gold);}
.action-btn.liked{color:var(--danger);}
.action-btn .count{font-size:.75rem;margin-left:2px;}

/* Region panel (sticky on desktop, inline on mobile) */
.region-panel{
  position:fixed;right:16px;top:80px;width:260px;
  background:white;border:1px solid var(--border);border-radius:20px;
  padding:12px;box-shadow:0 4px 12px rgba(0,0,0,.05);
  z-index:10;
}
@media(max-width:1024px){
  .region-panel{position:relative;top:0;right:0;width:100%;margin-bottom:20px;}
  .container{max-width:100%;}
}
.region-panel h4{font-size:.9rem;font-weight:700;margin-bottom:8px;}
.region-list{display:flex;flex-wrap:wrap;gap:6px;}
.region-chip{
  background:var(--hover);border-radius:30px;padding:6px 12px;
  font-size:.75rem;cursor:pointer;transition:all .15s;
}
.region-chip:hover{background:var(--gold);color:white;}

/* Reel watermark */
.reel-container{position:relative;}
.watermark{
  position:absolute;bottom:8px;right:8px;
  background:rgba(0,0,0,.6);color:white;padding:4px 8px;
  border-radius:20px;font-size:.7rem;font-weight:bold;
  backdrop-filter:blur(2px);z-index:2;
}
</style>
</head>
<body>
<div class="container">
  <!-- Stories Bar -->
  <div class="stories-bar" id="stories-bar"></div>

  <!-- Create Prompt -->
  <div class="create-prompt">
    <i class="fas fa-pen-fancy" style="color:var(--gold);font-size:1.2rem;"></i>
    <input type="text" id="create-prompt-input" placeholder="What’s on your mind? Share a story...">
    <button onclick="openCreatePost()">Create</button>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs" id="filter-tabs">
    <div class="filter-tab active" data-filter="all">For You</div>
    <div class="filter-tab" data-filter="following">Following</div>
    <div class="filter-tab" data-filter="audio">Audio</div>
    <div class="filter-tab" data-filter="video">Video</div>
    <div class="filter-tab" data-filter="reel">Reels</div>
  </div>

  <!-- Posts Feed -->
  <div id="posts-feed"></div>
</div>

<!-- Region Panel (floating) -->
<div class="region-panel" id="region-panel">
  <h4><i class="fas fa-map-marker-alt" style="color:var(--gold);"></i> Explore Regions</h4>
  <div class="region-list" id="region-list"></div>
</div>

<script>
// Helper functions
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function toast(msg, type) {
  let toastDiv = document.getElementById('toast-message');
  if (!toastDiv) {
    toastDiv = document.createElement('div');
    toastDiv.id = 'toast-message';
    toastDiv.style.position = 'fixed';
    toastDiv.style.bottom = '20px';
    toastDiv.style.left = '20px';
    toastDiv.style.right = '20px';
    toastDiv.style.maxWidth = '400px';
    toastDiv.style.margin = '0 auto';
    toastDiv.style.padding = '12px 20px';
    toastDiv.style.borderRadius = '30px';
    toastDiv.style.fontSize = '.9rem';
    toastDiv.style.fontWeight = '600';
    toastDiv.style.zIndex = '999';
    toastDiv.style.transition = 'all .25s';
    toastDiv.style.opacity = '0';
    toastDiv.style.transform = 'translateY(8px)';
    toastDiv.style.pointerEvents = 'none';
    toastDiv.style.textAlign = 'center';
    document.body.appendChild(toastDiv);
  }
  toastDiv.textContent = msg;
  toastDiv.className = '';
  toastDiv.style.backgroundColor = type === 'ok' ? 'rgba(34,197,94,.95)' : (type === 'er' ? 'rgba(239,68,68,.95)' : 'rgba(200,150,46,.95)');
  toastDiv.style.color = '#fff';
  toastDiv.style.opacity = '1';
  toastDiv.style.transform = 'translateY(0)';
  setTimeout(() => {
    toastDiv.style.opacity = '0';
    toastDiv.style.transform = 'translateY(8px)';
  }, 3000);
}

// State
let currentFilter = 'all';
let posts = [];
let regions = [];
let stories = []; // story users (avatar, name)

// Load data
async function loadPosts() {
  try {
    const url = currentFilter === 'following' ? '/api/posts/following' : '/api/posts';
    const r = await fetch(url, { credentials: 'include' });
    posts = await r.json();
    renderPosts();
  } catch(e) {
    toast('Failed to load posts', 'er');
  }
}

function renderPosts() {
  const container = document.getElementById('posts-feed');
  if (!posts.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">No posts yet. Follow creators or check back later!</div>';
    return;
  }
  container.innerHTML = posts.map(post => {
    const isReel = post.content_type === 'reel';
    const isAudio = post.content_type === 'audio';
    const isVideo = post.content_type === 'video';
    const mediaUrl = post.media_url || post.video_url || post.audio_url || post.cover_image;
    const isLiked = post.is_liked || false;
    const likeCount = post.likes_count || 0;
    const commentCount = post.comments_count || 0;

    let mediaHtml = '';
    if (isReel && mediaUrl) {
      mediaHtml = `
        <div class="reel-container">
          <video src="${mediaUrl}" controls playsinline style="width:100%;max-height:500px;object-fit:contain;"></video>
          <div class="watermark"><i class="fas fa-water"></i> EchoStack</div>
        </div>
      `;
    } else if (isVideo && mediaUrl) {
      mediaHtml = `<video src="${mediaUrl}" controls style="width:100%;max-height:400px;"></video>`;
    } else if (isAudio && mediaUrl) {
      mediaHtml = `
        <div class="card-audio">
          <div class="audio-desc">🎵 ${escapeHtml(post.title)}</div>
          <audio controls src="${mediaUrl}"></audio>
        </div>
      `;
    } else if (post.cover_image) {
      mediaHtml = `<img class="post-cover" src="${post.cover_image}" alt="${escapeHtml(post.title)}" loading="lazy">`;
    }

    return `
      <div class="post-card" data-post-id="${post.id}">
        <div class="post-header">
          <div class="post-avatar"><i class="fas fa-user-circle"></i></div>
          <div>
            <div class="post-author">${escapeHtml(post.author_username)}</div>
            <div class="post-time">${timeAgo(post.created_at)}</div>
          </div>
          ${post.can_delete ? `<button class="action-btn" style="margin-left:auto;color:var(--danger);" onclick="deletePost(${post.id})">🗑 Delete</button>` : ''}
        </div>
        ${mediaHtml}
        <div class="post-content">
          <div class="post-title">${escapeHtml(post.title)}</div>
          <div class="post-excerpt">${escapeHtml(post.excerpt || post.content?.substring(0,150) || '')}</div>
        </div>
        <div class="post-actions">
          <button class="action-btn like-btn ${isLiked ? 'liked' : ''}" data-id="${post.id}">
            <i class="fas fa-heart"></i> <span class="count">${likeCount}</span>
          </button>
          <button class="action-btn" onclick="openComments(${post.id})">
            <i class="fas fa-comment"></i> <span class="count">${commentCount}</span>
          </button>
          <button class="action-btn" onclick="sharePost(${post.id})">
            <i class="fas fa-share-alt"></i> <span>Share</span>
          </button>
          <button class="action-btn" onclick="followUser(${post.author_id})">
            <i class="fas fa-user-plus"></i> <span>Follow</span>
          </button>
        </div>
      </div>
    `;
  }).join('');

  // Attach like event listeners
  document.querySelectorAll('.like-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const postId = btn.dataset.id;
      likePost(postId);
    });
  });
}

async function likePost(postId) {
  try {
    const r = await fetch(`/api/posts/${postId}/like`, { method: 'POST', credentials: 'include' });
    if (r.ok) {
      toast('Liked!', 'ok');
      loadPosts(); // refresh
    } else {
      toast('Failed to like', 'er');
    }
  } catch(e) { toast('Error', 'er'); }
}

async function deletePost(postId) {
  if (!confirm('Delete this post?')) return;
  try {
    const r = await fetch(`/api/posts/${postId}`, { method: 'DELETE', credentials: 'include' });
    if (r.ok) {
      toast('Post deleted', 'ok');
      loadPosts();
    } else {
      toast('Delete failed', 'er');
    }
  } catch(e) { toast('Error', 'er'); }
}

function openComments(postId) {
  window.location.href = `/post.html?id=${postId}`;
}

function sharePost(postId) {
  navigator.clipboard.writeText(`${window.location.origin}/post.html?id=${postId}`);
  toast('Link copied to clipboard!', 'info');
}

async function followUser(userId) {
  try {
    const r = await fetch(`/api/follow/${userId}`, { method: 'POST', credentials: 'include' });
    if (r.ok) toast('Following!', 'ok');
    else toast('Already following or error', 'er');
  } catch(e) { toast('Error', 'er'); }
}

// Regions
async function loadRegions() {
  try {
    const r = await fetch('/api/regions', { credentials: 'include' });
    regions = await r.json();
    const regionList = document.getElementById('region-list');
    if (!regions.length) {
      regionList.innerHTML = '<div class="region-chip">No regions</div>';
      return;
    }
    regionList.innerHTML = regions.map(r => `<div class="region-chip" onclick="filterByRegion(${r.id})">${escapeHtml(r.name)}</div>`).join('');
  } catch(e) { console.warn(e); }
}

function filterByRegion(regionId) {
  // For simplicity, we could reload posts with region filter, but we'll just show a toast
  toast('Region filter coming soon', 'info');
}

// Stories bar (mock – can be replaced with actual story data)
async function loadStories() {
  // In a real app, fetch from /api/stories/active
  const dummyStories = [
    { avatar: '📖', name: 'Your Story' },
    { avatar: '👑', name: 'Ashanti' },
    { avatar: '🎭', name: 'Volta' },
    { avatar: '🐘', name: 'Northern' }
  ];
  const bar = document.getElementById('stories-bar');
  bar.innerHTML = dummyStories.map(s => `
    <div class="story-item" onclick="viewStory('${s.name}')">
      <div class="story-avatar">${s.avatar}</div>
      <div class="story-name">${s.name}</div>
    </div>
  `).join('');
}

function viewStory(name) {
  toast(`Story: ${name}`, 'info');
}

// Create post modal (simplified)
function openCreatePost() {
  const content = document.getElementById('create-prompt-input').value.trim();
  if (!content) {
    toast('Write something first', 'er');
    return;
  }
  // Redirect to create page or open modal
  window.location.href = '/creator.html';
}

// Time ago helper
function timeAgo(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - date) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

// Filter tabs
document.addEventListener('DOMContentLoaded', () => {
  loadRegions();
  loadStories();
  loadPosts();

  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      loadPosts();
    });
  });
});
</script>
</body>
</html>
