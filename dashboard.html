<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B2A">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Feed - EchoStack</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <style>
        .feed-container { max-width: 680px; margin: 0 auto; }
        .create-prompt {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: var(--main-card);
            border-bottom: 1px solid var(--main-border);
            cursor: pointer;
        }
        .create-prompt-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            font-weight: 700;
            flex-shrink: 0;
        }
        .create-prompt-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--main-bg);
            border: 1px solid var(--main-border);
            border-radius: var(--radius-full);
            color: var(--main-text-muted);
            font-size: 0.9rem;
        }
        .create-prompt-icons { display: flex; gap: 12px; }
        .create-prompt-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--main-text-secondary);
            transition: all 0.15s;
        }
        .create-prompt-icon:hover { background: var(--main-hover); }
        .post-follow-btn {
            padding: 4px 12px;
            border-radius: var(--radius-full);
            background: var(--blue);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .right-panel {
            width: 320px;
            flex-shrink: 0;
            padding: 24px;
            position: sticky;
            top: 84px;
            height: fit-content;
        }
        .right-panel-section { margin-bottom: 24px; }
        .right-panel-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--main-text-muted);
            margin-bottom: 12px;
        }
        .region-list { display: flex; flex-direction: column; gap: 8px; }
        .region-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.15s;
        }
        .region-item:hover { background: var(--main-hover); }
        .region-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .region-name { font-weight: 500; font-size: 0.9rem; color: var(--main-text); }
        @media (max-width: 1024px) {
            .right-panel { display: none; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/" class="sidebar-logo">
                <img src="/echostack-logo.png" alt="EchoStack" onerror="this.style.display='none'">
                <span>EchoStack</span>
            </a>
        </div>
        <div class="sidebar-user" id="sidebarUser">
            <div class="sidebar-avatar" id="sidebarAvatar">U</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sidebarName">User</div>
                <div class="sidebar-user-badge badge-free" id="sidebarBadge">Free</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section">
                <a href="/dashboard" class="sidebar-link active">
                    <i class="fas fa-home"></i>
                    <span>Feed</span>
                </a>
                <a href="/reels" class="sidebar-link">
                    <i class="fas fa-film"></i>
                    <span>Reels</span>
                </a>
                <a href="/explore" class="sidebar-link">
                    <i class="fas fa-compass"></i>
                    <span>Explore</span>
                </a>
                <a href="/archive" class="sidebar-link">
                    <i class="fas fa-archive"></i>
                    <span>Archive</span>
                </a>
                <a href="/app" class="sidebar-link">
                    <i class="fas fa-map-marked-alt"></i>
                    <span>Map</span>
                </a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Social</div>
                <a href="/following" class="sidebar-link">
                    <i class="fas fa-user-friends"></i>
                    <span>Following</span>
                </a>
                <a href="/messages" class="sidebar-link">
                    <i class="fas fa-envelope"></i>
                    <span>Messages</span>
                </a>
                <a href="/notifications" class="sidebar-link">
                    <i class="fas fa-bell"></i>
                    <span>Notifications</span>
                    <span class="badge-count" id="notifCount" style="display:none">0</span>
                </a>
                <a href="/chat" class="sidebar-link">
                    <i class="fas fa-comments"></i>
                    <span>Community Chat</span>
                </a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Create</div>
                <a href="/creator" class="sidebar-link" id="createLink">
                    <i class="fas fa-plus-circle"></i>
                    <span>Create Post</span>
                </a>
                <a href="/premium" class="sidebar-link" id="premiumLink">
                    <i class="fas fa-crown"></i>
                    <span>Premium</span>
                </a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Account</div>
                <a href="/user-profile" class="sidebar-link">
                    <i class="fas fa-user"></i>
                    <span>My Profile</span>
                </a>
                <a href="/settings" class="sidebar-link">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <button class="sidebar-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Sign Out</span>
            </button>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- MAIN -->
    <div class="main-wrapper">
        <!-- TOPBAR -->
        <header class="topbar">
            <button class="hamburger" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="topbar-title">Feed</div>
            <div class="topbar-actions">
                <a href="/notifications" class="topbar-btn" style="position:relative">
                    <i class="fas fa-bell"></i>
                    <span class="badge-dot" id="topNotifDot" style="display:none"></span>
                </a>
                <a href="/chatbot" class="topbar-btn" title="EchoBot">
                    <i class="fas fa-robot"></i>
                </a>
            </div>
        </header>

        <!-- CONTENT -->
        <main class="main-content">
            <div style="display:flex">
                <div class="feed-container" style="flex:1">
                    <!-- STORIES BAR -->
                    <div class="stories-bar" id="storiesBar">
                        <div class="story-item" onclick="location.href='/story'">
                            <div class="story-create"><i class="fas fa-plus"></i></div>
                            <span class="story-name">Your Story</span>
                        </div>
                        <div id="storiesList"></div>
                    </div>

                    <!-- CREATE PROMPT -->
                    <div class="create-prompt" onclick="location.href='/creator'">
                        <div class="create-prompt-avatar" id="createAvatar">U</div>
                        <div class="create-prompt-input">What's on your mind?</div>
                        <div class="create-prompt-icons">
                            <div class="create-prompt-icon"><i class="fas fa-image" style="color:#22c55e"></i></div>
                            <div class="create-prompt-icon"><i class="fas fa-video" style="color:#9333ea"></i></div>
                            <div class="create-prompt-icon"><i class="fas fa-microphone" style="color:#059669"></i></div>
                        </div>
                    </div>

                    <!-- FILTER TABS -->
                    <div class="filter-tabs">
                        <button class="filter-tab active" onclick="setFilter(this, '')">All</button>
                        <button class="filter-tab" onclick="setFilter(this, 'article')">Articles</button>
                        <button class="filter-tab" onclick="setFilter(this, 'video')">Videos</button>
                        <button class="filter-tab" onclick="setFilter(this, 'reel')">Reels</button>
                        <button class="filter-tab" onclick="setFilter(this, 'audio')">Audio</button>
                        <button class="filter-tab" onclick="setFilter(this, 'photo')">Photos</button>
                    </div>

                    <!-- POSTS -->
                    <div style="padding:20px" id="postsContainer">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>

                <!-- RIGHT PANEL (Desktop) -->
                <div class="right-panel">
                    <div class="right-panel-section">
                        <div class="right-panel-title">Explore Regions</div>
                        <div class="region-list" id="regionList"></div>
                    </div>
                    <div class="footer" style="margin-top:40px;padding:20px 0;border:none">
                        <div class="footer-brand">EchoStack Ghana</div>
                        <p class="footer-dev">Built by Mireku Development</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- ECHOBOT BUTTON -->
<a href="/chatbot" class="echobot-btn" title="EchoBot">
    <i class="fas fa-robot"></i>
</a>

<div class="toast" id="toast"></div>

<script>
let user = null;
let currentFilter = '';
let allPosts = [];

function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 2500);
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function timeAgo(dateStr) {
    if (!dateStr) return '';
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 60) return Math.floor(diff) + 's';
    if (diff < 3600) return Math.floor(diff / 60) + 'm';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h';
    return Math.floor(diff / 86400) + 'd';
}

async function loadUser() {
    try {
        const res = await fetch('/api/users/me', { credentials: 'include' });
        if (res.ok) {
            user = await res.json();
            setupUserUI();
            loadPosts();
            loadStories();
            loadRegions();
        } else {
            location.href = '/user-login';
        }
    } catch(e) {
        location.href = '/user-login';
    }
}

function setupUserUI() {
    const initial = (user.username || 'U').charAt(0).toUpperCase();
    document.getElementById('sidebarAvatar').textContent = initial;
    document.getElementById('sidebarName').textContent = user.full_name || user.username;
    document.getElementById('createAvatar').textContent = initial;
    
    const badge = document.getElementById('sidebarBadge');
    if (user.role === 'admin' || user.role === 'superuser') {
        badge.className = 'sidebar-user-badge badge-admin';
        badge.textContent = 'Admin';
    } else if (user.role === 'creator') {
        badge.className = 'sidebar-user-badge badge-creator';
        badge.textContent = 'Creator';
    } else if (user.is_premium) {
        badge.className = 'sidebar-user-badge badge-premium';
        badge.textContent = 'Premium';
    }
    
    // Show admin link if admin
    if (user.role === 'admin' || user.role === 'superuser') {
        const createLink = document.getElementById('createLink');
        createLink.insertAdjacentHTML('afterend', `
            <a href="/admin-dashboard" class="sidebar-link">
                <i class="fas fa-tachometer-alt"></i>
                <span>Admin Dashboard</span>
            </a>
        `);
    }
}

async function loadPosts() {
    try {
        const url = currentFilter ? `/api/posts?type=${currentFilter}` : '/api/posts';
        const res = await fetch(url);
        allPosts = await res.json();
        renderPosts();
    } catch(e) {
        document.getElementById('postsContainer').innerHTML = '<div class="empty-state"><i class="fas fa-wifi"></i><h3>Connection error</h3></div>';
    }
}

function renderPosts() {
    const container = document.getElementById('postsContainer');
    if (!allPosts.length) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-newspaper"></i><h3>No posts yet</h3><p>Be the first to share a story!</p></div>';
        return;
    }
    
    container.innerHTML = allPosts.map(post => {
        const author = post.author_username || 'User';
        const initial = author.charAt(0).toUpperCase();
        const typeBadge = post.content_type ? `<span class="post-type-badge ${post.content_type}">${post.content_type}</span>` : '';
        const followBtn = user && post.author_id !== user.id ? `<button class="post-follow-btn" onclick="event.stopPropagation();toggleFollow('${post.author_id}')">Follow</button>` : '';
        
        let mediaHtml = '';
        if (post.media_url) {
            if (post.content_type === 'video' || post.content_type === 'reel') {
                mediaHtml = `<div class="post-media"><video src="${escapeHtml(post.media_url)}" controls preload="metadata"></video></div>`;
            } else if (post.content_type === 'audio') {
                mediaHtml = `<div class="audio-card"><div class="audio-header"><div class="audio-icon"><i class="fas fa-headphones"></i></div><div class="audio-info"><h4>${escapeHtml(post.title)}</h4><p>${escapeHtml(author)}</p></div></div><audio controls preload="none"><source src="${escapeHtml(post.media_url)}" type="audio/mpeg"></audio></div>`;
            } else {
                mediaHtml = `<div class="post-media"><img src="${escapeHtml(post.media_url)}" alt="" loading="lazy"></div>`;
            }
        }
        
        return `
            <article class="post-card" onclick="location.href='/post/${post.id}'">
                <div class="post-header">
                    <div class="post-avatar">${initial}</div>
                    <div class="post-author-info">
                        <div class="post-author">${escapeHtml(author)} ${followBtn}</div>
                        <div class="post-meta">
                            <span>${timeAgo(post.created_at)}</span>
                            ${typeBadge}
                        </div>
                    </div>
                </div>
                <h3 class="post-title">${escapeHtml(post.title)}</h3>
                ${post.excerpt ? `<p class="post-excerpt">${escapeHtml(post.excerpt)}</p>` : ''}
                ${mediaHtml}
                <div class="post-actions">
                    <button class="post-action ${post.user_liked ? 'liked' : ''}" onclick="event.stopPropagation();toggleLike(${post.id}, this)">
                        <i class="fas fa-heart"></i>
                        <span>${post.likes || 0}</span>
                    </button>
                    <button class="post-action" onclick="event.stopPropagation();location.href='/post/${post.id}'">
                        <i class="fas fa-comment"></i>
                        <span>${post.comments_count || 0}</span>
                    </button>
                    <button class="post-action" onclick="event.stopPropagation();sharePost(${post.id})">
                        <i class="fas fa-share"></i>
                    </button>
                    <button class="post-action ${post.user_saved ? 'saved' : ''}" onclick="event.stopPropagation();toggleSave(${post.id}, this)">
                        <i class="fas fa-bookmark"></i>
                    </button>
                </div>
            </article>
        `;
    }).join('');
}

async function loadStories() {
    try {
        const res = await fetch('/api/creators?limit=8');
        const creators = await res.json();
        const container = document.getElementById('storiesList');
        
        container.innerHTML = creators.slice(0, 8).map(c => {
            const initial = (c.username || 'C').charAt(0).toUpperCase();
            return `
                <div class="story-item" onclick="location.href='/user/${c.id}'">
                    <div class="story-ring">
                        <div class="story-ring-inner">
                            <div style="width:100%;height:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;color:var(--ink);font-weight:700">${initial}</div>
                        </div>
                    </div>
                    <span class="story-name">${escapeHtml(c.username)}</span>
                </div>
            `;
        }).join('');
    } catch(e) {}
}

async function loadRegions() {
    try {
        const res = await fetch('/api/regions');
        const regions = await res.json();
        const container = document.getElementById('regionList');
        
        container.innerHTML = regions.slice(0, 6).map(r => `
            <div class="region-item" onclick="location.href='/app?region=${r.id}'">
                <div class="region-icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="region-name">${escapeHtml(r.name)}</div>
            </div>
        `).join('');
    } catch(e) {}
}

function setFilter(btn, filter) {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = filter;
    loadPosts();
}

async function toggleLike(postId, btn) {
    try {
        const res = await fetch(`/api/posts/${postId}/like`, { method: 'POST' });
        const data = await res.json();
        btn.classList.toggle('liked');
        btn.querySelector('span').textContent = data.likes || 0;
    } catch(e) {}
}

async function toggleSave(postId, btn) {
    btn.classList.toggle('saved');
    showToast(btn.classList.contains('saved') ? 'Saved!' : 'Removed from saved');
}

async function toggleFollow(userId) {
    try {
        await fetch(`/api/follow/${userId}`, { method: 'POST' });
        showToast('Followed!');
    } catch(e) {}
}

function sharePost(postId) {
    const url = `${location.origin}/post/${postId}`;
    if (navigator.share) {
        navigator.share({ title: 'EchoStack', url });
    } else {
        navigator.clipboard.writeText(url);
        showToast('Link copied!');
    }
}

async function logout() {
    await fetch('/api/users/logout', { method: 'POST' });
    localStorage.removeItem('es_user');
    location.href = '/user-login';
}

loadUser();
</script>
</body>
</html>
