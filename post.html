<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0D1B2A">
    <title>EchoStack — Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'DM Sans',sans-serif;background:#F0F2F5;color:#1e293b}
        .container{max-width:720px;margin:0 auto;padding:20px 16px 40px}
        .back-btn{display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;color:#C8962E;text-decoration:none;font-weight:600}

        /* Post header */
        .post-header{margin-bottom:24px}
        .post-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:#0D1B2A;margin-bottom:8px;line-height:1.2}
        .post-meta{display:flex;align-items:center;gap:10px;color:#64748b;font-size:.85rem;margin-bottom:8px;flex-wrap:wrap}
        .post-type-badge{
            padding:4px 10px;
            border-radius:20px;
            font-size:.7rem;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:.03em;
            background:#EFF6FF;
            color:#2563EB;
            display:inline-block;
        }
        .post-type-badge.video{background:#FDF2F8;color:#9333EA;}
        .post-type-badge.reel{background:#FCE7F3;color:#B21E6C;}
        .post-type-badge.audio{background:#F0FDF4;color:#16A34A;}
        .post-type-badge.premium{background:rgba(201,147,58,.15);color:#c9933a;}

        /* Cover image */
        .post-cover{width:100%;border-radius:16px;margin-bottom:24px;max-height:400px;object-fit:cover}

        /* Video player (for video/reel) */
        .video-container{
            width:100%;
            background:#000;
            border-radius:16px;
            overflow:hidden;
            margin-bottom:24px;
            position:relative;
        }
        .video-container video{
            width:100%;
            display:block;
            max-height:70vh;
            object-fit:contain;
            background:#000;
        }
        .video-container.reel video{
            max-height:80vh;
            aspect-ratio:9/16;
            object-fit:cover;
            margin:0 auto;
        }
        .reel-watermark{
            position:absolute;
            bottom:12px;
            right:12px;
            background:rgba(0,0,0,.65);
            border-radius:20px;
            padding:5px 12px;
            display:flex;
            align-items:center;
            gap:6px;
            z-index:20;
            pointer-events:none;
            backdrop-filter:blur(2px);
            border:1px solid rgba(255,255,255,.15);
        }
        .reel-watermark img{
            height:18px;
            width:auto;
        }
        .reel-watermark span{
            color:white;
            font-size:0.7rem;
            font-weight:600;
            letter-spacing:0.5px;
        }

        /* Post content (markdown) */
        .post-content{font-size:.95rem;line-height:1.8;color:#334155;margin-bottom:32px}
        .post-content p{margin-bottom:1.2rem}
        .post-content h2{font-family:'Playfair Display',serif;font-size:1.4rem;margin:2rem 0 .8rem}
        .post-content h3{font-size:1.1rem;margin:1.5rem 0 .6rem;font-weight:700}
        .post-content img{max-width:100%;border-radius:12px;margin:1rem 0}
        .post-content video,.post-content audio{width:100%;border-radius:8px;margin:1rem 0}
        .post-content blockquote{border-left:4px solid #C8962E;background:#f9f5eb;padding:.8rem 1.2rem;border-radius:0 8px 8px 0;font-style:italic;margin:1rem 0}
        .post-content pre{background:#1e293b;color:#e2e8f0;padding:1rem;border-radius:10px;overflow-x:auto}
        .post-content code{background:#e2e8f0;padding:2px 6px;border-radius:4px;font-size:.85rem}

        .loading{text-align:center;padding:40px;color:#94a3b8}
        .error{text-align:center;padding:40px;color:#dc2626}

        /* Comments section */
        .comments-section{background:white;border-radius:16px;padding:20px;margin-top:32px;border:1px solid #E2E8F0}
        .comment-form{display:flex;gap:12px;margin-bottom:24px}
        .comment-input{flex:1;padding:12px 16px;border:1.5px solid #E2E8F0;border-radius:24px;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none}
        .comment-input:focus{border-color:#C8962E}
        .comment-submit{padding:12px 24px;background:#C8962E;color:white;border:none;border-radius:24px;font-weight:600;cursor:pointer;white-space:nowrap}
        .comment-submit:disabled{opacity:.6;cursor:not-allowed}
        .comment{display:flex;gap:12px;margin-bottom:16px}
        .comment-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#C8962E,#E8B84B);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
        .comment-content{flex:1}
        .comment-header{display:flex;justify-content:space-between;margin-bottom:4px}
        .comment-author{font-weight:600;color:#0D1B2A}
        .comment-time{font-size:.7rem;color:#94A3B8}
        .comment-body{font-size:.85rem;color:#334155;line-height:1.5;margin-bottom:8px}
        .comment-actions{display:flex;gap:12px;font-size:.75rem;color:#94A3B8}
        .comment-action{cursor:pointer;display:flex;align-items:center;gap:4px;transition:color .15s}
        .comment-action:hover{color:#C8962E}
        .comment-likes{display:flex;align-items:center;gap:4px}
        .reply-form{display:flex;gap:8px;margin-top:8px;margin-bottom:16px;margin-left:48px}
        .reply-input{flex:1;padding:8px 12px;border:1.5px solid #E2E8F0;border-radius:20px;font-size:.8rem;outline:none}
        .reply-input:focus{border-color:#C8962E}
        .reply-submit{padding:8px 16px;background:#C8962E;color:white;border:none;border-radius:20px;font-weight:600;font-size:.75rem;cursor:pointer}
        .replies{margin-left:48px;margin-top:8px}
        @media(max-width:500px){
            .reply-form{margin-left:0}
            .replies{margin-left:0}
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
</head>
<body>
    <div class="container" id="app">
        <a href="javascript:history.back()" class="back-btn">← Back</a>
        <div v-if="loading" class="loading">Loading post…</div>
        <div v-if="error" class="error">{{ error }}</div>
        <template v-if="post">
            <div class="post-header">
                <h1 class="post-title">{{ post.title }}</h1>
                <div class="post-meta">
                    <span>By {{ post.author_username || 'Creator' }}</span>
                    <span>•</span>
                    <span>{{ formatDate(post.created_at) }}</span>
                    <!-- Type badge -->
                    <span :class="['post-type-badge', post.content_type]" v-if="post.content_type">
                        {{ post.content_type === 'reel' ? '📱 Reel' : (post.content_type === 'video' ? '🎬 Video' : (post.content_type === 'audio' ? '🎵 Audio' : (post.content_type === 'story' ? '📖 Story' : '📰 Article'))) }}
                    </span>
                    <span class="post-type-badge premium" v-if="post.is_premium">⭐ Premium</span>
                </div>
            </div>

            <!-- Video player for reel/video posts (using video_url if available) -->
            <div v-if="(post.content_type === 'video' || post.content_type === 'reel') && post.video_url" 
                 :class="['video-container', post.content_type === 'reel' ? 'reel' : '']">
                <video controls preload="metadata" :poster="post.cover_image">
                    <source :src="post.video_url" type="video/mp4">
                </video>
                <!-- Watermark only for reels -->
                <div v-if="post.content_type === 'reel'" class="reel-watermark">
                    <img src="/echostack-logo.png" alt="" onerror="this.style.display='none'">
                    <span>EchoStack</span>
                </div>
            </div>

            <!-- Cover image (if no video) -->
            <img v-else-if="post.cover_image" :src="post.cover_image" class="post-cover" alt="">

            <!-- Audio player for audio posts -->
            <div v-if="post.content_type === 'audio' && post.audio_url" style="margin-bottom:20px">
                <audio controls style="width:100%;border-radius:8px">
                    <source :src="post.audio_url" type="audio/mpeg">
                </audio>
            </div>

            <!-- Main content (markdown) -->
            <div class="post-content" v-html="renderedContent"></div>

            <!-- Comments Section -->
            <div class="comments-section">
                <h3 style="margin-bottom:16px;font-family:'Playfair Display'">Comments ({{ comments.length }})</h3>
                <!-- New comment form -->
                <div class="comment-form">
                    <input type="text" class="comment-input" placeholder="Write a comment…" v-model="newComment" @keyup.enter="postComment">
                    <button class="comment-submit" @click="postComment" :disabled="!newComment.trim()">Post</button>
                </div>
                <!-- List of comments -->
                <div v-for="c in comments" :key="c.id" class="comment">
                    <div class="comment-avatar">{{ (c.username||'U')[0] }}</div>
                    <div class="comment-content">
                        <div class="comment-header">
                            <span class="comment-author">{{ c.username }}</span>
                            <span class="comment-time">{{ timeAgo(c.created_at) }}</span>
                        </div>
                        <div class="comment-body">{{ c.content }}</div>
                        <div class="comment-actions">
                            <span class="comment-action" @click="likeComment(c.id)">
                                <span v-if="c.liked">❤️</span><span v-else>🤍</span> {{ c.likes }}
                            </span>
                            <span class="comment-action" @click="showReplyForm(c.id)">↩️ Reply</span>
                        </div>
                        <!-- Reply form (shown when replying) -->
                        <div v-if="replyFormVisible === c.id" class="reply-form">
                            <input type="text" class="reply-input" placeholder="Write a reply…" v-model="replyText[c.id]" @keyup.enter="postReply(c.id)">
                            <button class="reply-submit" @click="postReply(c.id)">Reply</button>
                        </div>
                        <!-- Replies -->
                        <div v-if="c.replies && c.replies.length" class="replies">
                            <div v-for="r in c.replies" :key="r.id" class="comment" style="margin-bottom:8px">
                                <div class="comment-avatar">{{ (r.username||'U')[0] }}</div>
                                <div class="comment-content">
                                    <div class="comment-header">
                                        <span class="comment-author">{{ r.username }}</span>
                                        <span class="comment-time">{{ timeAgo(r.created_at) }}</span>
                                    </div>
                                    <div class="comment-body">{{ r.content }}</div>
                                    <div class="comment-actions">
                                        <span class="comment-action" @click="likeComment(r.id)">
                                            <span v-if="r.liked">❤️</span><span v-else>🤍</span> {{ r.likes }}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div v-if="comments.length === 0" style="text-align:center;color:#94A3B8;padding:20px">No comments yet. Be the first!</div>
            </div>
        </template>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                post: null,
                loading: true,
                error: null,
                comments: [],
                newComment: '',
                replyFormVisible: null,
                replyText: {},
                currentUser: null
            },
            computed: {
                renderedContent() {
                    if (!this.post || !this.post.content) return '';
                    let html = this.post.content
                        .replace(/\[video\](.*?)\[\/video\]/gi, '<video controls style="max-width:100%"><source src="$1"></video>')
                        .replace(/\[audio\](.*?)\[\/audio\]/gi, '<audio controls style="max-width:100%"><source src="$1"></audio>');
                    return marked.parse(html);
                }
            },
            methods: {
                formatDate(dateStr) {
                    if (!dateStr) return '';
                    const d = new Date(dateStr);
                    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                },
                timeAgo(dateStr) {
                    if (!dateStr) return '';
                    const d = new Date(dateStr);
                    const diff = (Date.now() - d.getTime()) / 1000;
                    if (diff < 60) return 'just now';
                    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
                    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
                    return Math.floor(diff/86400) + 'd ago';
                },
                async fetchComments() {
                    const postId = this.$route?.params?.id || window.location.pathname.split('/').pop();
                    try {
                        const res = await fetch(`/api/posts/${postId}/comments`);
                        if (res.ok) {
                            this.comments = await res.json();
                        }
                    } catch(e) { console.error(e); }
                },
                async postComment() {
                    if (!this.newComment.trim()) return;
                    const postId = this.$route?.params?.id || window.location.pathname.split('/').pop();
                    const fd = new FormData();
                    fd.append('content', this.newComment.trim());
                    try {
                        const res = await fetch(`/api/posts/${postId}/comments`, { method: 'POST', body: fd });
                        if (res.ok) {
                            this.newComment = '';
                            await this.fetchComments();
                        } else {
                            alert('Failed to post comment');
                        }
                    } catch(e) { alert('Error'); }
                },
                showReplyForm(commentId) {
                    this.replyFormVisible = this.replyFormVisible === commentId ? null : commentId;
                    if (!this.replyText[commentId]) this.$set(this.replyText, commentId, '');
                },
                async postReply(commentId) {
                    const text = this.replyText[commentId];
                    if (!text || !text.trim()) return;
                    const fd = new FormData();
                    fd.append('content', text.trim());
                    try {
                        const res = await fetch(`/api/comments/${commentId}/reply`, { method: 'POST', body: fd });
                        if (res.ok) {
                            this.replyText[commentId] = '';
                            this.replyFormVisible = null;
                            await this.fetchComments();
                        } else {
                            alert('Failed to post reply');
                        }
                    } catch(e) { alert('Error'); }
                },
                async likeComment(commentId) {
                    try {
                        const res = await fetch(`/api/comments/${commentId}/like`, { method: 'POST' });
                        if (res.ok) {
                            const data = await res.json();
                            // Update local comment likes count
                            const updateLikes = (list) => {
                                for (let c of list) {
                                    if (c.id === commentId) {
                                        c.likes = data.likes;
                                        return true;
                                    }
                                    if (c.replies) {
                                        for (let r of c.replies) {
                                            if (r.id === commentId) {
                                                r.likes = data.likes;
                                                return true;
                                            }
                                        }
                                    }
                                }
                                return false;
                            };
                            updateLikes(this.comments);
                        }
                    } catch(e) { console.error(e); }
                }
            },
            async created() {
                const postId = window.location.pathname.split('/').pop();
                try {
                    const res = await fetch(`/api/posts/${postId}`);
                    if (!res.ok) throw new Error('Post not found');
                    this.post = await res.json();
                } catch (e) {
                    this.error = e.message;
                } finally {
                    this.loading = false;
                }
                await this.fetchComments();
                // Get current user (for like status, not implemented)
                try {
                    const me = await fetch('/api/users/me');
                    if (me.ok) this.currentUser = await me.json();
                } catch(e) {}
            }
        });
    </script>
</body>
</html>
