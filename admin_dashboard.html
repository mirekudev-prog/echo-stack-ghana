<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Page Title -->
    <title>EchoStack Admin Dashboard</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1a1e29">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EchoStack">
    
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" href="/echostack-logo.png">
    <link rel="apple-touch-icon" href="/echostack-logo.png">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Georgia:wght@400;700&display=swap');
        
        :root {
            --brand-dark: #1a1e29;
            --brand-blue: #0077b6;
        }
        
        body {
            font-family: 'Georgia', serif !important;
            background-color: #ffffff !important;
            color: var(--brand-dark) !important;
        }
        
        .btn-primary { 
            background-color: var(--brand-blue) !important; 
            color: white !important; 
            border: none !important;
        }
        .btn-secondary { 
            border: 2px solid var(--brand-dark) !important;
            color: var(--brand-dark) !important; 
            background: transparent !important;
        }
        input, textarea, select {
            border-color: #d0d0d0 !important;
            color: var(--brand-dark) !important;
            background: white !important;
        }
        input:focus, textarea:focus, select:focus {
            outline: none !important;
            border-color: var(--brand-blue) !important;
        }
    </style>
    
    <!-- SERVICE WORKER REGISTRATION -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => console.log('✅ SW registered'))
                    .catch(error => console.log('❌ SW error:', error));
            });
        }
    </script>
</head>
<body class="antialiased">
    
    <!-- NAVIGATION -->
    <header class="border-b border-gray-200 py-4 bg-white sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <!-- LOGO WITH FALLBACK IF MISSING -->
                <img src="/echostack-logo.png" alt="" style="width: 50px; height: 50px; object-fit: contain;" onerror="this.style.display='none'">
                <h1 class="text-2xl font-bold" style="color: #1a1e29 !important;">EchoStack Admin</h1>
            </div>
            <nav class="flex gap-3 items-center">
                <a href="/" target="_blank" class="px-3 py-2 rounded hover:bg-blue-50 text-sm font-medium">🌍 View Site ↗</a>
                <button onclick="showSection('dashboard')" class="px-3 py-2 rounded hover:bg-gray-100 text-sm font-medium">📊 Dashboard</button>
                <button onclick="showSection('create')" class="btn-primary px-4 py-2 rounded font-semibold text-sm">➕ New Region</button>
                <button onclick="logout()" class="px-3 py-2 rounded border border-red-300 text-red-600 text-sm font-medium">🚪 Logout</button>
            </nav>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- ... rest of your dashboard code stays exactly the same ... -->
        <!-- Copy from your current file, only header logo changed above -->

    <!-- NOTIFICATION -->
    <div id="notification" class="fixed bottom-6 right-6 hidden px-6 py-3 rounded-lg shadow-lg z-50"></div>

    <!-- YOUR ENTIRE JAVASCRIPT CODE STAYS THE SAME AS YOU HAD IT -->

    <script>

</body>
</html>
