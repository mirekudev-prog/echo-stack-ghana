<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D1B2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscriptions — EchoStack</title>
<link rel="icon" type="image/png" href="/echostack-logo.png">
<style>
:root{--ink:#1a1e29;--blue:#0077b6;--gold:#C8962E;--cream:#f5f5f5;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
.sidebar{width:240px;background:var(--ink);color:white;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;padding:20px;}
.main{margin-left:240px;padding:40px;max-width:800px;}
.page-title{font-size:1.6rem;font-weight:700;margin-bottom:16px;color:var(--ink);}
.empty{text-align:center;padding:60px;color:#888;}
.loading{display:inline-block;width:20px;height:20px;border:2px solid #ccc;border-top:2px solid var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="sidebar">
  <div style="margin-bottom:24px;"><strong>EchoStack</strong></div>
  <a href="/app" style="display:block;padding:10px;color:#aaa;text-decoration:none;">🏠 Home</a>
  <a href="/explore" style="display:block;padding:10px;color:#aaa;text-decoration:none;">🔍 Explore</a>
  <a href="/chat" style="display:block;padding:10px;color:#aaa;text-decoration:none;">💬 Chat</a>
  <a href="/dashboard" style="display:block;padding:10px;color:#aaa;text-decoration:none;">📊 Dashboard</a>
  <a href="/subscriptions" style="display:block;padding:10px;color:white;font-weight:600;">🔔 Subscriptions</a>
  <a href="/following" style="display:block;padding:10px;color:#aaa;text-decoration:none;">👥 Following</a>
  <a href="/activity" style="display:block;padding:10px;color:#aaa;text-decoration:none;">📈 Activity</a>
</div>

<div class="main">
  <h1 class="page-title">Subscriptions</h1>
  <p style="color:#666;margin-bottom:24px;">People who have subscribed to your newsletter or updates.</p>

  <div id="subs-container" class="empty">
    <div class="loading"></div>
    <p>Loading subscribers...</p>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const user = localStorage.getItem('es_user');
  if (!user) {
    window.location.href = '/user-login';
    return;
  }

  try {
    const res = await fetch('/api/newsletter/subscribers');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const container = document.getElementById('subs-container');
    if (!data || data.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <div style="font-size:2.5rem;color:#ccc;">📧</div>
          <h3>No subscribers yet</h3>
          <p>Your newsletter hasn’t been subscribed to yet.</p>
        </div>`;
      return;
    }

    let html = `<table style="width:100%;border-collapse:collapse;">
      <thead><tr style="background:#f8f9fa;padding:12px;text-align:left;">
        <th>Email</th><th>Name</th><th>Joined</th>
      </tr></thead><tbody>`;
    
    data.forEach(s => {
      html += `<tr style="border-bottom:1px solid #eee;padding:12px;">
        <td>${s.email}</td>
        <td>${s.full_name || '—'}</td>
        <td>${new Date(s.created_at).toLocaleDateString()}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    
    container.innerHTML = html;

  } catch (err) {
    console.error('Subscriptions load error:', err);
    document.getElementById('subs-container').innerHTML = `
      <div class="empty">
        <div style="font-size:2.5rem;color:#f87171;">⚠️</div>
        <h3>Failed to load</h3>
        <p>Please try again later. Error: ${err.message}</p>
      </div>`;
  }
});
</script>
</body>
</html>
