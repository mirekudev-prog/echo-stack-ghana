<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join EchoStack - Create Account</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --brand-dark: #1a1e29;
            --brand-blue: #0077b6;
        }
        
        body {
            font-family: Georgia, serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        
        .signup-card {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(26, 30, 41, 0.1);
            max-width: 700px;
            width: 100%;
        }
        
        h1, h2 { color: var(--brand-dark) !important; }
        
        input {
            border-color: #d0d0d0 !important;
            color: var(--brand-dark) !important;
            background: white !important;
        }
        
        input:focus {
            outline: none !important;
            border-color: var(--brand-blue) !important;
        }
        
        .topic-tag {
            padding: 0.75rem 1.25rem;
            border: 2px solid #e5e7eb;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 0.875rem;
            background: white;
            color: #374151;
        }
        
        .topic-tag:hover {
            border-color: var(--brand-blue);
            color: var(--brand-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 119, 182, 0.15);
        }
        
        .topic-tag.selected {
            background-color: var(--brand-blue) !important;
            border-color: var(--brand-blue) !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(0, 119, 182, 0.3);
        }
        
        .btn-primary {
            background-color: var(--brand-blue) !important;
            color: white !important;
        }
        
        .progress-bar {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--brand-blue);
            transition: width 0.3s ease;
        }
        
        .step { display: none; }
        .step.active { display: block; }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--brand-blue);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    
    <div class="signup-card">
        <div class="text-center mb-8">
            <img src="/echostack-logo.png" alt="EchoStack" class="w-16 h-16 mx-auto mb-4">
            <h1 class="text-3xl font-bold mb-2">Join EchoStack</h1>
            <p class="text-gray-600">Create your account to explore Ghana's heritage</p>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 50%"></div>
        </div>
        
        <div class="step active" id="step-1">
            <h2 class="text-xl font-semibold mb-6">Create Your Account</h2>
            
            <form id="signup-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Username *</label>
                    <input type="text" id="username" required class="w-full p-3 border rounded-lg" placeholder="Choose a username">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Email *</label>
                    <input type="email" id="email" required class="w-full p-3 border rounded-lg" placeholder="your@email.com">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Password *</label>
                    <input type="password" id="password" required class="w-full p-3 border rounded-lg" placeholder="Min 6 characters">
                </div>
                
                <button type="button" onclick="goToStep(2)" class="w-full btn-primary py-3 rounded-lg font-bold mt-6">
                    Continue →
                </button>
            </form>
            
            <p class="text-center text-sm text-gray-600 mt-6">
                Already have an account? <a href="/user-login" class="text-[#0077b6] hover:underline">Sign In</a>
            </p>
            
            <p class="text-center text-sm text-gray-600 mt-4">
                <a href="/" class="text-[#0077b6] hover:underline">← Back to Home</a>
            </p>
        </div>
        
        <div class="step" id="step-2">
            <h2 class="text-xl font-semibold mb-2">Select 3 Topics</h2>
            <p class="text-gray-600 mb-6">We'll recommend stories that match your interests</p>
            
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6" id="topics-container"></div>
            
            <div class="flex items-center justify-between mb-6">
                <p id="selected-count" class="text-sm font-medium text-[#0077b6]">0 / 3 selected</p>
                <button onclick="goToStep(1)" class="text-sm text-gray-500 hover:text-gray-700">← Back</button>
            </div>
            
            <button onclick="completeSignup()" id="complete-btn" disabled class="w-full btn-primary py-3 rounded-lg font-bold opacity-50 cursor-not-allowed">
                ✨ Create Free Account
            </button>
        </div>
    </div>

    <div id="notification" class="fixed bottom-6 right-6 hidden px-6 py-3 rounded-lg shadow-lg z-50"></div>

    <script>
        const echoStackTopics = [
            "Ashanti Culture", "Ga Traditions", "Ewe Music", "Northern Heritage",
            "Gold Coast History", "Slave Castles", "Highlife Music", "Traditional Drums",
            "Kente Cloth", "Fante Language", "Mole National Park", "Kakum Forest",
            "Lake Volta", "Twi Language", "Dagomba Stories", "Chieftaincy",
            "Oral Histories", "Modern Ghana Art", "Afrobeats History", "Festivals & Ceremonies"
        ];
        
        let selectedTopics = [];
        const MAX_TOPICS = 3;

        document.addEventListener('DOMContentLoaded', () => {
            renderTopics();
        });

        function renderTopics() {
            const container = document.getElementById('topics-container');
            container.innerHTML = '';
            
            echoStackTopics.forEach(topic => {
                const tag = document.createElement('div');
                tag.className = 'topic-tag';
                tag.textContent = topic;
                tag.onclick = () => toggleTopic(topic, tag);
                container.appendChild(tag);
            });
        }

        function toggleTopic(topic, element) {
            const index = selectedTopics.indexOf(topic);
            
            if (index === -1) {
                if (selectedTopics.length >= MAX_TOPICS) {
                    showNotification(`You can only select ${MAX_TOPICS} topics`, 'error');
                    return;
                }
                selectedTopics.push(topic);
                element.classList.add('selected');
            } else {
                selectedTopics.splice(index, 1);
                element.classList.remove('selected');
            }
            
            document.getElementById('selected-count').textContent = `${selectedTopics.length} / ${MAX_TOPICS} selected`;
            
            const completeBtn = document.getElementById('complete-btn');
            if (selectedTopics.length === MAX_TOPICS) {
                completeBtn.disabled = false;
                completeBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                completeBtn.disabled = true;
                completeBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        function goToStep(step) {
            if (step === 2) {
                const username = document.getElementById('username').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                
                if (!username || !email || !password) {
                    showNotification('Please fill in all fields', 'error');
                    return;
                }
                
                if (password.length < 6) {
                    showNotification('Password must be at least 6 characters', 'error');
                    return;
                }
            }
            
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${step}`).classList.add('active');
            
            const progressFill = document.getElementById('progress-fill');
            progressFill.style.width = step === 1 ? '50%' : '100%';
        }

        async function completeSignup() {
            if (selectedTopics.length !== MAX_TOPICS) {
                showNotification(`Please select exactly ${MAX_TOPICS} topics`, 'error');
                return;
            }
            
            const btn = document.getElementById('complete-btn');
            btn.innerHTML = '<div class="loading-spinner"></div> Creating Account...';
            btn.disabled = true;
            
            const formData = new FormData();
            formData.append('username', document.getElementById('username').value.trim());
            formData.append('email', document.getElementById('email').value.trim());
            formData.append('password', document.getElementById('password').value);
            formData.append('topics', JSON.stringify(selectedTopics));
            
            try {
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showNotification('✅ Account created! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/app';
                    }, 1500);
                } else {
                    throw new Error(data.detail || 'Registration failed');
                }
            } catch (error) {
                showNotification('❌ ' + error.message, 'error');
                btn.innerHTML = '✨ Create Free Account';
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.className = 'fixed bottom-6 right-6 px-6 py-3 rounded-lg shadow-lg z-50 text-white ' + 
                (type === 'success' ? 'bg-green-600' : 'bg-red-600');
            notification.innerText = message;
            notification.classList.remove('hidden');
            setTimeout(() => notification.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
