<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join EchoStack - Create Account</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Georgia:wght@400;700&display=swap');
        
        :root {
            --brand-dark: #1a1e29;
            --brand-blue: #0077b6;
        }
        
        body {
            font-family: 'Georgia', serif !important;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .auth-card {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(26, 30, 41, 0.1);
            max-width: 600px;
            width: 100%;
            margin: 2rem;
        }
        
        h1 { color: var(--brand-dark) !important; }
        p { color: #666 !important; }
        
        input {
            border-color: #d0d0d0 !important;
            color: var(--brand-dark) !important;
            background: white !important;
        }
        
        input:focus {
            outline: none !important;
            border-color: var(--brand-blue) !important;
        }
        
        /* Topic Tags */
        .topic-tag {
            padding: 0.5rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .topic-tag:hover {
            border-color: var(--brand-blue);
            color: var(--brand-blue);
        }
        
        .topic-tag.selected {
            background-color: var(--brand-blue) !important;
            border-color: var(--brand-blue) !important;
            color: white !important;
        }
        
        button[type="submit"] {
            background-color: var(--brand-blue) !important;
            color: white !important;
        }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--brand-blue);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="antialiased">
    
    <div class="auth-card">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">Join EchoStack</h1>
            <p>Create your account to explore Ghana's stories</p>
        </div>
        
        <!-- Signup Form -->
        <form id="signup-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2" style="color: #1a1e29 !important;">Username *</label>
                <input type="text" id="username" required class="w-full p-3 border rounded-lg" placeholder="Choose a username">
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-2" style="color: #1a1e29 !important;">Email *</label>
                <input type="email" id="email" required class="w-full p-3 border rounded-lg" placeholder="your@email.com">
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-2" style="color: #1a1e29 !important;">Password *</label>
                <input type="password" id="password" required class="w-full p-3 border rounded-lg" placeholder="Min 6 characters">
            </div>
            
            <!-- Step 2: Topic Selection -->
            <div class="mt-6">
                <h2 class="text-xl font-semibold mb-4" style="color: #1a1e29 !important;">Select Your Interests (Pick 3)</h2>
                <p class="mb-4 text-sm" style="color: #666 !important;">We'll recommend stories that match your interests</p>
                
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="topics-container">
                    <!-- Topics generated by JavaScript -->
                </div>
                
                <p id="selected-count" class="text-sm mt-2 text-[#0077b6] font-medium"></p>
            </div>
            
            <button type="submit" id="submit-btn" disabled class="w-full py-3 rounded-lg font-bold transition opacity-50 cursor-not-allowed" style="opacity: 0.5; cursor: not-allowed;">
                ✨ Create Free Account
            </button>
        </form>
        
        <!-- Login Link -->
        <p class="text-center text-sm text-gray-600 mt-6">
            Already have an account? <a href="/login" class="text-[#0077b6] hover:underline">Sign In</a>
        </p>
    </div>

    <!-- Notification Toast -->
    <div id="notification" class="fixed bottom-6 right-6 hidden px-6 py-3 rounded-lg shadow-lg z-50"></div>

    <script>
        // Initialize Supabase
        const supabaseUrl = 'https://trzisijyeetygylpsidl.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyemlzaWp5ZWV0eWd5bHBzaWRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NTU0NzYsImV4cCI6MjA4ODIzMTQ3Nn0.sEd4E4n_YgXTgA53Tb-K9ueQvrIFuj9AA0pBshzTVyE';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        // Define EchoStack-Specific Topics
        const echoStackTopics = [
            "Ashanti Culture",
            "Ga Traditions", 
            "Ewe Music",
            "Northern Food",
            "Gold Coast History",
            "Slave Castles",
            "Highlife Music",
            "Traditional Drums",
            "Kente Cloth",
            "Fante Language",
            "Mole National Park",
            "Kakum Forest",
            "Lake Volta",
            "Twi Language",
            "Dagomba Stories",
            "Chieftaincy",
            "Oral Histories",
            "Modern Ghana Art",
            "Afrobeats History",
            "Akwaaba Festivals"
        ];
        
        let selectedTopics = [];
        const MAX_TOPICS = 3;

        // Render Topics
        const container = document.getElementById('topics-container');
        echoStackTopics.forEach(topic => {
            const tag = document.createElement('div');
            tag.className = 'topic-tag';
            tag.textContent = topic;
            tag.onclick = () => toggleTopic(topic, tag);
            container.appendChild(tag);
        });

        // Toggle Topic Selection
        function toggleTopic(topic, element) {
            const index = selectedTopics.indexOf(topic);
            
            if (index === -1) {
                // Add topic
                if (selectedTopics.length >= MAX_TOPICS) {
                    showNotification(`You can only select ${MAX_TOPICS} topics`, 'error');
                    return;
                }
                selectedTopics.push(topic);
                element.classList.add('selected');
            } else {
                // Remove topic
                selectedTopics.splice(index, 1);
                element.classList.remove('selected');
            }
            
            // Update counter
            const countDisplay = document.getElementById('selected-count');
            countDisplay.textContent = `${selectedTopics.length} / ${MAX_TOPICS} selected`;
            
            // Enable/disable submit button
            const submitBtn = document.getElementById('submit-btn');
            if (selectedTopics.length === MAX_TOPICS) {
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                submitBtn.style.cursor = 'pointer';
            } else {
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
                submitBtn.style.cursor = 'not-allowed';
            }
        }

        // Handle Signup Submission
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (selectedTopics.length !== MAX_TOPICS) {
                showNotification(`Please select exactly ${MAX_TOPICS} topics`, 'error');
                return;
            }
            
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = '<div class="loading-spinner"></div> Creating Account...';
            btn.disabled = true;
            
            const formData = {
                username: document.getElementById('username').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                topics: selectedTopics
            };
            
            try {
                // Check if username/email already exists
                const { data: existingUser, error: checkError } = await supabase
                    .from('users')
                    .select('*')
                    .eq('username', formData.username)
                    .or(`email.eq.${formData.email}`)
                    .single();
                
                if (checkError && !checkError.message.includes('No rows')) {
                    throw checkError;
                }
                
                if (existingUser) {
                    throw new Error('Username or email already taken');
                }
                
                // Insert new user into Supabase
                const { data, error } = await supabase
                    .from('users')
                    .insert([{
                        username: formData.username,
                        email: formData.email,
                        password_hash: btoa(formData.password), // Simple encoding (upgrade later)
                        preferences: formData.topics
                    }])
                    .select()
                    .single();
                
                if (error) throw error;
                
                showNotification('✅ Account created successfully!', 'success');
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 1500);
                
            } catch (error) {
                console.error('Signup error:', error);
                showNotification('❌ ' + error.message || 'Registration failed', 'error');
                btn.innerHTML = '✨ Create Free Account';
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.style.cursor = 'pointer';
            }
        });

        // Notification Function
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.className = 'fixed bottom-6 right-6 px-6 py-3 rounded-lg shadow-lg z-50 text-white ' + 
                (type === 'success' ? 'bg-green-600' : 'bg-red-600');
            notification.innerText = message;
            notification.classList.remove('hidden');
            setTimeout(() => notification.classList.add('hidden'), 3000);
        }
        
        // Initialize submit button state
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('submit-btn').style.opacity = '0.5';
        document.getElementById('submit-btn').style.cursor = 'not-allowed';
    </script>
</body>
</html>
