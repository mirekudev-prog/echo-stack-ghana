                <label>Password <span style="color:var(--danger)">*</span></label>
                <div class="pw-wrap">
                    <input type="password" id="password" placeholder="Minimum 6 characters" autocomplete="new-password" oninput="checkPwStrength(this.value)">
                    <button class="pw-toggle" type="button" onclick="togglePw()" id="pw-eye" title="Show/hide password">👁</button>
                </div>
                <div class="pw-strength"><div class="pw-fill" id="pw-fill"></div></div>
                <div class="field-hint" id="pw-hint">Enter a password</div>

<div class="toast" id="toast"></div>

<script>
const TOPICS = [ ... ]; // same as before
const MAX = 3;
let selected = [];

// Render topics (same)
...

function toggleTopic(topic, el) { ... }

function goToStep2() { ... } // same validation

function goToStep1() { ... }

// NEW: Password toggle function
function togglePw() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('pw-eye');
    if (inp.type === 'password') {
        inp.type = 'text';
        btn.textContent = '🙈';
    } else {
        inp.type = 'password';
        btn.textContent = '👁';
    }
}

async function completeSignup() {
    if (selected.length !== MAX) { showToast(`Please select exactly ${MAX} topics`, 'er'); return; }

    const btn = document.getElementById('create-btn');
    btn.innerHTML = '<div class="spin"></div> Creating Account…';
    btn.disabled = true;

    const fd = new FormData();
    fd.append('username', document.getElementById('username').value.trim());
    fd.append('email',    document.getElementById('email').value.trim());
    fd.append('password', document.getElementById('password').value);
    fd.append('topics',   JSON.stringify(selected));

    try {
        const r = await fetch('/api/users/signup', { method: 'POST', body: fd });
        const d = await r.json();

        if (r.ok && d.success) {
            // Show success message – account created, please verify email
            showToast('✅ ' + d.message, 'ok');
            // Redirect to a "check your email" page or just show message and stay
            setTimeout(() => {
                window.location.href = '/user-login?verified=please';
            }, 3000);
        } else {
            throw new Error(d.detail || 'Registration failed. Try a different username or email.');
        }
    } catch (err) {
        showToast('❌ ' + err.message, 'er');
        btn.innerHTML = '✨ Create Free Account';
        btn.disabled = false;
    }
}
