<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join EchoStack</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4">Join EchoStack</h1>
        <form id="signupForm" class="space-y-4">
            <input type="text" id="username" placeholder="Username" required class="w-full p-2 border rounded">
            <input type="email" id="email" placeholder="Email" required class="w-full p-2 border rounded">
            <input type="password" id="password" placeholder="Password" required class="w-full p-2 border rounded">
            <input type="hidden" id="interests" value="General">
            <button type="submit" class="w-full bg-orange-600 text-white p-2 rounded">Create Free Account</button>
        </form>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('password', document.getElementById('password').value);
            formData.append('interests', document.getElementById('interests').value);

            try {
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.success) {
                    alert("Account created!");
                    window.location.href = '/';
                } else {
                    alert("Error: " + (result.detail || "Signup failed"));
                }
            } catch (err) {
                alert("Server error. Please try again.");
            }
        });
    </script>
</body>
</html>
