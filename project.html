<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B2A">
    <title>Project - EchoStack</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/base.css">
</head>
<body>
<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/" class="sidebar-logo">
                <img src="/echostack-logo.png" alt="EchoStack" onerror="this.style.display='none'">
                <span>EchoStack</span>
            </a>
        </div>
        <div class="sidebar-user" id="sidebarUser">
            <div class="sidebar-avatar" id="sidebarAvatar">U</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sidebarName">User</div>
                <div class="sidebar-user-badge badge-free" id="sidebarBadge">Free</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section">
                <a href="/dashboard" class="sidebar-link"><i class="fas fa-home"></i><span>Feed</span></a>
                <a href="/reels" class="sidebar-link"><i class="fas fa-film"></i><span>Reels</span></a>
                <a href="/explore" class="sidebar-link"><i class="fas fa-compass"></i><span>Explore</span></a>
                <a href="/archive" class="sidebar-link"><i class="fas fa-archive"></i><span>Archive</span></a>
                <a href="/app" class="sidebar-link"><i class="fas fa-map-marked-alt"></i><span>Map</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Social</div>
                <a href="/following" class="sidebar-link"><i class="fas fa-user-friends"></i><span>Following</span></a>
                <a href="/messages" class="sidebar-link"><i class="fas fa-envelope"></i><span>Messages</span></a>
                <a href="/notifications" class="sidebar-link"><i class="fas fa-bell"></i><span>Notifications</span></a>
                <a href="/chatbot" class="sidebar-link"><i class="fas fa-comments"></i><span>Community Chat</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Create</div>
                <a href="/creator" class="sidebar-link"><i class="fas fa-plus-circle"></i><span>Create Post</span></a>
                <a href="/premium" class="sidebar-link"><i class="fas fa-crown"></i><span>Premium</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Account</div>
                <a href="/user-profile" class="sidebar-link"><i class="fas fa-user"></i><span>My Profile</span></a>
                <a href="/settings" class="sidebar-link"><i class="fas fa-cog"></i><span>Settings</span></a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <button class="sidebar-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Sign Out</span></button>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="main-wrapper">
        <header class="topbar">
            <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="topbar-title" id="topbarTitle">Project</div>
            <div class="topbar-actions">
                <a href="/notifications" class="topbar-btn"><i class="fas fa-bell"></i></a>
                <a href="/chatbot" class="topbar-btn"><i class="fas fa-robot"></i></a>
            </div>
        </header>

        <main class="main-content" style="padding-bottom:100px">
            <div id="projectContent">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </main>
    </div>
</div>

<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
}

async function logout() {
    await fetch('/api/users/logout', { method: 'POST', credentials: 'include' });
    localStorage.removeItem('es_user');
    location.href = '/';
}

async function checkAuth() {
    try {
        const res = await fetch('/api/users/me', { credentials: 'include' });
        if (res.ok) {
            const user = await res.json();
            const initial = (user.username || 'U').charAt(0).toUpperCase();
            if (document.getElementById('sidebarAvatar')) document.getElementById('sidebarAvatar').textContent = initial;
            if (document.getElementById('sidebarName')) document.getElementById('sidebarName').textContent = user.full_name || user.username;
            const badge = document.getElementById('sidebarBadge');
            if (badge) {
                if (user.role === 'admin' || user.role === 'superuser') { badge.className = 'sidebar-user-badge badge-admin'; badge.textContent = 'Admin'; }
                else if (user.role === 'creator') { badge.className = 'sidebar-user-badge badge-creator'; badge.textContent = 'Creator'; }
                else if (user.is_premium) { badge.className = 'sidebar-user-badge badge-premium'; badge.textContent = 'Premium'; }
            }
        }
    } catch(e) {}
}

checkAuth();
</script>
<script>
function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function loadProject() {
    const path = location.pathname;
    const match = path.match(/\/project\/(\d+)/);
    if (!match) {
        document.getElementById('projectContent').innerHTML = '<div class="empty-state"><i class="fas fa-folder"></i><h3>Project not found</h3></div>';
        return;
    }
    
    try {
        const res = await fetch(`/api/admin/projects/${match[1]}`);
        if (!res.ok) throw new Error('Not found');
        const project = await res.json();
        document.getElementById('projectTitle').textContent = project.name;
        renderProject(project);
    } catch(e) {
        document.getElementById('projectContent').innerHTML = '<div class="empty-state"><i class="fas fa-folder"></i><h3>Project not found</h3></div>';
    }
}

function renderProject(project) {
    const container = document.getElementById('projectContent');
    
    let blocksHtml = '';
    if (project.blocks?.length) {
        project.blocks.forEach(b => {
            blocksHtml += renderBlock(b);
        });
    }
    
    let audioHtml = '';
    if (project.audio_clips?.length) {
        audioHtml = '<section style="padding:24px 16px;border-top:1px solid var(--border)"><h2 style="font-family:Playfair Display,serif;font-size:1.3rem;margin-bottom:16px">Audio Archive</h2>';
        project.audio_clips.forEach(a => {
            audioHtml += `<div class="audio-card">
                <div class="audio-header">
                    <div class="audio-icon"><i class="fas fa-headphones"></i></div>
                    <div class="audio-info">
                        <h4>${escapeHtml(a.title)}</h4>
                        <p>${escapeHtml(a.region || 'Ghana')} · ${escapeHtml(a.language || 'Various')}</p>
                    </div>
                </div>
                ${a.url ? `<audio src="${escapeHtml(a.url)}" controls style="width:100%"></audio>` : '<p style="color:var(--text-muted);font-size:.85rem">Audio coming soon</p>'}
            </div>`;
        });
        audioHtml += '</section>';
    }
    
    let revenueHtml = '';
    if (project.revenue_plans?.length) {
        revenueHtml = '<section style="padding:24px 16px;border-top:1px solid var(--border)"><h2 style="font-family:Playfair Display,serif;font-size:1.3rem;margin-bottom:16px">Access Plans</h2><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px">';
        project.revenue_plans.forEach(r => {
            const isFree = r.amount === 0;
            revenueHtml += `<div class="card" style="padding:24px;text-align:center">
                <h3 style="font-family:Playfair Display,serif;font-size:1.1rem;margin-bottom:8px">${escapeHtml(r.name)}</h3>
                <div style="font-size:2rem;font-weight:700;color:var(--gold);margin-bottom:8px">${isFree ? 'Free' : `${(r.amount/100).toFixed(2)} ${r.currency}`}</div>
                <p style="color:var(--text-secondary);font-size:.85rem;margin-bottom:16px">${escapeHtml(r.description)}</p>
                <button class="btn ${isFree ? 'btn-secondary' : 'btn-primary'}" style="width:100%;border-radius:50px">${isFree ? 'Get Started' : 'Subscribe'}</button>
            </div>`;
        });
        revenueHtml += '</div></section>';
    }
    
    container.innerHTML = `
        <section style="padding:24px 16px;background:linear-gradient(135deg,var(--card),var(--ink2));border-bottom:1px solid var(--border)">
            <span class="badge badge-gold" style="margin-bottom:12px">Project</span>
            <h1 style="font-family:Playfair Display,serif;font-size:1.8rem;margin-bottom:12px">${escapeHtml(project.name)}</h1>
            <p style="color:var(--text-secondary);line-height:1.7">${escapeHtml(project.description)}</p>
        </section>
        <section style="padding:16px" id="blocks">${blocksHtml}</section>
        ${audioHtml}
        ${revenueHtml}
        <footer class="footer">
            <div class="footer-brand">EchoStack Ghana</div>
            <p class="footer-text">Preserving Ghana's cultural heritage</p>
            <p class="footer-dev">Built by Mireku Development</p>
        </footer>
    `;
}

function renderBlock(block) {
    const iconMap = { concept: 'fa-lightbulb', section: 'fa-folder', component: 'fa-cube', detail: 'fa-file-alt' };
    const icon = iconMap[block.block_type] || 'fa-file';
    
    if (block.block_type === 'concept') {
        return `<div style="background:var(--card);border:1px solid var(--gold);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
                <i class="fas ${icon}" style="color:var(--gold)"></i>
                <h2 style="font-family:Playfair Display,serif;font-size:1.3rem">${escapeHtml(block.title)}</h2>
            </div>
            <p style="color:var(--text-secondary);line-height:1.8;font-style:italic">${escapeHtml(block.content)}</p>
        </div>`;
    }
    
    if (block.block_type === 'component') {
        return `<div class="card" style="margin-bottom:12px;padding:20px;border-left:3px solid var(--gold)">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
                <i class="fas ${icon}" style="color:var(--gold)"></i>
                <h3 style="font-weight:700">${escapeHtml(block.title)}</h3>
            </div>
            <p style="color:var(--text-secondary);line-height:1.7">${escapeHtml(block.content)}</p>
        </div>`;
    }
    
    // detail/section blocks - render content with formatting
    const formatted = (block.content || '').split('\n').map(line => {
        if (line.startsWith('Phase') || line.startsWith('Core') || line.startsWith('Revenue') || line.startsWith('Show') || line.startsWith('Podcast')) {
            return `<h4 style="color:var(--gold);margin:16px 0 8px;font-weight:700">${escapeHtml(line)}</h4>`;
        }
        if (line.startsWith('•') || line.startsWith('-')) {
            return `<div style="padding-left:16px;color:var(--text-secondary);margin-bottom:4px">${escapeHtml(line)}</div>`;
        }
        if (line.match(/^\d+\./)) {
            return `<div style="padding-left:16px;color:var(--text-secondary);margin-bottom:4px;font-weight:500">${escapeHtml(line)}</div>`;
        }
        return line.trim() ? `<p style="margin-bottom:8px">${escapeHtml(line)}</p>` : '';
    }).join('');
    
    return `<div class="card" style="margin-bottom:16px;padding:20px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
            <i class="fas ${icon}" style="color:var(--gold)"></i>
            <h3 style="font-family:Playfair Display,serif;font-size:1.1rem">${escapeHtml(block.title)}</h3>
        </div>
        <div style="color:var(--text-secondary);line-height:1.7">${formatted}</div>
    </div>`;
}

loadProject();
</script>
</body>
</html>
