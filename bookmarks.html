<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B2A">
    <title>Bookmarks - EchoStack</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/font-awesome.css">
    <link rel="stylesheet" href="/css/base.css">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="/echostack-logo.png" alt="EchoStack">
                    <span>EchoStack</span>
                </div>
            </div>
            <div class="sidebar-user">
                <div class="sidebar-avatar" id="userAvatar"></div>
                <div>
                    <div class="sidebar-user-name" id="userName">Loading...</div>
                    <span class="sidebar-user-badge badge-free" id="userBadge">Free</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section">
                    <a href="/dashboard" class="sidebar-link"><i class="fas fa-home"></i> Feed</a>
                    <a href="/explore" class="sidebar-link"><i class="fas fa-compass"></i> Explore</a>
                    <a href="/reels" class="sidebar-link"><i class="fas fa-video"></i> Reels</a>
                    <a href="/archive" class="sidebar-link"><i class="fas fa-landmark"></i> Archive</a>
                </div>
                <div class="sidebar-section">
                    <a href="/activity" class="sidebar-link"><i class="fas fa-bell"></i> Activity</a>
                    <a href="/following" class="sidebar-link"><i class="fas fa-user-friends"></i> Following</a>
                    <a href="/bookmarks" class="sidebar-link active"><i class="fas fa-bookmark"></i> Bookmarks</a>
                    <a href="/messages" class="sidebar-link"><i class="fas fa-envelope"></i> Messages</a>
                </div>
                <div class="sidebar-section">
                    <a href="/creator" class="sidebar-link"><i class="fas fa-pen-fancy"></i> Creator</a>
                    <a href="/settings" class="sidebar-link"><i class="fas fa-cog"></i> Settings</a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button class="sidebar-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <!-- Main Content -->
        <div class="main-wrapper">
            <header class="topbar">
                <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <h1 class="topbar-title">Bookmarks</h1>
                <div class="topbar-actions">
                    <a href="/notifications" class="topbar-btn"><i class="fas fa-bell"></i></a>
                </div>
            </header>

            <main class="section">
                <div id="bookmarksContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading bookmarks...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        let currentUser = null;
        let bookmarks = [];

        // Toggle sidebar on mobile
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').style.display = 
                document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
        }

        // Logout
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/user-login';
        }

        // Load user data
        async function loadUser() {
            try {
                const res = await fetch('/api/users/me');
                if (!res.ok) throw new Error('Not authenticated');
                currentUser = await res.json();
                document.getElementById('userName').textContent = currentUser.username;
                
                if (currentUser.avatar_url) {
                    document.getElementById('userAvatar').innerHTML = `<img src="${currentUser.avatar_url}" alt="${currentUser.username}">`;
                } else {
                    document.getElementById('userAvatar').textContent = currentUser.username.charAt(0).toUpperCase();
                }

                const badge = document.getElementById('userBadge');
                if (currentUser.is_premium) {
                    badge.className = 'sidebar-user-badge badge-premium';
                    badge.textContent = 'Premium';
                } else if (currentUser.role === 'admin') {
                    badge.className = 'sidebar-user-badge badge-admin';
                    badge.textContent = 'Admin';
                } else if (currentUser.role === 'creator') {
                    badge.className = 'sidebar-user-badge badge-creator';
                    badge.textContent = 'Creator';
                }
            } catch (err) {
                window.location.href = '/user-login';
            }
        }

        // Load bookmarks
        async function loadBookmarks() {
            try {
                const res = await fetch('/api/bookmarks');
                if (!res.ok) throw new Error('Failed to load bookmarks');
                bookmarks = await res.json();
                renderBookmarks();
            } catch (err) {
                document.getElementById('bookmarksContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-bookmark"></i>
                        <h3>No bookmarks yet</h3>
                        <p>Save posts to read them later</p>
                    </div>
                `;
            }
        }

        // Render bookmarks
        function renderBookmarks() {
            const container = document.getElementById('bookmarksContainer');
            
            if (bookmarks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-bookmark"></i>
                        <h3>No bookmarks yet</h3>
                        <p>Save posts to read them later</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = bookmarks.map(post => `
                <article class="post-card" onclick="window.location.href='/read/${post.id}'">
                    <div class="post-header">
                        <div class="post-avatar">${post.author_username?.charAt(0).toUpperCase() || '?'}</div>
                        <div>
                            <div class="post-author">${post.author_username || 'Unknown'}</div>
                            <div class="post-meta">
                                <span class="post-type-badge ${post.content_type || 'article'}">${post.content_type || 'Article'}</span>
                                <span>•</span>
                                <span>${new Date(post.created_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                    </div>
                    <h3 class="post-title">${post.title || 'Untitled'}</h3>
                    <p class="post-excerpt">${post.excerpt || ''}</p>
                    ${post.media_url ? `
                        <div class="post-media">
                            <img src="${post.media_url}" alt="${post.title}">
                        </div>
                    ` : ''}
                    <div class="post-actions">
                        <span class="post-action"><i class="far fa-heart"></i> ${post.like_count || 0}</span>
                        <span class="post-action"><i class="far fa-comment"></i> ${post.comment_count || 0}</span>
                        <span class="post-action saved"><i class="fas fa-bookmark"></i> Saved</span>
                    </div>
                </article>
            `).join('');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadUser();
            loadBookmarks();
        });

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registered:', reg.scope))
                .catch(err => console.warn('SW registration failed:', err));
        }
    </script>
</body>
</html>
