<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B2A">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Explore - EchoStack</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/font-awesome.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/style.css">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
</head>
<body>
<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/" class="sidebar-logo">
                <img src="/echostack-logo.png" alt="EchoStack" onerror="this.style.display='none'">
                <span>EchoStack</span>
            </a>
                <button class="sidebar-toggle" aria-label="Toggle sidebar" onclick="toggleSidebarCollapse()"><i class="fas fa-chevron-left"></i></button>
        </div>
        <div class="sidebar-user" id="sidebarUser">
            <div class="sidebar-avatar" id="sidebarAvatar">U</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sidebarName">User</div>
                <div class="sidebar-user-badge badge-free" id="sidebarBadge">Free</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section">
                
                <a href="/reels" class="sidebar-link"><i class="fas fa-film"></i><span>Reels</span></a>
                <a href="/explore" class="sidebar-link active"><i class="fas fa-compass"></i><span>Explore</span></a>
                <a href="/archive" class="sidebar-link"><i class="fas fa-archive"></i><span>Archive</span></a>
                <a href="/app" class="sidebar-link"><i class="fas fa-map-marked-alt"></i><span>Map</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Social</div>
                <a href="/following" class="sidebar-link"><i class="fas fa-user-friends"></i><span>Following</span></a>
                <a href="/messages" class="sidebar-link"><i class="fas fa-envelope"></i><span>Messages</span></a>
                <a href="/notifications" class="sidebar-link"><i class="fas fa-bell"></i><span>Notifications</span></a>
                <a href="/chat" class="sidebar-link"><i class="fas fa-users"></i><span>Community Chat</span></a>
                <a href="/chatbot" class="sidebar-link"><i class="fas fa-robot"></i><span>EchoBot AI</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Create</div>
                <a href="/creator" class="sidebar-link"><i class="fas fa-plus-circle"></i><span>Create Post</span></a>
                <a href="/premium" class="sidebar-link"><i class="fas fa-crown"></i><span>Premium</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Account</div>
                <a href="/user-profile" class="sidebar-link"><i class="fas fa-user"></i><span>My Profile</span></a>
                <a href="/settings" class="sidebar-link"><i class="fas fa-cog"></i><span>Settings</span></a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <button class="sidebar-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Sign Out</span></button>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="toast" id="toast"></div>

    <div class="main-wrapper">
        <header class="topbar">
            <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="topbar-title">Explore</div>
            <div class="topbar-actions">
                <a href="/notifications" class="topbar-btn"><i class="fas fa-bell"></i></a>
                <a href="/chatbot" class="topbar-btn"><i class="fas fa-robot"></i></a>
            </div>
        </header>

        <main class="main-content">
            <!-- SEARCH -->
            <div style="padding:12px 16px;border-bottom:1px solid var(--main-border);background:var(--main-card)">
                <div style="display:flex;align-items:center;gap:12px;background:var(--main-bg);border:1px solid var(--main-border);border-radius:var(--radius-full);padding:10px 16px">
                    <i class="fas fa-search" style="color:var(--main-muted)"></i>
                    <input type="text" id="searchInput" placeholder="Search stories, creators, regions..." style="flex:1;background:none;border:none;color:var(--main-text);font-size:.95rem;outline:none" oninput="debounceSearch(this.value)">
                </div>
            </div>

            <!-- FILTERS -->
            <div style="display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none">
                <button class="tab active" onclick="setFilter(this,'')">All</button>
                <button class="tab" onclick="setFilter(this,'article')">Articles</button>
                <button class="tab" onclick="setFilter(this,'audio')">Audio</button>
                <button class="tab" onclick="setFilter(this,'video')">Videos</button>
            </div>

            <!-- CONTENT -->
            <div style="padding:16px" id="content">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </main>
    </div>
</div>

<script src="/js/common.js"></script>
<script>
let currentFilter = '';
let user = null;

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const isOpen = sidebar.classList.toggle('open');
    overlay.classList.toggle('show', isOpen);
    document.body.classList.toggle('sidebar-open', isOpen);
    if (window.innerWidth < 1024) {
        document.body.style.overflow = isOpen ? 'hidden' : '';
    }
}

function closeSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (sidebar) sidebar.classList.remove('open');
    if (overlay) overlay.classList.remove('show');
    document.body.classList.remove('sidebar-open');
    document.body.style.overflow = '';
}

async function logout() {
    await fetch('/api/users/logout', { method: 'POST', credentials: 'include' });
    localStorage.removeItem('es_user');
    location.href = '/';
}

async function loadUser() {
    try {
        const res = await fetch('/api/users/me', { credentials: 'include' });
        if (res.ok) {
            user = await res.json();
            const initial = (user.username || 'U').charAt(0).toUpperCase();
            if (document.getElementById('sidebarAvatar')) document.getElementById('sidebarAvatar').textContent = initial;
            if (document.getElementById('sidebarName')) document.getElementById('sidebarName').textContent = user.full_name || user.username;
            const badge = document.getElementById('sidebarBadge');
            if (badge) {
                if (user.role === 'admin' || user.role === 'superuser') { badge.className = 'sidebar-user-badge badge-admin'; badge.textContent = 'Admin'; }
                else if (user.role === 'creator') { badge.className = 'sidebar-user-badge badge-creator'; badge.textContent = 'Creator'; }
                else if (user.is_premium) { badge.className = 'sidebar-user-badge badge-premium'; badge.textContent = 'Premium'; }
            }
            loadPosts();
        } else {
            location.href = '/user-login';
        }
    } catch(e) {
        location.href = '/user-login';
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function timeAgo(dateStr) {
    if (!dateStr) return '';
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 60) return Math.floor(diff) + 's';
    if (diff < 3600) return Math.floor(diff / 60) + 'm';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h';
    return Math.floor(diff / 86400) + 'd';
}

function setFilter(el, filter) {
    currentFilter = filter;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    loadPosts();
}

let searchTimeout;
function debounceSearch(query) {
    clearTimeout(searchTimeout);
    if (query.length < 2) { loadPosts(); return; }
    searchTimeout = setTimeout(() => performSearch(query), 300);
}

async function performSearch(query) {
    const container = document.getElementById('content');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
        let url = `/api/search?q=${encodeURIComponent(query)}&sort=recent&limit=20`;
        if (currentFilter) url += `&content_type=${currentFilter}`;
        const res = await fetch(url);
        const data = await res.json();
        renderResults(data);
    } catch(e) { container.innerHTML = '<div class="empty-state"><i class="fas fa-wifi"></i><h3>Search failed</h3></div>'; }
}

async function loadPosts() {
    const container = document.getElementById('content');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
        let url = '/api/posts?limit=20&status=published';
        if (currentFilter) url += `&content_type=${currentFilter}`;
        const res = await fetch(url);
        const posts = await res.json();
        renderPosts(posts);
    } catch(e) { container.innerHTML = '<div class="empty-state"><i class="fas fa-wifi"></i><h3>Load failed</h3></div>'; }
}

function renderResults(data) {
    const container = document.getElementById('content');
    let html = '';
    
    if (data.users?.length) {
        html += '<h3 style="margin-bottom:12px;font-size:.85rem;color:var(--main-muted);text-transform:uppercase">Creators</h3>';
        data.users.forEach(u => {
            html += `<div class="card" style="margin-bottom:10px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer" onclick="location.href='/user/${u.username}'">
                <div class="post-avatar">${u.username.charAt(0).toUpperCase()}</div>
                <div style="flex:1"><div style="font-weight:600">${escapeHtml(u.channel_name || u.username)}</div><div style="font-size:.8rem;color:var(--main-muted)">@${escapeHtml(u.username)} · ${u.follower_count || 0} followers</div></div>
            </div>`;
        });
    }
    
    if (data.posts?.length) {
        html += '<h3 style="margin:20px 0 12px;font-size:.85rem;color:var(--main-muted);text-transform:uppercase">Stories</h3>';
        renderPosts(data.posts, container, html);
        return;
    }
    
    if (!html) html = '<div class="empty-state"><i class="fas fa-search"></i><h3>No results</h3></div>';
    container.innerHTML = html;
}

function renderPosts(posts, container, prefix = '') {
    const c = container || document.getElementById('content');
    if (!posts?.length) { c.innerHTML = prefix + '<div class="empty-state"><i class="fas fa-newspaper"></i><h3>No stories</h3></div>'; return; }
    
    c.innerHTML = prefix + posts.map(p => {
        const author = p.author_username || 'User';
        const initial = author.charAt(0).toUpperCase();
        const typeBadge = p.content_type ? `<span class="post-type-badge ${p.content_type}">${p.content_type}</span>` : '';
        const isVerified = (p.author_role === 'admin' || p.author_role === 'creator' || p.is_verified);
        
        let mediaHtml = '';
        const vUrl = p.video_url || p.media_url;
        const aUrl = p.audio_url || p.media_url;
        const mUrl = p.media_url || p.cover_image;

        if (p.content_type === 'video' || p.content_type === 'reel') {
            if (vUrl) {
                mediaHtml = `
                    <div class="post-media" onclick="event.stopPropagation()">
                        <video src="${escapeHtml(vUrl)}" controls preload="metadata"></video>
                    </div>`;
            }
        } else if (p.content_type === 'audio') {
            if (aUrl) {
                mediaHtml = `
                    <div class="audio-card" onclick="event.stopPropagation()">
                        <div class="audio-header">
                            <div class="audio-icon"><i class="fas fa-headphones"></i></div>
                            <div class="audio-info">
                                <h4>${escapeHtml(p.title)}</h4>
                                <p>${escapeHtml(author)}</p>
                            </div>
                        </div>
                        <audio controls preload="none"><source src="${escapeHtml(aUrl)}" type="audio/mpeg"></audio>
                    </div>`;
            }
        } else if (mUrl) {
            mediaHtml = `
                <div class="post-media">
                    <img src="${escapeHtml(mUrl)}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'">
                </div>`;
        }

        return `
            <article class="post-card" onclick="location.href='/post/${p.id}'">
                <div class="post-header">
                    <div class="post-avatar">${initial}</div>
                    <div class="post-author-info">
                        <div class="post-author">
                            ${escapeHtml(author)}
                            ${isVerified ? '<i class="fas fa-check-circle verified" title="Verified Creator"></i>' : ''}
                        </div>
                        <div class="post-meta">
                            <span>${timeAgo(p.created_at)}</span>
                            <span>•</span>
                            ${typeBadge}
                        </div>
                    </div>
                </div>

                <div class="post-card-content">
                    <h3 class="post-card-title">${escapeHtml(p.title)}</h3>
                    ${p.excerpt ? `<p class="post-card-excerpt">${escapeHtml(p.excerpt)}</p>` : ''}
                    
                    ${mediaHtml}

                    <div class="post-actions">
                        <div class="post-action-group">
                            <button class="post-action">
                                <i class="fas fa-heart"></i>
                                <span>${p.likes || 0}</span>
                            </button>
                            <button class="post-action">
                                <i class="fas fa-comment"></i>
                                <span>${p.comments_count || 0}</span>
                            </button>
                        </div>
                        <div class="post-action-group">
                            <button class="post-action" onclick="event.stopPropagation();sharePost(${p.id})">
                                <i class="fas fa-share-alt"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </article>
        `;
    }).join('');
}

function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 2500);
}

function sharePost(postId) {
    const url = `${location.origin}/post/${postId}`;
    if (navigator.share) {
        navigator.share({ title: 'EchoStack', url });
    } else {
        navigator.clipboard.writeText(url);
        showToast('Link copied!');
    }
}

// Ensure sidebar is closed on page load
closeSidebar();

// Handle browser back/forward navigation
window.addEventListener('popstate', closeSidebar);

loadUser();
</script>
</body>
</html>
