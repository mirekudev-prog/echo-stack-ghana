<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D1B2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="UTF-8">
<title>Explore — EchoStack</title>
<link rel="icon" type="image/png" href="/echostack-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0D1B2A;
  --gold:#C8962E;
  --gold2:#E8B84B;
  --border:#E2E8F0;
  --muted:#94A3B8;
  --blue:#0077b6;
  --cream:#F8FAFC;
  --sidebar-w:260px;
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── TOP BAR (mobile only) ── */
.topbar{
  display:none;
  position:fixed;
  top:0; left:0; right:0;
  height:60px;
  background:var(--ink);
  border-bottom:2px solid var(--gold);
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  z-index:300;
}
.topbar-logo{
  font-family:'Playfair Display',serif;
  color:#fff;
  font-size:1.1rem;
  font-weight:700;
}
.menu-btn{
  background:none;
  border:none;
  color:rgba(255,255,255,.8);
  font-size:1.5rem;
  cursor:pointer;
  padding:8px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.menu-btn:hover{color:#fff;}

/* ── SIDEBAR (dark) ── */
.sidebar{
  position:fixed;
  left:0; top:0;
  width:var(--sidebar-w);
  height:100vh;
  background:var(--ink);
  display:flex;
  flex-direction:column;
  z-index:200;
  padding:20px 0;
  overflow-y:auto;
  transition:transform .3s ease;
}
.sidebar-logo{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;
  font-weight:700;
  color:#fff;
  padding:0 20px 20px;
  border-bottom:1px solid rgba(255,255,255,.1);
}
.sidebar-nav{
  flex:1;
  padding:12px 0;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 20px;
  color:rgba(255,255,255,.7);
  text-decoration:none;
  font-size:.95rem;
  font-weight:500;
  transition:all .15s;
}
.nav-item:hover,
.nav-item.active{
  background:rgba(255,255,255,.1);
  color:#fff;
}
.nav-item .icon{font-size:1.1rem; width:24px; text-align:center;}
.sidebar-footer{
  padding:20px;
  border-top:1px solid rgba(255,255,255,.1);
}
.logout-btn{
  width:100%;
  padding:10px;
  background:rgba(239,68,68,.15);
  border:1px solid rgba(239,68,68,.3);
  color:#fca5a5;
  border-radius:8px;
  font-size:.85rem;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:all .2s;
}
.logout-btn:hover{
  background:rgba(239,68,68,.3);
  color:#fff;
}

/* ── SIDEBAR OVERLAY (mobile) ── */
.sidebar-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  z-index:199;
  backdrop-filter:blur(2px);
}
.sidebar-overlay.show{display:block;}

/* ── MAIN CONTENT ── */
.main{
  margin-left:var(--sidebar-w);
  padding:40px 24px;
  max-width:900px;
  min-height:100vh;
  transition:margin .3s;
}

/* ── PAGE HEADER ── */
.page-title{
  font-family:'Playfair Display',serif;
  font-size:2rem;
  font-weight:900;
  color:var(--ink);
  margin-bottom:6px;
}
.subtitle{
  font-size:.95rem;
  color:var(--muted);
  margin-bottom:32px;
}

/* ── FILTER TABS (copied from dashboard) ── */
.filter-tabs{
  display:flex;
  gap:6px;
  margin-bottom:24px;
  overflow-x:auto;
  scrollbar-width:none;
  padding-bottom:2px;
}
.filter-tabs::-webkit-scrollbar{display:none;}
.tab{
  padding:7px 16px;
  border-radius:24px;
  font-size:.8rem;
  font-weight:600;
  cursor:pointer;
  border:1.5px solid var(--border);
  background:#fff;
  color:var(--muted);
  transition:all .15s;
  white-space:nowrap;
  font-family:'DM Sans',sans-serif;
}
.tab.active,
.tab:hover{
  background:var(--ink);
  color:#fff;
  border-color:var(--ink);
}

/* ── POST CARDS (enhanced with media previews) ── */
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:20px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  transition:box-shadow .2s;
}
.card:hover{
  box-shadow:0 4px 16px rgba(13,27,42,.08);
}
.post-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px 16px 0;
}
.p-av{
  width:38px;
  height:38px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:#fff;
  font-size:.82rem;
  flex-shrink:0;
  overflow:hidden;
}
.p-info{flex:1;}
.p-name{
  font-size:.84rem;
  font-weight:600;
  color:var(--ink);
}
.p-time{
  font-size:.72rem;
  color:var(--muted);
}
.post-type{
  padding:2px 9px;
  border-radius:12px;
  font-size:.64rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.03em;
}
.type-article{background:#EFF6FF;color:#2563EB;}
.type-story{background:#F0FDF4;color:#16A34A;}
.type-video{background:#FDF2F8;color:#9333EA;}
.type-reel{background:#FCE7F3;color:#B21E6C;}
.type-premium{background:rgba(201,147,58,.15);color:#c9933a;}

.post-title{
  padding:6px 16px 2px;
  font-family:'Playfair Display',serif;
  font-size:1.1rem;
  color:var(--ink);
  line-height:1.4;
  text-decoration:none;
  display:block;
}
.post-excerpt{
  padding:0 16px 8px;
  font-size:.83rem;
  color:#64748B;
  line-height:1.6;
}

/* MEDIA PREVIEW */
.card-media{
  width:100%;
  background:#000;
  position:relative;
  overflow:hidden;
}
.card-media img{
  width:100%;
  max-height:300px;
  object-fit:cover;
  display:block;
}
.card-media video{
  width:100%;
  max-height:300px;
  display:block;
  background:#000;
}
.card-media.reel video{
  max-height:480px;
  aspect-ratio:9/16;
  object-fit:cover;
  margin:0 auto;
}
.play-overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,.55);
  border-radius:50%;
  width:52px;
  height:52px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.4rem;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
  cursor:pointer;
  z-index:10;
}
.reel-watermark{
  position:absolute;
  bottom:8px;
  right:8px;
  background:rgba(0,0,0,.65);
  border-radius:20px;
  padding:4px 10px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:15;
  pointer-events:none;
  backdrop-filter:blur(2px);
  border:1px solid rgba(255,255,255,.15);
}
.reel-watermark img{
  height:18px;
  width:auto;
  display:block;
}
.reel-watermark span{
  color:white;
  font-size:0.7rem;
  font-weight:600;
  margin-left:4px;
  letter-spacing:0.5px;
}
.premium-banner{
  background:linear-gradient(135deg,var(--gold),#a97825);
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:.78rem;
  font-weight:600;
  color:#fff;
}

.post-actions{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:6px;
  padding:10px 16px;
  border-top:1px solid var(--border);
}
.act-btn{
  display:flex;
  align-items:center;
  gap:5px;
  padding:7px 12px;
  border-radius:8px;
  font-size:.79rem;
  font-weight:500;
  cursor:pointer;
  border:none;
  background:none;
  color:var(--muted);
  transition:all .15s;
  font-family:'DM Sans',sans-serif;
  white-space:nowrap;
}
.act-btn:hover{background:#F8FAFC;color:var(--ink);}
.act-read{
  margin-left:auto;
  background:var(--gold);
  color:#fff;
  border-radius:8px;
  padding:7px 16px;
  font-size:.78rem;
  font-weight:700;
  cursor:pointer;
  border:none;
  font-family:'DM Sans',sans-serif;
  text-decoration:none;
  white-space:nowrap;
  flex-shrink:0;
}
.act-read:hover{background:#a97825;}

@media (max-width:480px){
  .post-actions{gap:4px;padding:8px 10px;}
  .act-btn{padding:6px 8px;font-size:.7rem;}
  .act-read{padding:6px 10px;font-size:.7rem;margin-left:0;}
}

.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
  background:#fff;
  border-radius:14px;
  border:1px solid var(--border);
}
.loading{
  text-align:center;
  padding:40px;
  color:var(--muted);
}
.spinner{
  display:inline-block;
  width:24px;
  height:24px;
  border:3px solid #e2e8f0;
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MOBILE STYLES ── */
@media(max-width:768px){
  .topbar{display:flex;}
  .sidebar{
    transform:translateX(-100%);
    width:260px;
  }
  .sidebar.open{transform:translateX(0);}
  .main{
    margin-left:0;
    padding:80px 16px 24px;
  }
  .page-title{font-size:1.8rem;}
}
</style>
</head>
<body>

<!-- MOBILE TOP BAR -->
<div class="topbar">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <span class="topbar-logo">EchoStack</span>
  <div style="width:24px;"></div>
</div>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">EchoStack</div>
  <nav class="sidebar-nav">
    <a href="/app" class="nav-item"><span class="icon">🏠</span> Home</a>
    <a href="/explore" class="nav-item active"><span class="icon">🔍</span> Explore</a>
    <a href="/chat" class="nav-item"><span class="icon">💬</span> Chat</a>
    <a href="/dashboard" class="nav-item"><span class="icon">📊</span> Dashboard</a>
    <a href="/activity" class="nav-item"><span class="icon">⚡</span> Activity</a>
    <a href="/following" class="nav-item"><span class="icon">👥</span> Following</a>
  </nav>
  <div class="sidebar-footer">
    <button onclick="logout()" class="logout-btn">
      <span>🚪</span> Sign Out
    </button>
  </div>
</aside>

<!-- MAIN CONTENT -->
<main class="main" id="main">
  <h1 class="page-title">Explore</h1>
  <p class="subtitle">Discover new stories, creators and heritage from all 16 regions.</p>

  <!-- Filter tabs -->
  <div class="filter-tabs">
    <button class="tab active" onclick="filterByType('', this)">🌍 All</button>
    <button class="tab" onclick="filterByType('article', this)">📰 Articles</button>
    <button class="tab" onclick="filterByType('story', this)">📖 Stories</button>
    <button class="tab" onclick="filterByType('video', this)">🎬 Videos</button>
    <button class="tab" onclick="filterByType('reel', this)">📱 Reels</button>
    <button class="tab" onclick="filterByType('premium', this)">⭐ Premium</button>
  </div>

  <!-- Loading State -->
  <div id="loading-state" class="loading">
    <div class="spinner"></div>
    <p style="margin-top:10px;">Loading posts…</p>
  </div>

  <!-- Posts Container -->
  <div id="content-container" style="display:none;"></div>
</main>

<script>
const API_BASE = '/api';
let allPosts = [];
let currentFilter = ''; // '' = all, article, story, video, reel, premium

// Check login
document.addEventListener('DOMContentLoaded', function() {
  const user = localStorage.getItem('es_user');
  if (!user) {
    window.location.href = '/user-login';
    return;
  }
  loadPosts();
});

// Sidebar functions
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}
// Auto‑close sidebar on mobile after clicking a nav link
document.querySelectorAll('.sidebar-nav a').forEach(link => {
  link.addEventListener('click', (e) => {
    if (window.innerWidth <= 768) {
      setTimeout(closeSidebar, 100);
    }
  });
});

async function loadPosts() {
  try {
    const res = await fetch(`${API_BASE}/posts?status=published&limit=50`);
    const posts = await res.json();
    if (posts && Array.isArray(posts)) {
      allPosts = posts;
      renderPosts(allPosts);
    } else {
      showEmpty('No posts yet 😢', 'Check back soon for new stories!');
    }
  } catch (err) {
    showError(err.message);
  }
}

function filterByType(type, btn) {
  document.querySelectorAll('.filter-tabs .tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = type;

  if (type === 'premium') {
    const filtered = allPosts.filter(p => p.is_premium == 1);
    renderPosts(filtered);
  } else if (type === '') {
    renderPosts(allPosts);
  } else {
    const filtered = allPosts.filter(p => p.content_type === type);
    renderPosts(filtered);
  }
}

function renderPosts(posts) {
  const container = document.getElementById('content-container');
  if (!posts || posts.length === 0) {
    document.getElementById('loading-state').style.display = 'none';
    container.innerHTML = '<div class="empty-state"><h3>No posts found</h3><p>Try a different filter.</p></div>';
    container.style.display = 'block';
    return;
  }

  let html = '';
  posts.forEach(p => {
    const date = new Date(p.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    const authorInitial = (p.author_username || 'C')[0].toUpperCase();
    const typeClass = p.is_premium ? 'type-premium' : ('type-' + (p.content_type || 'article'));
    const typeLabel = p.is_premium ? 'Premium' : (p.content_type || 'article');

    // Media preview
    let mediaHtml = '';
    if (p.content_type === 'reel') {
      const videoUrl = p.video_url || '';
      if (videoUrl) {
        mediaHtml = `<div class="card-media reel" style="position:relative">
          <video preload="none" style="width:100%;display:block;background:#000;" poster="${p.cover_image||''}">
            <source src="${videoUrl}" type="video/mp4">
          </video>
          <div class="play-overlay" onclick="goPost(${p.id})">▶️</div>
          <div class="reel-watermark">
            <img src="/echostack-logo.png" onerror="this.style.display='none'">
            <span>EchoStack</span>
          </div>
        </div>`;
      }
    } else if (p.content_type === 'video') {
      const videoUrl = p.video_url || '';
      if (videoUrl) {
        mediaHtml = `<div class="card-media" style="position:relative">
          <video preload="none" style="width:100%;max-height:300px;display:block;background:#000;" poster="${p.cover_image||''}">
            <source src="${videoUrl}" type="video/mp4">
          </video>
          <div class="play-overlay" onclick="goPost(${p.id})">▶️</div>
        </div>`;
      } else if (p.cover_image) {
        mediaHtml = `<div class="card-media"><img src="${p.cover_image}" alt="" onclick="goPost(${p.id})" style="cursor:pointer"></div>`;
      }
    } else if (p.cover_image) {
      mediaHtml = `<div class="card-media"><img src="${p.cover_image}" alt="" onclick="goPost(${p.id})" style="cursor:pointer"></div>`;
    }

    const premiumBadge = p.is_locked ? `<div class="premium-banner">⭐ Premium Content — Subscribe to read</div>` : '';

    html += `
      <div class="card">
        <div class="post-header">
          <div class="p-av">${authorInitial}</div>
          <div class="p-info">
            <div class="p-name">${escapeHtml(p.author_username || 'Creator')}</div>
            <div class="p-time">${date}</div>
          </div>
          <span class="post-type ${typeClass}">${typeLabel}</span>
        </div>

        <a href="/post/${p.id}" class="post-title">${escapeHtml(p.title)}</a>
        ${p.excerpt ? `<div class="post-excerpt">${escapeHtml(p.excerpt)}</div>` : ''}

        ${mediaHtml}
        ${premiumBadge}

        <div class="post-actions">
          <button class="act-btn" onclick="quickLike(${p.id}, this)">❤️ <span class="lc">${p.likes||0}</span></button>
          <a href="/post/${p.id}" class="act-read">Read →</a>
        </div>
      </div>
    `;
  });

  document.getElementById('loading-state').style.display = 'none';
  container.innerHTML = html;
  container.style.display = 'block';
}

function goPost(id) {
  window.location.href = '/post/' + id;
}

async function quickLike(postId, btn) {
  // Quick like without reload
  try {
    const r = await fetch(`${API_BASE}/posts/${postId}/like`, { method: 'POST' });
    const d = await r.json();
    const countEl = btn.querySelector('.lc');
    if (countEl) countEl.textContent = d.likes ?? 0;
    btn.classList.toggle('liked', !!d.liked);
  } catch (e) {}
}

function logout() {
  fetch('/api/users/logout', { method:'POST' }).finally(() => {
    localStorage.removeItem('es_user');
    document.cookie = 'user_session=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC';
    window.location.href = '/';
  });
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function showEmpty(title, msg) {
  document.getElementById('loading-state').innerHTML = `<div class="empty-state"><h3>${title}</h3><p>${msg}</p></div>`;
}
function showError(msg) {
  document.getElementById('loading-state').innerHTML = `<div class="empty-state"><h3>Error 😞</h3><p>${escapeHtml(msg)}</p></div>`;
}
</script>
</body>
</html>
