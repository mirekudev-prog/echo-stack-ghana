<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B2A">
    <title>Community Chat - EchoStack</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <style>
        .chat-page { display: flex; flex-direction: column; height: calc(100vh - 56px); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: var(--main-bg); }
        .chat-msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: .88rem; line-height: 1.5; }
        .chat-msg.received { background: var(--main-card); border: 1px solid var(--main-border); align-self: flex-start; color: var(--main-text); border-bottom-left-radius: 4px; }
        .chat-msg.sent { background: linear-gradient(135deg,var(--gold),var(--gold2)); color: var(--ink); align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-msg-author { font-size: .7rem; font-weight: 700; color: var(--gold); margin-bottom: 2px; }
        .chat-msg.sent .chat-msg-author { color: rgba(13,27,42,.5); }
        .chat-msg-time { font-size: .65rem; color: var(--main-muted); margin-top: 3px; }
        .chat-msg.sent .chat-msg-time { color: rgba(13,27,42,.4); }
        .chat-input-area { padding: 12px 16px; border-top: 1px solid var(--main-border); display: flex; gap: 10px; background: var(--main-card); }
        .chat-input { flex: 1; padding: 10px 16px; background: var(--main-bg); border: 1px solid var(--main-border); border-radius: 24px; color: var(--main-text); font-family: inherit; font-size: .9rem; outline: none; }
        .chat-input:focus { border-color: var(--gold); }
        .chat-send { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,var(--gold),var(--gold2)); display: flex; align-items: center; justify-content: center; color: var(--ink); border: none; cursor: pointer; }
        .chat-send:disabled { opacity: .5; }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/" class="sidebar-logo">
                <img src="/echostack-logo.png" alt="EchoStack" onerror="this.style.display='none'">
                <span>EchoStack</span>
            </a>
        </div>
        <div class="sidebar-user" id="sidebarUser">
            <div class="sidebar-avatar" id="sidebarAvatar">U</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sidebarName">User</div>
                <div class="sidebar-user-badge badge-free" id="sidebarBadge">Free</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section">
                <a href="/dashboard" class="sidebar-link"><i class="fas fa-home"></i><span>Feed</span></a>
                <a href="/reels" class="sidebar-link"><i class="fas fa-film"></i><span>Reels</span></a>
                <a href="/explore" class="sidebar-link"><i class="fas fa-compass"></i><span>Explore</span></a>
                <a href="/archive" class="sidebar-link"><i class="fas fa-archive"></i><span>Archive</span></a>
                <a href="/app" class="sidebar-link"><i class="fas fa-map-marked-alt"></i><span>Map</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Social</div>
                <a href="/following" class="sidebar-link"><i class="fas fa-user-friends"></i><span>Following</span></a>
                <a href="/messages" class="sidebar-link"><i class="fas fa-envelope"></i><span>Messages</span></a>
                <a href="/notifications" class="sidebar-link"><i class="fas fa-bell"></i><span>Notifications</span></a>
                <a href="/chatbot" class="sidebar-link active"><i class="fas fa-comments"></i><span>Community Chat</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Create</div>
                <a href="/creator" class="sidebar-link"><i class="fas fa-plus-circle"></i><span>Create Post</span></a>
                <a href="/premium" class="sidebar-link"><i class="fas fa-crown"></i><span>Premium</span></a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Account</div>
                <a href="/user-profile" class="sidebar-link"><i class="fas fa-user"></i><span>My Profile</span></a>
                <a href="/settings" class="sidebar-link"><i class="fas fa-cog"></i><span>Settings</span></a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <button class="sidebar-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Sign Out</span></button>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="main-wrapper">
        <header class="topbar">
            <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="topbar-title">Community Chat</div>
            <div class="topbar-actions">
                <a href="/notifications" class="topbar-btn"><i class="fas fa-bell"></i></a>
            </div>
        </header>

        <main class="main-content" style="padding:0">
            <div class="chat-page">
                <div class="chat-messages" id="chatMessages">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMsg()">
                    <button class="chat-send" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="/js/common.js"></script>
<script>
let currentUser = null;

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
}

async function logout() {
    await fetch('/api/users/logout', { method: 'POST', credentials: 'include' });
    localStorage.removeItem('es_user');
    location.href = '/';
}

async function checkAuth() {
    try {
        const res = await fetch('/api/users/me', { credentials: 'include' });
        if (res.ok) {
            currentUser = await res.json();
            const initial = (currentUser.username || 'U').charAt(0).toUpperCase();
            if (document.getElementById('sidebarAvatar')) document.getElementById('sidebarAvatar').textContent = initial;
            if (document.getElementById('sidebarName')) document.getElementById('sidebarName').textContent = currentUser.full_name || currentUser.username;
            const badge = document.getElementById('sidebarBadge');
            if (badge) {
                if (currentUser.role === 'admin' || currentUser.role === 'superuser') { badge.className = 'sidebar-user-badge badge-admin'; badge.textContent = 'Admin'; }
                else if (currentUser.role === 'creator') { badge.className = 'sidebar-user-badge badge-creator'; badge.textContent = 'Creator'; }
                else if (currentUser.is_premium) { badge.className = 'sidebar-user-badge badge-premium'; badge.textContent = 'Premium'; }
            }
            loadChat();
        } else {
            location.href = '/user-login';
        }
    } catch(e) {
        location.href = '/user-login';
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function timeAgo(d) {
    if (!d) return '';
    const diff = (Date.now() - new Date(d)) / 1000;
    if (diff < 60) return Math.floor(diff) + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    return Math.floor(diff / 3600) + 'h ago';
}

async function loadChat() {
    const container = document.getElementById('chatMessages');
    try {
        const res = await fetch('/api/chat', { credentials: 'include' });
        if (!res.ok) throw new Error();
        const msgs = await res.json();

        if (!msgs.length) {
            container.innerHTML = '<div class="empty-state" style="margin:auto"><i class="fas fa-comments"></i><h3>No messages yet</h3><p>Start the conversation!</p></div>';
            return;
        }

        container.innerHTML = msgs.map(m => {
            const isMine = m.user_id === currentUser.id;
            return '<div class="chat-msg ' + (isMine ? 'sent' : 'received') + '">' +
                '<div class="chat-msg-author">' + escapeHtml(m.username || 'User') + '</div>' +
                escapeHtml(m.content || m.message || '') +
                '<div class="chat-msg-time">' + timeAgo(m.created_at) + '</div>' +
            '</div>';
        }).join('');
        container.scrollTop = container.scrollHeight;
    } catch(e) {
        container.innerHTML = '<div class="empty-state" style="margin:auto"><i class="fas fa-wifi"></i><h3>Connection error</h3></div>';
    }
}

async function sendMsg() {
    const input = document.getElementById('chatInput');
    const content = input.value.trim();
    if (!content) return;
    input.value = '';

    try {
        const formData = new FormData();
        formData.append('content', content);
        await fetch('/api/chat', { method: 'POST', body: formData, credentials: 'include' });
        loadChat();
    } catch(e) {}
}

checkAuth();
</script>
</body>
</html>
