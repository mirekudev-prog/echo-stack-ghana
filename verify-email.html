<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0D1B2A">
    <title>Verify Email - EchoStack</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <style>
        body { background:var(--cream); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
        .verify-card { background:var(--main-card); border-radius:var(--radius-xl); padding:48px; max-width:440px; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,0.08); }
        .verify-icon { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--gold2)); display:flex; align-items:center; justify-content:center; font-size:2rem; color:var(--ink); margin:0 auto 24px; }
        .verify-icon.success { background:linear-gradient(135deg,var(--success),#16a34a); color:white; }
        .verify-icon.error { background:linear-gradient(135deg,var(--danger),#dc2626); color:white; }
        .verify-card h1 { font-family:'Playfair Display',serif; font-size:1.8rem; margin-bottom:12px; }
        .verify-card p { color:var(--main-muted); margin-bottom:24px; line-height:1.6; }
        .spinner { width:40px; height:40px; border:3px solid var(--main-border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="verify-card">
    <div id="iconContainer"><div class="spinner"></div></div>
    <h1 id="title">Verifying your email...</h1>
    <p id="message">Please wait while we verify your email address.</p>
    <a href="/user-login" class="btn btn-primary" id="loginBtn" style="display:none;width:100%">
        <i class="fas fa-sign-in-alt"></i> Go to Login
    </a>
    <a href="/signup" class="btn btn-secondary" id="signupBtn" style="display:none;width:100%;margin-top:12px">
        <i class="fas fa-user-plus"></i> Create Account
    </a>
</div>

<script>
async function verifyEmail() {
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    
    if (!token) {
        showError('Invalid verification link');
        return;
    }
    
    try {
        const res = await fetch(`/api/users/verify-email?token=${token}`);
        const data = await res.json();
        
        if (res.ok) {
            showSuccess();
        } else {
            showError(data.detail || 'Verification failed');
        }
    } catch(e) {
        showError('Connection error. Please try again.');
    }
}

function showSuccess() {
    document.getElementById('iconContainer').innerHTML = '<div class="verify-icon success"><i class="fas fa-check"></i></div>';
    document.getElementById('title').textContent = 'Email Verified!';
    document.getElementById('message').textContent = 'Your email has been verified successfully. You can now log in to your account.';
    document.getElementById('loginBtn').style.display = 'flex';
}

function showError(msg) {
    document.getElementById('iconContainer').innerHTML = '<div class="verify-icon error"><i class="fas fa-times"></i></div>';
    document.getElementById('title').textContent = 'Verification Failed';
    document.getElementById('message').textContent = msg;
    document.getElementById('signupBtn').style.display = 'flex';
}

verifyEmail();
</script>
</body>
</html>
