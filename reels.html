<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0D1B2A">
    <title>Reels - EchoStack</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; overflow:hidden; background:var(--ink); }
        .reels-page { height:100vh; display:flex; align-items:center; justify-content:center; }
        .reel-wrapper { height:100vh; width:100%; max-width:500px; position:relative; scroll-snap-type:y mandatory; overflow-y:scroll; scrollbar-width:none; }
        .reel-wrapper::-webkit-scrollbar { display:none; }
        .reel-slide { height:100vh; scroll-snap-align:start; position:relative; background:#000; }
        .reel-slide video { width:100%; height:100%; object-fit:cover; }
        .reel-overlay {
            position:absolute; inset:0;
            background:linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 30%, transparent 50%);
            display:flex; flex-direction:column; justify-content:flex-end; padding:20px;
        }
        .reel-bottom { display:flex; align-items:flex-end; gap:16px; }
        .reel-info { flex:1; color:white; }
        .reel-author-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
        .reel-author-avatar {
            width:40px; height:40px; border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold2));
            display:flex; align-items:center; justify-content:center;
            color:var(--ink); font-weight:700;
        }
        .reel-author-name { font-weight:600; font-size:0.95rem; }
        .reel-follow-btn { padding:4px 14px; border-radius:var(--radius-full); border:1px solid white; color:white; font-size:0.75rem; font-weight:600; }
        .reel-title { font-size:0.9rem; margin-bottom:4px; }
        .reel-tags { font-size:0.8rem; color:rgba(255,255,255,0.7); }
        .reel-sidebar {
            display:flex; flex-direction:column; gap:20px; align-items:center;
        }
        .reel-action-btn {
            display:flex; flex-direction:column; align-items:center; gap:4px; color:white;
        }
        .reel-action-btn i { font-size:1.6rem; text-shadow:0 2px 8px rgba(0,0,0,0.5); }
        .reel-action-btn span { font-size:0.7rem; font-weight:600; }
        .reel-watermark {
            position:absolute; bottom:20px; right:20px;
            display:flex; align-items:center; gap:6px; color:rgba(255,255,255,0.5); font-size:0.7rem;
        }
        .reel-watermark img { width:24px; height:24px; border-radius:4px; }
        .reel-play-overlay {
            position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
            background:rgba(0,0,0,0.3); cursor:pointer;
        }
        .reel-play-overlay i { font-size:4rem; color:white; opacity:0.8; }
        @media(max-width:640px) {
            .reel-wrapper { max-width:100%; }
        }
    </style>
</head>
<body>
<div class="reels-page">
    <div class="reel-wrapper" id="reelsContainer">
        <!-- Reels will be loaded here -->
    </div>
</div>

<!-- Back button for mobile -->
<a href="/dashboard" style="position:fixed;top:16px;left:16px;z-index:100;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;color:white">
    <i class="fas fa-arrow-left"></i>
</a>

<script>
let reels = [];

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function loadReels() {
    try {
        const res = await fetch('/api/reels');
        reels = await res.json();
        renderReels();
    } catch(e) {
        // Fallback: load posts with video type
        try {
            const res = await fetch('/api/posts?type=reel');
            reels = await res.json();
            renderReels();
        } catch(e2) {
            document.getElementById('reelsContainer').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:white"><p>No reels available</p></div>';
        }
    }
}

function renderReels() {
    const container = document.getElementById('reelsContainer');
    if (!reels.length) {
        container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:white"><div style="text-align:center"><i class="fas fa-film" style="font-size:3rem;margin-bottom:16px;opacity:0.5"></i><p>No reels yet</p></div></div>';
        return;
    }
    
    container.innerHTML = reels.map((reel, i) => {
        const author = reel.author_username || 'Creator';
        const initial = author.charAt(0).toUpperCase();
        const mediaUrl = reel.media_url || '';
        
        return `
            <div class="reel-slide" data-index="${i}">
                <video src="${escapeHtml(mediaUrl)}" loop muted playsinline preload="metadata"></video>
                <div class="reel-play-overlay" onclick="togglePlay(this)">
                    <i class="fas fa-play"></i>
                </div>
                <div class="reel-overlay">
                    <div class="reel-bottom">
                        <div class="reel-info">
                            <div class="reel-author-row">
                                <div class="reel-author-avatar">${initial}</div>
                                <span class="reel-author-name">@${escapeHtml(author)}</span>
                                <button class="reel-follow-btn" onclick="event.stopPropagation();toggleFollow('${reel.author_id}')">Follow</button>
                            </div>
                            <div class="reel-title">${escapeHtml(reel.title)}</div>
                            ${reel.excerpt ? `<div class="reel-tags">${escapeHtml(reel.excerpt.substring(0,80))}</div>` : ''}
                        </div>
                        <div class="reel-sidebar">
                            <div class="reel-action-btn" onclick="toggleLikeReel(${reel.id}, this)">
                                <i class="fas fa-heart"></i>
                                <span>${reel.likes || 0}</span>
                            </div>
                            <div class="reel-action-btn">
                                <i class="fas fa-comment"></i>
                                <span>${reel.comments_count || 0}</span>
                            </div>
                            <div class="reel-action-btn" onclick="shareReel(${reel.id})">
                                <i class="fas fa-share"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="reel-watermark">
                    <img src="/echostack-logo.png" alt="" onerror="this.style.display='none'">
                    <span>EchoStack</span>
                </div>
            </div>
        `;
    }).join('');
    
    setupVideoObserver();
}

function togglePlay(overlay) {
    const video = overlay.previousElementSibling;
    if (video.paused) {
        video.play();
        overlay.style.display = 'none';
    } else {
        video.pause();
        overlay.style.display = 'flex';
    }
}

function setupVideoObserver() {
    const videos = document.querySelectorAll('.reel-slide video');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const video = entry.target;
            const overlay = video.nextElementSibling;
            if (entry.isIntersecting) {
                video.play().catch(() => {});
                if (overlay) overlay.style.display = 'none';
            } else {
                video.pause();
                video.currentTime = 0;
            }
        });
    }, { threshold: 0.7 });
    
    videos.forEach(v => observer.observe(v));
}

async function toggleLikeReel(id, btn) {
    try {
        const res = await fetch(`/api/posts/${id}/like`, { method: 'POST' });
        const data = await res.json();
        btn.querySelector('span').textContent = data.likes || 0;
        btn.querySelector('i').style.color = '#ef4444';
    } catch(e) {}
}

async function toggleFollow(userId) {
    try {
        await fetch(`/api/follow/${userId}`, { method: 'POST' });
    } catch(e) {}
}

function shareReel(id) {
    const url = `${location.origin}/post/${id}`;
    if (navigator.share) {
        navigator.share({ title: 'EchoStack Reel', url });
    } else {
        navigator.clipboard.writeText(url);
    }
}

loadReels();
</script>
</body>
</html>
