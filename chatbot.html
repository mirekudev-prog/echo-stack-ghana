<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B2A">
    <title>EchoBot - EchoStack</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <style>
        .chat-container{display:flex;flex-direction:column;height:calc(100vh - 130px)}
        .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
        .chat-msg{max-width:85%;padding:12px 16px;border-radius:16px;font-size:.9rem;line-height:1.5}
        .chat-msg.bot{background:var(--card);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
        .chat-msg.user{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);align-self:flex-end;border-bottom-right-radius:4px}
        .chat-msg-time{font-size:.7rem;color:var(--text-muted);margin-top:4px}
        .chat-msg.bot .chat-msg-time{color:var(--text-muted)}
        .chat-msg.user .chat-msg-time{color:rgba(13,27,42,0.6)}
        .chat-input-area{padding:12px 16px;border-top:1px solid var(--border);background:var(--ink);display:flex;gap:12px;align-items:flex-end}
        .chat-input{flex:1;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:24px;color:var(--text);font-family:inherit;font-size:.95rem;outline:none;resize:none;max-height:120px}
        .chat-input:focus{border-color:var(--gold)}
        .chat-input::placeholder{color:var(--text-muted)}
        .chat-send{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0}
        .chat-send:disabled{opacity:.5}
        .typing-indicator{display:flex;gap:4px;padding:12px 16px}
        .typing-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);animation:typing 1.4s infinite}
        .typing-dot:nth-child(2){animation-delay:.2s}
        .typing-dot:nth-child(3){animation-delay:.4s}
        @keyframes typing{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
        .suggestions{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 12px}
        .suggestion{padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:.8rem;color:var(--text-secondary);cursor:pointer;transition:.2s}
        .suggestion:hover{border-color:var(--gold);color:var(--gold)}
    </style>
</head>
<body>
<div class="app">
    <nav class="top-nav">
        <div class="top-nav-inner">
            <a href="/dashboard" class="nav-logo">
                <img src="/echostack-logo.png" alt="EchoStack" onerror="this.style.display='none'">
                <span>EchoStack</span>
            </a>
            <div class="nav-title">EchoBot</div>
        </div>
    </nav>
    
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="chat-msg bot">
                Akan! I'm EchoBot, your guide to Ghana's rich cultural heritage. Ask me about traditions, languages, history, or any of Ghana's 16 regions.
                <div class="chat-msg-time">Just now</div>
            </div>
        </div>
        <div class="suggestions" id="suggestions">
            <button class="suggestion" onclick="sendSuggestion('Tell me about Ashanti traditions')">Ashanti traditions</button>
            <button class="suggestion" onclick="sendSuggestion('What are Ghana\\'s major festivals?')">Ghana festivals</button>
            <button class="suggestion" onclick="sendSuggestion('Explain Kente weaving')">Kente weaving</button>
            <button class="suggestion" onclick="sendSuggestion('History of Ghana\\'s independence')">Independence history</button>
        </div>
        <div class="chat-input-area">
            <textarea class="chat-input" id="chatInput" placeholder="Ask about Ghana's heritage..." rows="1" onkeypress="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
            <button class="chat-send" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
let user = null;

async function loadUser() {
    try {
        const res = await fetch('/api/users/me', { credentials: 'include' });
        if (res.ok) user = await res.json();
    } catch(e) {}
}

function addMessage(text, isUser = false) {
    const container = document.getElementById('chatMessages');
    const msg = document.createElement('div');
    msg.className = `chat-msg ${isUser ? 'user' : 'bot'}`;
    msg.innerHTML = `${text.replace(/\n/g, '<br>')}<div class="chat-msg-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
}

function addTyping() {
    const container = document.getElementById('chatMessages');
    const typing = document.createElement('div');
    typing.className = 'chat-msg bot';
    typing.id = 'typingIndicator';
    typing.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    container.appendChild(typing);
    container.scrollTop = container.scrollHeight;
}

function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
}

function sendSuggestion(text) {
    document.getElementById('chatInput').value = text;
    sendMessage();
}

async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    
    input.value = '';
    input.style.height = 'auto';
    addMessage(text, true);
    addTyping();
    
    try {
        const res = await fetch('/api/chatbot', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        removeTyping();
        addMessage(data.response || data.reply || "I couldn't process that. Try asking about Ghana's regions, traditions, or history.");
    } catch(e) {
        removeTyping();
        addMessage("Sorry, I'm having trouble connecting. Please try again.");
    }
}

document.getElementById('chatInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

loadUser();
</script>
</body>
</html>
