<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - EchoStack</title>
    <style>
        body { background: #0D1B2A; color: #fff; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(200,150,46,0.3); border-radius: 24px; padding: 40px; max-width: 400px; width: 100%; }
        h1 { color: #C8962E; font-family: 'Playfair Display', serif; text-align: center; }
        .field { margin-bottom: 20px; }
        label { display: block; color: #94A3B8; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #C8962E, #E8B84B); border: none; border-radius: 50px; font-weight: bold; color: #0D1B2A; cursor: pointer; }
        .error { color: #DC2626; margin-top: 5px; }
        .success { color: #16A34A; text-align: center; }
    </style>
</head>
<body>
    <div class="card" id="card">
        <h1>EchoStack</h1>
        <div id="message"></div>
        <div id="form-container">
            <p style="color:#94A3B8;">Enter your new password below.</p>
            <div class="field">
                <label>New Password</label>
                <input type="password" id="password" placeholder="Minimum 6 characters">
            </div>
            <div class="field">
                <label>Confirm Password</label>
                <input type="password" id="confirm" placeholder="Re-enter password">
            </div>
            <button onclick="resetPassword()">Reset Password</button>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        if (!token) {
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('message').innerHTML = '❌ No reset token provided.';
        }

        async function resetPassword() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            if (!password || password.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }
            if (password !== confirm) {
                alert('Passwords do not match');
                return;
            }

            const fd = new FormData();
            fd.append('token', token);
            fd.append('password', password);

            const res = await fetch('/api/users/reset-password', { method: 'POST', body: fd });
            const data = await res.json();
            if (res.ok && data.success) {
                document.getElementById('form-container').style.display = 'none';
                document.getElementById('message').innerHTML = '✅ Password reset! You can now <a href="/user-login">log in</a>.';
            } else {
                alert(data.detail || 'Error resetting password');
            }
        }
    </script>
</body>
</html>
