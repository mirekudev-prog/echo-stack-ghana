<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B2A">
    <title>Reset Password - EchoStack</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/font-awesome.css">
    <link rel="stylesheet" href="/css/base.css">
    <style>
        body { background:var(--cream); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
        .reset-card { background:var(--main-card); border-radius:var(--radius-xl); padding:40px; max-width:440px; width:100%; box-shadow:0 8px 40px rgba(0,0,0,0.08); }
        .reset-header { text-align:center; margin-bottom:32px; }
        .reset-header h1 { font-family:'Playfair Display',serif; font-size:1.8rem; margin-bottom:8px; }
        .reset-header p { color:var(--main-muted); }
        .success-state { text-align:center; }
        .success-icon { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,var(--success),#16a34a); display:flex; align-items:center; justify-content:center; font-size:2rem; color:white; margin:0 auto 24px; }
        .input-group { position:relative; margin-bottom:20px; }
        .input-group label { display:block; font-size:.85rem; font-weight:600; margin-bottom:8px; color:var(--main-text); }
        .input-group .input { width:100%; padding:12px 16px; background:var(--main-card); border:1.5px solid var(--main-border); border-radius:12px; outline:none; transition:border-color .2s; -webkit-appearance:none; appearance:none; }
        .input-group .input:focus { border-color:var(--gold); }
         .pw-toggle { position:absolute; right:16px; top:38px; color:var(--main-muted); cursor:pointer; }
    </style>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
</head>
<body>
<div class="reset-card">
    <div id="formState">
        <div class="reset-header">
            <h1>Reset Password</h1>
            <p>Enter your new password below</p>
        </div>
        <div class="input-group">
            <label>New Password</label>
            <input type="password" class="input" id="newPassword" placeholder="Enter new password" minlength="6">
            <i class="fas fa-eye pw-toggle" id="togglePw1" onclick="togglePassword('newPassword', 'togglePw1')"></i>
        </div>
        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" class="input" id="confirmPassword" placeholder="Confirm new password" onkeypress="if(event.key==='Enter')resetPassword()">
            <i class="fas fa-eye pw-toggle" id="togglePw2" onclick="togglePassword('confirmPassword', 'togglePw2')"></i>
        </div>
        <button class="btn btn-primary" style="width:100%" id="resetBtn" onclick="resetPassword()">
            <i class="fas fa-lock"></i> Reset Password
        </button>
    </div>
    
    <div id="successState" style="display:none">
        <div class="success-state">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h1 style="font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:8px">Password Reset!</h1>
            <p style="color:var(--main-muted);margin-bottom:24px">Your password has been reset successfully. You can now log in with your new password.</p>
            <a href="/user-login" class="btn btn-primary" style="width:100%">
                <i class="fas fa-sign-in-alt"></i> Go to Login
            </a>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
function togglePassword(id, iconId) {
    const input = document.getElementById(id);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 2500);
}

async function resetPassword() {
    const password = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    const token = new URLSearchParams(location.search).get('token');
    
    if (!token) {
        showToast('Invalid reset link', 'error');
        return;
    }
    if (!password || password.length < 6) {
        showToast('Password must be at least 6 characters', 'error');
        return;
    }
    if (password !== confirm) {
        showToast('Passwords do not match', 'error');
        return;
    }
    
    const btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px"></div>';
    
    try {
        const formData = new FormData();
        formData.append('token', token);
        formData.append('password', password);
        const res = await fetch('/api/users/reset-password', {
            method: 'POST',
            body: formData
        });
        
        if (res.ok) {
            document.getElementById('formState').style.display = 'none';
            document.getElementById('successState').style.display = 'block';
        } else {
            const data = await res.json();
            showToast(data.detail || 'Reset failed', 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-lock"></i> Reset Password';
        }
    } catch(e) {
        showToast('Connection error', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-lock"></i> Reset Password';
    }
}

// Service Worker Registration
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
}
</script>
</body>
</html>
