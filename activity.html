<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D1B2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="UTF-8">
<title>Your Activity — EchoStack</title>
<link rel="icon" type="image/png" href="/echostack-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0D1B2A;
  --gold:#C8962E;
  --gold2:#E8B84B;
  --border:#E2E8F0;
  --muted:#94A3B8;
  --blue:#0077b6;
  --cream:#F8FAFC;
  --sidebar-w:260px;
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── TOP BAR (mobile only) ── */
.topbar{
  display:none;
  position:fixed;
  top:0; left:0; right:0;
  height:60px;
  background:var(--ink);
  border-bottom:2px solid var(--gold);
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  z-index:300;
}
.topbar-logo{
  font-family:'Playfair Display',serif;
  color:#fff;
  font-size:1.1rem;
  font-weight:700;
}
.menu-btn{
  background:none;
  border:none;
  color:rgba(255,255,255,.8);
  font-size:1.5rem;
  cursor:pointer;
  padding:8px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.menu-btn:hover{color:#fff;}

/* ── SIDEBAR (dark) ── */
.sidebar{
  position:fixed;
  left:0; top:0;
  width:var(--sidebar-w);
  height:100vh;
  background:var(--ink);
  display:flex;
  flex-direction:column;
  z-index:200;
  padding:20px 0;
  overflow-y:auto;
  transition:transform .3s ease;
}
.sidebar-logo{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;
  font-weight:700;
  color:#fff;
  padding:0 20px 20px;
  border-bottom:1px solid rgba(255,255,255,.1);
}
.sidebar-nav{
  flex:1;
  padding:12px 0;
}
.sb-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 20px;
  color:rgba(255,255,255,.7);
  text-decoration:none;
  font-size:.9rem;
  font-weight:500;
  transition:all .15s;
}
.sb-item:hover,
.sb-item.on{
  background:rgba(200,150,46,.18);
  color:#fff;
}
.sb-item .icon{font-size:1.1rem; width:24px; text-align:center;}
.sb-section{
  font-size:.7rem;
  font-weight:700;
  color:rgba(255,255,255,.25);
  text-transform:uppercase;
  letter-spacing:.1em;
  padding:16px 20px 6px;
}
.sidebar-footer{
  padding:20px;
  border-top:1px solid rgba(255,255,255,.1);
}
.logout-btn{
  width:100%;
  padding:10px;
  background:rgba(239,68,68,.15);
  border:1px solid rgba(239,68,68,.3);
  color:#fca5a5;
  border-radius:8px;
  font-size:.85rem;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:all .2s;
}
.logout-btn:hover{
  background:rgba(239,68,68,.3);
  color:#fff;
}

/* ── SIDEBAR OVERLAY (mobile) ── */
.sidebar-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  z-index:199;
  backdrop-filter:blur(2px);
}
.sidebar-overlay.show{display:block;}

/* ── MAIN CONTENT ── */
.main{
  margin-left:var(--sidebar-w);
  padding:40px 24px;
  max-width:900px;
  min-height:100vh;
  transition:margin .3s;
}

/* ── PAGE HEADER ── */
.page-title{
  font-family:'Playfair Display',serif;
  font-size:2rem;
  font-weight:900;
  color:var(--ink);
  margin-bottom:6px;
}
.subtitle{
  font-size:.95rem;
  color:var(--muted);
  margin-bottom:32px;
}

/* ── CARDS (enhanced for media) ── */
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:20px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  transition:box-shadow .2s;
}
.card:hover{
  box-shadow:0 4px 16px rgba(13,27,42,.08);
}
.post-header{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 16px 0;
}
.post-author-av{
  width:38px;
  height:38px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:.9rem;
  color:var(--ink);
  flex-shrink:0;
}
.post-info{flex:1;}
.post-author-name{
  font-size:.84rem;
  font-weight:600;
  color:var(--ink);
}
.post-time{
  font-size:.72rem;
  color:var(--muted);
}
.post-type-badge{
  padding:2px 9px;
  border-radius:12px;
  font-size:.64rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.03em;
}
.type-article{background:#EFF6FF;color:#2563EB;}
.type-story{background:#F0FDF4;color:#16A34A;}
.type-video{background:#FDF2F8;color:#9333EA;}
.type-reel{background:#FCE7F3;color:#B21E6C;}
.type-audio{background:#FFF7ED;color:#D97706;}
.type-premium{background:rgba(201,147,58,.15);color:#c9933a;}

.post-title-link{
  display:block;
  padding:10px 16px 2px;
  text-decoration:none;
}
.post-title-link h2{
  font-family:'Playfair Display',serif;
  font-size:1.1rem;
  color:var(--ink);
  line-height:1.4;
  transition:color .15s;
}
.post-title-link:hover h2{color:var(--blue);}
.post-excerpt{
  padding:0 16px 10px;
  font-size:.83rem;
  color:#64748B;
  line-height:1.6;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* Media in card */
.card-media{
  width:100%;
  background:#000;
  position:relative;
  overflow:hidden;
}
.card-media img{
  width:100%;
  max-height:300px;
  object-fit:cover;
  display:block;
}
.card-media video{
  width:100%;
  max-height:300px;
  display:block;
  background:#000;
}
.card-media.reel video{
  max-height:480px;
  aspect-ratio:9/16;
  object-fit:cover;
  margin:0 auto;
}
.play-overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,.55);
  border-radius:50%;
  width:52px;
  height:52px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.4rem;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
  cursor:pointer;
  z-index:10;
}
.reel-watermark{
  position:absolute;
  bottom:8px;
  right:8px;
  background:rgba(0,0,0,.65);
  border-radius:20px;
  padding:4px 10px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:15;
  pointer-events:none;
  backdrop-filter:blur(2px);
  border:1px solid rgba(255,255,255,.15);
}
.reel-watermark img{
  height:18px;
  width:auto;
  display:block;
}
.reel-watermark span{
  color:white;
  font-size:0.7rem;
  font-weight:600;
  margin-left:4px;
  letter-spacing:0.5px;
}
.card-audio{
  padding:12px 16px;
  background:linear-gradient(135deg,#0D1B2A,#1a2a3a);
}
.card-audio audio{
  width:100%;
  border-radius:8px;
}
.premium-banner{
  background:linear-gradient(135deg,var(--gold),#a97825);
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:.78rem;
  font-weight:600;
  color:#fff;
}

.post-actions{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:6px;
  padding:10px 16px;
  border-top:1px solid var(--border);
}
.act-btn{
  display:flex;
  align-items:center;
  gap:5px;
  padding:7px 12px;
  border-radius:8px;
  font-size:.79rem;
  font-weight:500;
  cursor:pointer;
  border:none;
  background:none;
  color:var(--muted);
  transition:all .15s;
  font-family:'DM Sans',sans-serif;
  white-space:nowrap;
}
.act-btn:hover{background:#F8FAFC;color:var(--ink);}
.act-read{
  margin-left:auto;
  background:var(--gold);
  color:#fff;
  border-radius:8px;
  padding:7px 16px;
  font-size:.78rem;
  font-weight:700;
  cursor:pointer;
  border:none;
  font-family:'DM Sans',sans-serif;
  text-decoration:none;
  white-space:nowrap;
  flex-shrink:0;
}
.act-read:hover{background:#a97825;}

@media (max-width:480px){
  .post-actions{gap:4px;padding:8px 10px;}
  .act-btn{padding:6px 8px;font-size:.7rem;}
  .act-read{padding:6px 10px;font-size:.7rem;margin-left:0;}
}

.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
  background:#fff;
  border-radius:14px;
  border:1px solid var(--border);
}
.loading{
  text-align:center;
  padding:40px;
  color:var(--muted);
}
.spinner{
  display:inline-block;
  width:24px;
  height:24px;
  border:3px solid #e2e8f0;
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MOBILE STYLES ── */
@media(max-width:768px){
  .topbar{display:flex;}
  .sidebar{
    transform:translateX(-100%);
    width:260px;
  }
  .sidebar.open{transform:translateX(0);}
  .main{
    margin-left:0;
    padding:80px 16px 24px;
  }
  .page-title{font-size:1.8rem;}
}
</style>
</head>
<body>

<!-- MOBILE TOP BAR -->
<div class="topbar">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <span class="topbar-logo">EchoStack</span>
  <div style="width:24px;"></div>
</div>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">EchoStack</div>
  <nav class="sidebar-nav">
    <div class="sb-section">Explore</div>
    <a href="/app" class="sb-item"><span class="icon">🏠</span> Home</a>
    <a href="/explore" class="sb-item"><span class="icon">🔍</span> Explore</a>
    <a href="/archive" class="sb-item"><span class="icon">🗄️</span> Archive</a>

    <div class="sb-section">Community</div>
    <a href="/chat" class="sb-item"><span class="icon">💬</span> Community Chat</a>
    <a href="/subscriptions" class="sb-item"><span class="icon">🔔</span> Subscriptions</a>
    <a href="/following" class="sb-item"><span class="icon">👥</span> Following</a>
    <a href="/activity" class="sb-item on"><span class="icon">📈</span> Your Activity</a>

    <div class="sb-section">Account</div>
    <a href="/user-profile" class="sb-item"><span class="icon">👤</span> My Profile</a>
    <a href="/user-settings" class="sb-item"><span class="icon">⚙️</span> Settings</a>
  </nav>
  <div class="sidebar-footer">
    <button onclick="logout()" class="logout-btn">
      <span>🚪</span> Sign Out
    </button>
  </div>
</aside>

<!-- MAIN CONTENT -->
<main class="main">
  <h1 class="page-title">Your Activity</h1>
  <p class="subtitle">Latest posts from creators you're following.</p>

  <div id="activity-container">
    <div class="loading">
      <div class="spinner"></div>
      <p style="margin-top:10px;">Loading activity...</p>
    </div>
  </div>
</main>

<script>
// Sidebar functions
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}
// Auto‑close sidebar on mobile after clicking a nav link
document.querySelectorAll('.sidebar-nav a').forEach(link => {
  link.addEventListener('click', (e) => {
    if (window.innerWidth <= 768) {
      setTimeout(closeSidebar, 100);
    }
  });
});

// Utility: Escape HTML to prevent XSS
function esc(text) {
  if (!text) return '';
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// Build media preview HTML based on post type
function buildMediaHtml(post) {
  const ct = post.content_type || 'article';
  if (ct === 'reel') {
    const videoUrl = post.video_url || '';
    if (videoUrl) {
      return `<div class="card-media reel" style="position:relative">
        <video preload="none" style="width:100%;display:block;background:#000;" poster="${post.cover_image||''}">
          <source src="${videoUrl}" type="video/mp4">
        </video>
        <div class="play-overlay" onclick="location.href='/post/${post.id}'">▶️</div>
        <div class="reel-watermark">
          <img src="/echostack-logo.png" onerror="this.style.display='none'">
          <span>EchoStack</span>
        </div>
      </div>`;
    }
  } else if (ct === 'video') {
    const videoUrl = post.video_url || '';
    if (videoUrl) {
      return `<div class="card-media" style="position:relative">
        <video preload="none" style="width:100%;max-height:300px;display:block;background:#000;" poster="${post.cover_image||''}">
          <source src="${videoUrl}" type="video/mp4">
        </video>
        <div class="play-overlay" onclick="location.href='/post/${post.id}'">▶️</div>
      </div>`;
    } else if (post.cover_image) {
      return `<div class="card-media"><img src="${post.cover_image}" alt="" onclick="location.href='/post/${post.id}'" style="cursor:pointer"></div>`;
    }
  } else if (ct === 'audio') {
    const audioUrl = post.audio_url || '';
    if (audioUrl) {
      return `<div class="card-audio">
        <div style="color:rgba(255,255,255,.7);font-size:.72rem;margin-bottom:8px;">🎵 Audio Recording</div>
        <audio controls style="width:100%;border-radius:8px">
          <source src="${audioUrl}" type="audio/mpeg">
        </audio>
      </div>`;
    }
  } else if (post.cover_image) {
    return `<div class="card-media"><img src="${post.cover_image}" alt="" onclick="location.href='/post/${post.id}'" style="cursor:pointer"></div>`;
  }
  return '';
}

// Check login
document.addEventListener('DOMContentLoaded', async () => {
  const user = localStorage.getItem('es_user');
  if (!user) {
    window.location.href = '/user-login';
    return;
  }

  try {
    const res = await fetch('/api/activity');
    if (!res.ok) throw new Error('Failed to load');
    const posts = await res.json();

    const container = document.getElementById('activity-container');
    if (!posts || posts.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div style="font-size:2.5rem;color:#ccc;">🔍</div>
          <h3>No activity yet</h3>
          <p>Follow some creators to see their posts here!</p>
          <a href="/explore" class="btn" style="margin-top:12px;">Find Creators</a>
        </div>`;
      return;
    }

    let html = '';
    posts.forEach(post => {
      const date = new Date(post.created_at).toLocaleDateString('en-GB', {
        day: 'numeric',
        month: 'short'
      });
      const typeClass = 'type-' + (post.content_type || 'article');
      const typeLabel = post.content_type || 'article';
      const authorInitial = (post.author_username || 'U')[0].toUpperCase();
      const mediaHtml = buildMediaHtml(post);
      const premiumBadge = post.is_premium ? `<div class="premium-banner">⭐ Premium Content — Subscribe to read</div>` : '';

      html += `
        <div class="card">
          <div class="post-header">
            <div class="post-author-av">${authorInitial}</div>
            <div class="post-info">
              <div class="post-author-name">@${esc(post.author_username)}</div>
              <div class="post-time">${date}</div>
            </div>
            <span class="post-type-badge ${typeClass}">${typeLabel}</span>
          </div>

          <a href="/post/${post.id}" class="post-title-link">
            <h2>${esc(post.title)}</h2>
          </a>
          ${post.excerpt ? `<div class="post-excerpt">${esc(post.excerpt)}</div>` : ''}

          ${mediaHtml}
          ${premiumBadge}

          <div class="post-actions">
            <button class="act-btn" onclick="quickLike(${post.id}, this)">❤️ <span class="lc">${post.likes||0}</span></button>
            <a href="/post/${post.id}" class="act-read">Read →</a>
          </div>
        </div>
      `;
    });

    container.innerHTML = html;

  } catch (err) {
    console.error('Activity load error:', err);
    document.getElementById('activity-container').innerHTML = `
      <div class="empty-state">
        <div style="font-size:2.5rem;color:#f87171;">⚠️</div>
        <h3>Something went wrong</h3>
        <p>Please try again later.</p>
        <button onclick="location.reload()" class="btn">Retry</button>
      </div>`;
  }
});

// Quick like function (optional)
async function quickLike(postId, btn) {
  try {
    const r = await fetch(`/api/posts/${postId}/like`, { method: 'POST' });
    const d = await r.json();
    const countEl = btn.querySelector('.lc');
    if (countEl) countEl.textContent = d.likes ?? 0;
    btn.classList.toggle('liked', !!d.liked);
  } catch(e) {}
}

function logout() {
  localStorage.removeItem('es_user');
  document.cookie = 'user_session=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC';
  window.location.href = '/';
}
</script>
</body>
</html>
