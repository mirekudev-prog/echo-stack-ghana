<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D1B2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Activity — EchoStack</title>
<link rel="icon" type="image/png" href="/echostack-logo.png">
<style>
:root {
  --ink: #1a1e29;
  --blue: #0077b6;
  --gold: #C8962E;
  --cream: #f5f5f5;
  --border: #e0e0e0;
  --sidebar-w: 240px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  background: var(--ink);
  color: white;
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  overflow-y: auto;
  padding: 20px 16px;
  z-index: 100;
}

.sidebar-header {
  margin-bottom: 24px;
}
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: white;
  font-weight: 700;
  font-size: 1.3rem;
}

.sb-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  color: rgba(255,255,255,0.6);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 4px;
  text-decoration: none;
}

.sb-item:hover,
.sb-item.on {
  background: rgba(200, 150, 46, 0.18);
  color: white;
  font-weight: 600;
}

.sb-item .icon {
  width: 24px;
  height: 24px;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
}

.sb-section {
  font-size: 0.65rem;
  font-weight: 700;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 16px 0 6px;
}

/* Main Content */
.main {
  margin-left: var(--sidebar-w);
  padding: 32px 24px;
  max-width: 800px;
  flex: 1;
}

.page-title {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 12px;
  color: var(--ink);
}

.subtitle {
  color: #666;
  font-size: 0.9rem;
  margin-bottom: 24px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.post-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  font-size: 0.8rem;
  color: #666;
}

.post-author-av {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), #E8B84B);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--ink);
  flex-shrink: 0;
}

.post-title {
  font-size: 1.2rem;
  font-weight: 600;
  margin: 8px 0;
  color: var(--ink);
}

.post-excerpt {
  color: #444;
  line-height: 1.6;
  margin-bottom: 16px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #888;
}
.empty-state .icon {
  font-size: 3rem;
  margin-bottom: 16px;
  color: #ccc;
}
.loading {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid #ddd;
  border-top: 2px solid var(--gold);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <a href="/app" class="sidebar-logo">EchoStack</a>
  </div>

  <div class="sb-section">Explore</div>
  <a href="/app" class="sb-item"><span class="icon">🏠</span> Home</a>
  <a href="/explore" class="sb-item"><span class="icon">🔍</span> Explore</a>
  <a href="/archive" class="sb-item"><span class="icon">🗄️</span> Archive</a>

  <div class="sb-section">Community</div>
  <a href="/chat" class="sb-item"><span class="icon">💬</span> Community Chat</a>
  <a href="/subscriptions" class="sb-item"><span class="icon">🔔</span> Subscriptions</a>
  <a href="/following" class="sb-item"><span class="icon">👥</span> Following</a>
  <a href="/activity" class="sb-item on"><span class="icon">📈</span> Your Activity</a>

  <div class="sb-section">Account</div>
  <a href="/user-profile" class="sb-item"><span class="icon">👤</span> My Profile</a>
  <a href="/user-settings" class="sb-item"><span class="icon">⚙️</span> Settings</a>
  <button onclick="logout()" class="sb-item" style="margin-top:20px;color:#f87171;">
    <span class="icon">🚪</span> Sign Out
  </button>
</div>

<div class="main">
  <h1 classpage-title">Your Activity</h1>
  <p class="subtitle">Latest posts from creators you're following.</p>

  <div id="activity-container">
    <div class="empty-state">
      <div class="loading"></div>
      <h3>Loading activity...</h3>
    </div>
  </div>
</div>

<script>
// Utility: Escape HTML to prevent XSS
function esc(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// Check login
document.addEventListener('DOMContentLoaded', async () => {
  const user = localStorage.getItem('es_user');
  if (!user) {
    window.location.href = '/user-login';
    return;
  }

  try {
    const res = await fetch('/api/activity');
    if (!res.ok) throw new Error('Failed to load');
    const posts = await res.json();

    const container = document.getElementById('activity-container');
    if (!posts || posts.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div style="font-size:2.5rem;color:#ccc;">🔍</div>
          <h3>No activity yet</h3>
          <p>Follow some creators to see their posts here!</p>
          <a href="/explore" class="btn" style="margin-top:12px;">Find Creators</a>
        </div>`;
      return;
    }

    let html = '';
    posts.forEach(post => {
      const date = new Date(post.created_at).toLocaleDateString('en-GB', {
        day: 'numeric',
        month: 'short'
      });
      html += `
        <div class="card">
          <div class="post-meta">
            <div class="post-author-av">${esc(post.author_username?.charAt(0) || '?')}</div>
            <div>
              <strong>@${esc(post.author_username)}</strong> • ${date}
            </div>
          </div>
          <h3 class="post-title">${esc(post.title)}</h3>
          <p class="post-excerpt">${esc(post.excerpt || post.content?.substring(0, 120) || 'No description')}</p>
          <a href="/post/${post.id}" class="btn">Read Post →</a>
        </div>
      `;
    });

    container.innerHTML = html;

  } catch (err) {
    console.error('Activity load error:', err);
    document.getElementById('activity-container').innerHTML = `
      <div class="empty-state">
        <div style="font-size:2.5rem;color:#f87171;">⚠️</div>
        <h3>Something went wrong</h3>
        <p>Please try again later.</p>
        <button onclick="location.reload()" class="btn">Retry</button>
      </div>`;
  }
});

function logout() {
  localStorage.removeItem('es_user');
  document.cookie = 'user_session=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC';
  window.location.href = '/';
}
</script>
</body>
</html>
