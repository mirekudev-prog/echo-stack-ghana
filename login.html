<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/css/base.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B2A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="robots" content="noindex, nofollow">
    <title>EchoStack — Admin Access</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/font-awesome.css">
    <style>
        :root {
            --ink: #0D1B2A;
            --ink2: #0f1e2d;
            --ink3: #162a3e;
            --gold: #C8962E;
            --gold2: #E8B84B;
            --surface: #142030;
            --card: #1a2d40;
            --border: rgba(255,255,255,.08);
            --border-light: rgba(255,255,255,.15);
            --muted: #64748B;
            --text: #e2e8f0;
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* ── Background Effects ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .bg-layer::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200,150,46,0.08) 0%, transparent 65%);
        }
        .bg-layer::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,119,182,0.06) 0%, transparent 65%);
        }
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* ── Ghana Flag Bar ── */
        .flag-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            display: flex;
            z-index: 10;
        }
        .flag-bar span { flex: 1; }
        .flag-bar span:nth-child(1) { background: #CE1126; }
        .flag-bar span:nth-child(2) { background: #FCD116; }
        .flag-bar span:nth-child(3) { background: #006B3F; }

        /* ── Login Card ── */
        .login-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: 40px 36px;
            box-shadow:
                0 32px 80px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.04) inset;
            animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Header ── */
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            font-size: 1.8rem;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(200,150,46,0.3);
        }
        .login-logo img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 8px;
        }
        .login-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: white;
            margin-bottom: 6px;
        }
        .login-header p {
            font-size: 0.82rem;
            color: var(--muted);
            letter-spacing: 0.02em;
        }
        .access-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 5px 14px;
            background: rgba(200,150,46,0.1);
            border: 1px solid rgba(200,150,46,0.2);
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--gold2);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 28px 0;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.9rem;
            pointer-events: none;
            transition: color 0.2s;
        }
        .form-input {
            width: 100%;
            padding: 12px 44px 12px 40px;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius);
            color: white;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: all 0.2s;
            letter-spacing: 0.04em;
        }
        .form-input::placeholder { color: rgba(255,255,255,0.2); }
        .form-input:focus {
            border-color: var(--gold);
            background: rgba(200,150,46,0.05);
            box-shadow: 0 0 0 3px rgba(200,150,46,0.1);
        }
        .form-input:focus + i,
        .input-wrap:focus-within i { color: var(--gold); }

        /* toggle password visibility */
        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 4px;
            transition: color 0.2s;
        }
        .toggle-pw:hover { color: var(--gold2); }

        /* ── Submit Button ── */
        .btn-submit {
            width: 100%;
            padding: 13px 24px;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: var(--ink);
            border: none;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(200,150,46,0.3);
            margin-top: 8px;
        }
        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(200,150,46,0.45);
            opacity: 0.95;
        }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-submit .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(13,27,42,0.3);
            border-top-color: var(--ink);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Error Message ── */
        .error-box {
            display: none;
            margin-top: 14px;
            padding: 12px 16px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: var(--radius);
            color: #fca5a5;
            font-size: 0.82rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .error-box.hidden { display: none; }
        .error-box.show { display: flex; }

        /* ── Footer Note ── */
        .login-footer {
            margin-top: 28px;
            text-align: center;
        }
        .login-footer p {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 0.04em;
        }
        .login-footer a {
            color: rgba(200,150,46,0.6);
            text-decoration: none;
            transition: color 0.2s;
        }
        .login-footer a:hover { color: var(--gold2); }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .login-card { padding: 28px 20px; border-radius: var(--radius-lg); }
        }
    </style>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
</head>
<body>

    <!-- Ghana Flag Bar -->
    <div class="flag-bar"><span></span><span></span><span></span></div>

    <!-- Background -->
    <div class="bg-layer"></div>
    <div class="bg-pattern"></div>

    <!-- Login Card -->
    <div class="login-wrap">
        <div class="login-card">

            <!-- Header -->
            <div class="login-header">
                <div class="login-logo">
                    <img src="/echostack-logo.png" alt="EchoStack"
                         onerror="this.parentElement.innerHTML='🇬🇭'">
                </div>
                <h1>EchoStack</h1>
                <p>Ghana's Living Heritage Platform</p>
                <div class="access-badge">
                    <i class="fas fa-shield-halved"></i>
                    Administrative Access
                </div>
            </div>

            <div class="divider"></div>

            <!-- Form -->
            <form id="admin-login-form" autocomplete="off">
                <div class="form-group">
                    <label class="form-label" for="answer">Admin Passphrase</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input
                            type="password"
                            id="answer"
                            class="form-input"
                            placeholder="Enter your access credentials"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="toggle-pw" id="togglePw" title="Toggle visibility">
                            <i class="fas fa-eye" id="togglePwIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">
                    <i class="fas fa-arrow-right-to-bracket"></i>
                    Access Dashboard
                </button>

                <div class="error-box hidden" id="error-message">
                    <i class="fas fa-circle-exclamation"></i>
                    <span id="error-text">Invalid credentials. Please try again.</span>
                </div>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p>Restricted area &nbsp;·&nbsp; Authorized access only</p>
                <p style="margin-top:8px"><a href="/">← Back to EchoStack</a></p>
            </div>

        </div>
    </div>

<script>
    // Toggle password visibility
    document.getElementById('togglePw').addEventListener('click', function() {
        var input = document.getElementById('answer');
        var icon = document.getElementById('togglePwIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fas fa-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'fas fa-eye';
        }
    });

    // Login form submission
    document.getElementById('admin-login-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        var answer    = document.getElementById('answer').value;
        var errorBox  = document.getElementById('error-message');
        var errorText = document.getElementById('error-text');
        var submitBtn = document.getElementById('submit-btn');

        // Reset error
        errorBox.className = 'error-box hidden';

        // Loading state
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<div class="spinner"></div> Verifying…';

        try {
            var formData = new URLSearchParams();
            formData.append('answer', answer);

            var response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                credentials: 'include',
                body: formData
            });

            var data = await response.json();

            if (response.ok && data.success) {
                // Success — animate button then redirect
                submitBtn.innerHTML = '<i class="fas fa-check"></i> Access Granted';
                submitBtn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
                submitBtn.style.boxShadow = '0 4px 16px rgba(34,197,94,0.35)';
                setTimeout(function() {
                    window.location.href = '/admin';
                }, 600);
            } else {
                throw new Error('Access denied');
            }
        } catch (err) {
            errorText.textContent = 'Invalid credentials. Please try again.';
            errorBox.className = 'error-box show';

            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Access Dashboard';

            document.getElementById('answer').value = '';
            document.getElementById('answer').focus();

            // Shake animation
            var card = document.querySelector('.login-card');
            card.style.animation = 'none';
            card.style.transform = 'translateX(-6px)';
            setTimeout(function() {
                card.style.transition = 'transform 0.3s cubic-bezier(0.36,0.07,0.19,0.97)';
                card.style.transform = 'translateX(0)';
            }, 10);
        }
    });
</script>

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
}
</script>
</body>
</html>
