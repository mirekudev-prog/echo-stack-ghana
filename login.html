<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoStack Admin Login</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="/echostack-logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Georgia:wght@400;700&display=swap');
        
        :root {
            --brand-dark: #1a1e29;
            --brand-blue: #0077b6;
        }
        
        body {
            font-family: 'Georgia', serif !important;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(26, 30, 41, 0.1);
            max-width: 500px;
            width: 100%;
            margin: 2rem;
            text-align: center;
        }
        
        /* LOGO STYLING FOR REAL IMAGE */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            padding: 1rem;
        }
        
        .logo-icon {
            width: 120px;
            height: auto;
            margin-bottom: 1rem;
            object-fit: contain;
        }
        
        .logo-text {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--brand-dark) !important;
        }
        
        .subtitle {
            color: #666;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        
        .security-question {
            background: rgba(0, 119, 182, 0.05);
            border-left: 4px solid var(--brand-blue);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        input {
            border-color: #d0d0d0 !important;
            color: var(--brand-dark) !important;
            background: white !important;
        }
        
        input:focus {
            outline: none !important;
            border-color: var(--brand-blue) !important;
            box-shadow: 0 0 0 3px rgba(0, 119, 182, 0.1) !important;
        }
        
        button[type="submit"] {
            background-color: var(--brand-blue) !important;
            color: white !important;
        }
    </style>
</head>

<body class="antialiased">

        <!-- REAL LOGO IMAGE SECTION -->
        <div class="logo-container">
            <img src="/echostack-logo.png" alt="EchoStack Logo" class="logo-icon mb-2">
            <h1 class="logo-text">EchoStack</h1>
            <p class="subtitle">Admin Management Portal</p>
        </div>
