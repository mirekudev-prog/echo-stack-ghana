<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoStack Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1e29 0%, #2d3748 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }
        .btn-primary {
            background: #1a1e29 !important;
            color: white !important;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: #0077b6 !important;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2" style="color: #1a1e29;">🇬🇭 EchoStack Admin</h1>
            <p class="text-gray-500 text-sm">Superuser access only</p>
        </div>
        
        <form id="admin-login-form" class="space-y-6">
            <div>
                <input 
                    type="password" 
                    id="answer" 
                    required 
                    class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-[#0077b6] transition"
                    placeholder="Enter the secret answer"
                    autocomplete="off"
                >
                <p class="text-xs text-gray-400 mt-1">Hint: It's two words, all caps</p>
            </div>
            
            <button 
                type="submit" 
                id="submit-btn"
                class="w-full btn-primary py-3 rounded-lg font-semibold text-lg"
            >
                Enter Admin Portal →
            </button>
            
            <p id="error-message" class="text-red-600 text-sm text-center hidden"></p>
        </form>
        
        <p class="text-center text-xs text-gray-400 mt-6">
            Protected area • Authorized personnel only
        </p>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const answer = document.getElementById('answer').value;
            const errorMsg = document.getElementById('error-message');
            const submitBtn = document.getElementById('submit-btn');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Verifying...';
            errorMsg.classList.add('hidden');
            
            try {
                // ✅ CORRECT ENDPOINT: /api/auth/login (NOT /api/users/login)
                const formData = new URLSearchParams();
                formData.append('answer', answer);
                
                console.log('Sending to /api/auth/login with answer:', answer);
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });
                
                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok && data.success) {
                    // ✅ Success - redirect to admin dashboard
                    console.log('Login successful! Redirecting to /admin');
                    window.location.href = '/admin';
                } else {
                    throw new Error(data.detail || 'Incorrect answer');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = '❌ Incorrect answer. Try again.';
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Enter Admin Portal →';
                document.getElementById('answer').value = '';
                document.getElementById('answer').focus();
            }
        });
    </script>
</body>
</html>
