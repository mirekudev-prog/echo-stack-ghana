<!-- In login.html, the form should be like this -->
<form id="login-form" class="space-y-4">
    <div>
        <label class="block text-sm font-medium mb-2">Who are you? 😊</label>
        <input type="text" id="answer" 
               placeholder="Enter designation"
               class="w-full p-3 border rounded-lg focus:outline-none"
               required
               autocomplete="off">
    </div>
    
    <button type="submit" class="w-full py-3 rounded-lg font-bold transition">
        🔒 Verify & Access Admin Panel
    </button>
</form>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const answer = document.getElementById('answer').value.trim();
    
    const formData = new FormData();
    formData.append('answer', answer);
    
    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            body: formData
        });
        
        if (response.ok) {
            // Set cookie automatically via backend
            window.location.href = '/admin';
        } else {
            alert('❌ Incorrect answer. Try again.');
        }
    } catch (error) {
        alert('❌ Error connecting to server');
    }
});
</script>
