<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoStack - Client Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: Georgia, serif; background: linear-gradient(135deg, #1a1e29 0%, #0077b6 100%); min-height: 100vh; }
</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
<div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
  <div class="text-center mb-8">
    <img src="/echostack-logo.png" class="w-16 h-16 mx-auto mb-3 rounded-xl" onerror="this.style.display='none'">
    <h1 class="text-2xl font-bold text-gray-800">Client Portal</h1>
    <p class="text-gray-500 text-sm mt-1">Sign in to manage your EchoStack site</p>
  </div>
  <div id="error-msg" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4"></div>
  <div class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" id="password" placeholder="Your password" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none">
    </div>
    <button onclick="doLogin()" id="login-btn" class="w-full py-3 rounded-lg font-bold text-white text-lg" style="background:#0077b6">Sign In</button>
  </div>
  <p class="text-center text-xs text-gray-400 mt-8 pt-4 border-t">
    Visitor? <a href="/user-login" class="text-blue-500">Sign in here</a> &nbsp;|&nbsp;
    Admin? <a href="/admin" class="text-blue-500">Admin login</a>
  </p>
</div>
<script>
async function doLogin() {
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('error-msg');
  err.classList.add('hidden');
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  if (!email || !password) { err.textContent = 'Please enter email and password.'; err.classList.remove('hidden'); return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    var fd = new FormData(); fd.append('email', email); fd.append('password', password);
    var r = await fetch('/api/client/login', { method: 'POST', body: fd });
    var d = await r.json();
    if (d.success) { window.location.href = '/client-dashboard'; }
    else { throw new Error(d.detail || 'Login failed'); }
  } catch(e) {
    err.textContent = e.message || 'Invalid email or password.';
    err.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}
document.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
